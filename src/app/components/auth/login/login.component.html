<div class="login-page">
  <div class="login-illustration">
    <div class="illustration-placeholder"></div>
  </div>

  <div class="login-form-container">
    <div class="login-form-wrapper">
      <h2 class="text-headline-medium login-heading">Lib4GZ</h2>
      <p class="text-body-medium login-caption">A place for "đẳng cấp"-est writer in Vietnam</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <lib-input
            formControlName="email"
            label="Email or username"
            type="text"
            [required]="true"
            [error]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid
              ? 'Email or username is required'
              : null"
          />
        </div>

        <div class="form-row">
          <lib-input
            formControlName="password"
            label="Password"
            type="password"
            [required]="true"
            [error]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid
              ? 'Password is required'
              : null"
          />
        </div>

        @if (errorMessage()) {
          <div class="login-error" role="alert">
            {{ errorMessage() }}
          </div>
        }

        <lib-button
          type="submit"
          variant="primary"
          size="lg"
          [isLoading]="isLoading()"
          [disabled]="loginForm.invalid"
        >
          Login
        </lib-button>
      </form>

      <div class="login-divider">
        <span class="login-divider-line"></span>
        <span class="login-divider-text text-body-medium">or</span>
        <span class="login-divider-line"></span>
      </div>

      <div class="login-social">
        <button
          class="google-btn secondary lg"
          type="button"
          aria-label="Sign in with Google"
        >
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
