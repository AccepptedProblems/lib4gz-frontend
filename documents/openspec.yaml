  openspec: "1.0"
kind: ProjectIndex
info:
  title: LMS Platform Frontend
  version: "1.0.0"
  description: >
    Learning Management System frontend application built with Angular 17+.
    Supports course enrollment, content consumption, exercise submission,
    and teacher management workflows.
  phase: "1"

project:
  name: lib4gz-fe
  framework: Angular 17+
  language: TypeScript 5+
  styling: SCSS with CSS custom properties
  ui_library: Angular Material (spinner only)
  icons: Material Symbols (Google Fonts)
  state: RxJS 7+ with signal-based inputs

  target_users:
    - role: student
      description: Enroll in courses, view content, complete exercises
    - role: teacher
      description: Create courses, review submissions, manage enrollments

# ════════════════════════════════════════════════════════════════
# DOCUMENT REFERENCES
# ════════════════════════════════════════════════════════════════

documents:
  # ──────────────────────────────────────────────────────────
  # DESIGN SYSTEM
  # ──────────────────────────────────────────────────────────
  design_system:
    - id: design-system
      title: Design System Index
      path: ./design-system/spec.yaml
      kind: DesignSystem
      description: >
        Central design system index with architecture, file structure,
        and references to all sub-documents.

    - id: design-tokens
      title: Design Tokens
      path: ./design-system/tokens.yaml
      kind: DesignTokens
      description: >
        Spacing, border-radius, motion/animation, z-index, and font-size tokens.

    - id: color-system
      title: Color System
      path: ./design-system/color.yaml
      kind: ColorSystem
      description: >
        Color palette: primary (Mint/Teal), neutral, and semantic scales.

    - id: typography-system
      title: Typography System
      path: ./design-system/typography.yaml
      kind: TypographySystem
      description: >
        15-level typography scale with SCSS mixins, CSS classes, and HTML mapping.

    - id: breakpoints
      title: Responsive Breakpoints
      path: ./design-system/breakpoints.yaml
      kind: Breakpoints
      description: >
        Mobile-first breakpoints from 576px to 1600px.

    - id: component-styles
      title: Component Styles
      path: ./design-system/components.yaml
      kind: ComponentStyles
      description: >
        Global styles for button, input, select, checkbox, and form elements.

    - id: theme-config
      title: Theme Configuration
      path: ./design-system/theme.yaml
      kind: ThemeConfig
      description: >
        Theme system with token mixins. Active theme: Mint/Teal.

    - id: shared-components
      title: Shared Angular Components
      path: ./design-system/shared-components.yaml
      kind: SharedComponents
      description: >
        Reusable Angular components: ButtonComponent (lib-button),
        SpinnerComponent (lib-spinner), and InputComponent (lib-input).

  # ──────────────────────────────────────────────────────────
  # LAYOUT COMPONENTS
  # ──────────────────────────────────────────────────────────
  layout:
    - id: navbar
      title: Navigation Bar
      path: ./layout/navbar/spec.yaml
      kind: LayoutComponent
      description: >
        Main navigation bar with brand link, notification icon,
        and user avatar. Shown on all authenticated screens.

    - id: footer
      title: Footer
      path: ./layout/footer/spec.yaml
      kind: LayoutComponent
      description: >
        Site footer with copyright text. Uses footer theme tokens.
        Shown on all authenticated screens.

  # ──────────────────────────────────────────────────────────
  # NETWORK LAYER
  # ──────────────────────────────────────────────────────────
  network:
    - id: networking
      title: Networking Configuration
      path: ./network/networking.yaml
      kind: NetworkConfig
      description: >
        HTTP client setup, JWT interceptor, error interceptor,
        route guards, environment configuration, and service barrel exports.

    - id: api-endpoints
      title: API Endpoints
      path: ./network/api-endpoints.yaml
      kind: APIEndpoints
      description: >
        Complete REST API endpoint specification organized by resource:
        Auth, Courses, Enrollments, Modules, Lessons, Summaries,
        Exercises, Questions, and Submissions.

    - id: models
      title: Data Models
      path: ./network/models.yaml
      kind: DataModels
      description: >
        All TypeScript interfaces and enumerations: Enums (Visibility,
        EnrollmentRole, EnrollmentStatus, ExerciseType, SubmissionStatus,
        QuestionVisibility, QuestionAction), and domain models for Auth,
        User, Course, Enrollment, Module, Lesson, Summary, Exercise,
        Question, and Submission.

  # ──────────────────────────────────────────────────────────
  # SCREENS
  # ──────────────────────────────────────────────────────────
  screens:
    # Authentication (Public)
    - id: auth
      title: Auth Screens (Login & Register)
      path: ./screens/auth/spec.yaml
      kind: Screen
      routes:
        - /login
        - /register
      category: authentication
      target_users: [public]
      description: User login and registration screens.

    # Student Screens
    - id: user-dashboard
      title: User Dashboard
      path: ./screens/user-dashboard/spec.yaml
      kind: Screen
      routes:
        - /
      category: student
      target_users: [student, teacher]
      description: Central hub with course cards, tabs, and search.

    - id: course-dashboard
      title: Course Dashboard
      path: ./screens/course-dashboard/spec.yaml
      kind: Screen
      routes:
        - /course/:id
      category: student
      target_users: [student]
      description: >
        Two-column layout: left sidebar with course identity (name,
        description, instructor) and module navigation; right column
        with centered lesson content area.

    - id: summary-view
      title: Summary View
      path: ./screens/summary-view/spec.yaml
      kind: Screen
      routes:
        - /course/:courseId/lesson/:lessonId/summary
      category: student
      target_users: [student]
      description: Lesson summary content display with prev/next navigation.

    - id: lesson-view
      title: Lesson View
      path: ./screens/lesson-view/spec.yaml
      kind: Screen
      routes:
        - /course/:courseId/lesson/:lessonId
      category: student
      target_users: [student]
      description: General lesson content with type badges and resources.

    - id: exercise-attempt
      title: Exercise Attempt
      path: ./screens/exercise-attempt/spec.yaml
      kind: Screen
      routes:
        - /course/:id/lesson/:lessonId/attempt
      category: student
      target_users: [student]
      description: >
        Exercise-taking screen. Loads all exercises for a lesson and
        displays them as tabs (Exercise 1, Exercise 2, ...). Each tab
        shows the exercise title and answer UI. Header shows lesson
        position prefix (e.g. "Exercise 1.2") with Cancel/Submit buttons.
        Replaces the previous split between exercise-attempt overview and
        exercise-do full-screen.

    - id: exercise-do
      title: Exercise Do (Full-Screen)
      path: ./screens/exercise-do/spec.yaml
      kind: Screen
      deprecated: true
      routes:
        - /course/:id/exercise/:exerciseId/do
      category: student
      target_users: [student]
      description: >
        Deprecated: exercise-doing functionality has been merged into the
        exercise-attempt screen, which now handles both exercise overview
        and active exercise-taking in a tabbed interface. This spec is
        retained for historical reference only.

    # Teacher Screens
    - id: course-management
      title: Course Management
      path: ./screens/course-management/spec.yaml
      kind: Screen
      routes:
        - /course/:id/manage
      category: teacher
      target_users: [teacher]
      description: >
        Sidebar navigation + view-based layout for course management.
        Three views (Course Material, Enrollment, Submissions) switched
        via sidebar nav items. Course Material supports lesson detail sub-view.
        Enrollment management is now included as an inline view within this screen,
        replacing the previously separate enrollment-management and enrollment-requests screens.
      sub_documents:
        - id: lesson-detail-management
          title: Lesson Detail Management
          path: ./screens/course-management/lesson-detail-management.spec.yaml
          kind: ChildComponent
          description: >
            Child component for viewing and editing lesson details within the
            Course Material view of the course management screen.

    - id: enrollment-management
      title: Enrollment Management
      path: ./screens/enrollment-management/spec.yaml
      kind: Screen
      deprecated: true
      routes:
        - /course/:id/manage/enrollments
      category: teacher
      target_users: [teacher]
      description: >
        Deprecated: enrollment management has been merged into the course-management
        screen as an inline view. This spec is retained for historical reference only.

    - id: enrollment-requests
      title: Enrollment Requests
      path: ./screens/enrollment-requests/spec.yaml
      kind: Screen
      deprecated: true
      routes:
        - /course/:id/manage/requests
      category: teacher
      target_users: [teacher]
      description: >
        Deprecated: the enrollment requests route has been removed. Enrollment
        request handling is now part of the course-management screen's Enrollment view.

    - id: exercise-editor
      title: Exercise Editor
      path: ./screens/exercise-editor/spec.yaml
      kind: Screen
      routes:
        - /course/:id/manage/exercise/new
        - /course/:id/manage/exercise/:exerciseId/edit
      category: teacher
      target_users: [teacher]
      description: >
        Create/edit exercises with inline question editing. Supports
        Multiple Choice (answer options) and Text Answer types. Features
        Smart Creation for bulk-importing questions from numbered text,
        and unsaved-changes confirmation dialog.

    # Utility Screens
    - id: not-found
      title: Not Found (404)
      path: ./screens/not-found/spec.yaml
      kind: Screen
      routes:
        - "**"
      category: utility
      target_users: [all]
      description: Catch-all 404 error page with navigation recovery.

# ════════════════════════════════════════════════════════════════
# USER FLOWS
# ════════════════════════════════════════════════════════════════

user_flows:
  student:
    description: Student journey through the platform
    steps:
      - screen: auth
        route: /login
      - screen: user-dashboard
        route: /
      - screen: course-dashboard
        route: /course/:id
      - screen: lesson-view
        route: /course/:courseId/lesson/:lessonId
      - screen: summary-view
        route: /course/:courseId/lesson/:lessonId/summary
      - screen: exercise-attempt
        route: /course/:id/lesson/:lessonId/attempt

  teacher:
    description: Teacher management journey
    steps:
      - screen: auth
        route: /login
      - screen: user-dashboard
        route: /
      - screen: course-management
        route: /course/:id/manage
      - screen: exercise-editor
        route: /course/:id/manage/exercise/new

# ════════════════════════════════════════════════════════════════
# IMPLEMENTATION PHASES
# ════════════════════════════════════════════════════════════════

phases:
  - id: "1A"
    name: Core Auth & Navigation
    screens:
      - auth
      - not-found

  - id: "1B"
    name: Student Experience
    screens:
      - user-dashboard
      - course-dashboard
      - lesson-view
      - summary-view
      - exercise-attempt
      - exercise-do

  - id: "1C"
    name: Teacher Experience
    screens:
      - course-management
      - enrollment-management
      - enrollment-requests
      - exercise-editor

# ════════════════════════════════════════════════════════════════
# ROUTING
# ════════════════════════════════════════════════════════════════

routing:
  file: src/app/app.routes.ts
  structure:
    - path: login
      screen: auth
      guard: none
    - path: register
      screen: auth
      guard: none
    - path: ""
      screen: user-dashboard
      guard: authGuard
      pathMatch: full
    - path: "course/:id"
      guard: authGuard
      children:
        - path: ""
          screen: course-dashboard
        - path: "lesson/:lessonId"
          screen: lesson-view
        - path: "lesson/:lessonId/summary"
          screen: summary-view
        - path: "lesson/:lessonId/attempt"
          screen: exercise-attempt
        - path: "exercise/:exerciseId/do"
          screen: exercise-do
          deprecated: true
    - path: "course/:id/manage"
      guard: [authGuard, roleGuard]
      guard_data:
        roles: [teacher]
      children:
        - path: ""
          screen: course-management
        - path: exercise/new
          screen: exercise-editor
        - path: "exercise/:exerciseId/edit"
          screen: exercise-editor
    - path: "**"
      screen: not-found
