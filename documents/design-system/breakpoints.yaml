openspec: "1.0"
kind: Breakpoints
info:
  title: LMS Platform - Responsive Breakpoints
  version: "1.0.0"
  description: >
    Mobile-first responsive breakpoints defined as SCSS variables.
    Used for responsive layouts across all components.
  file: src/assets/design-system/_breakpoint.scss

approach: mobile-first

breakpoints:
  - name: $mobile-breakpoint
    value: 576px
    description: Small phones

  - name: $mobile-large-breakpoint
    value: 768px
    description: Large phones / small tablets

  - name: $tablet-portrait-breakpoint
    value: 992px
    description: Tablets portrait

  - name: $tablet-landscape-breakpoint
    value: 1200px
    description: Tablets landscape / small laptops

  - name: $desktop-breakpoint
    value: 1400px
    description: Desktop

  - name: $desktop-large-breakpoint
    value: 1600px
    description: Large desktop / widescreen

usage_patterns:
  description: >
    Breakpoints are SCSS variables (not CSS custom properties).
    Use in @media queries within component SCSS files.
  example: |
    @use 'assets/design-system/breakpoint' as bp;

    .container {
      width: 100%;

      @media (min-width: bp.$mobile-large-breakpoint) {
        width: 750px;
      }

      @media (min-width: bp.$tablet-landscape-breakpoint) {
        width: 1140px;
      }
    }

typography_responsive:
  description: >
    Typography has built-in responsive adjustments at 768px.
    Display sizes reduce on mobile (defined in _typography.scss).
  adjustments:
    - breakpoint: "max-width: 768px"
      changes:
        - { token: --display-large-size, from: 57px, to: 45px }
        - { token: --display-large-height, from: 64px, to: 52px }
        - { token: --display-medium-size, from: 45px, to: 36px }
        - { token: --display-medium-height, from: 52px, to: 44px }
        - { token: --display-small-size, from: 36px, to: 32px }
        - { token: --display-small-height, from: 44px, to: 40px }
