openspec: "1.0"
kind: TypographySystem
info:
  title: LMS Platform - Typography System
  version: "1.0.0"
  description: >
    Comprehensive typography system with 15 scale levels.
    Provides CSS custom properties, SCSS mixins, CSS utility classes,
    and HTML element mappings.
  file: src/assets/design-system/_typography.scss

font_family:
  file: src/assets/design-system/theme/theme-mint.scss
  token: --font-family
  value: "-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif"

# ──────────────────────────────────────────────────────────────
# TYPOGRAPHY SCALE
# ──────────────────────────────────────────────────────────────
scale:
  display:
    description: "Hero sections, landing page titles, marketing messages"
    levels:
      - name: display-large
        tokens:
          size: { name: --display-large-size, value: 57px }
          height: { name: --display-large-height, value: 64px }
          weight: { name: --display-large-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --display-large-tracking, value: "-0.25px" }
        mixin: text-display-large
        class: .text-display-large
        responsive:
          max_768px:
            size: 45px
            height: 52px

      - name: display-medium
        tokens:
          size: { name: --display-medium-size, value: 45px }
          height: { name: --display-medium-height, value: 52px }
          weight: { name: --display-medium-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --display-medium-tracking, value: 0px }
        mixin: text-display-medium
        class: .text-display-medium
        responsive:
          max_768px:
            size: 36px
            height: 44px

      - name: display-small
        tokens:
          size: { name: --display-small-size, value: 36px }
          height: { name: --display-small-height, value: 44px }
          weight: { name: --display-small-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --display-small-tracking, value: 0px }
        mixin: text-display-small
        class: .text-display-small
        responsive:
          max_768px:
            size: 32px
            height: 40px

  headline:
    description: "Section titles"
    levels:
      - name: headline-large
        tokens:
          size: { name: --headline-large-size, value: "var(--font-size-xxl)", resolved: 32px }
          height: { name: --headline-large-height, value: 40px }
          weight: { name: --headline-large-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --headline-large-tracking, value: 0px }
        mixin: text-headline-large
        class: .text-headline-large
        html_element: h1

      - name: headline-medium
        tokens:
          size: { name: --headline-medium-size, value: "var(--font-size-xl)", resolved: 28px }
          height: { name: --headline-medium-height, value: 36px }
          weight: { name: --headline-medium-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --headline-medium-tracking, value: 0px }
        mixin: text-headline-medium
        class: .text-headline-medium
        html_element: h2

      - name: headline-small
        tokens:
          size: { name: --headline-small-size, value: "var(--font-size-l)", resolved: 24px }
          height: { name: --headline-small-height, value: 32px }
          weight: { name: --headline-small-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --headline-small-tracking, value: 0px }
        mixin: text-headline-small
        class: .text-headline-small
        html_element: h3

  title:
    description: "Subsection titles"
    levels:
      - name: title-large
        tokens:
          size: { name: --title-large-size, value: 22px }
          height: { name: --title-large-height, value: 28px }
          weight: { name: --title-large-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --title-large-tracking, value: 0px }
        mixin: text-title-large
        class: .text-title-large
        html_element: h4

      - name: title-medium
        tokens:
          size: { name: --title-medium-size, value: "var(--font-size-s)", resolved: 16px }
          height: { name: --title-medium-height, value: 24px }
          weight: { name: --title-medium-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --title-medium-tracking, value: 0.15px }
        mixin: text-title-medium
        class: .text-title-medium
        html_element: h5

      - name: title-small
        tokens:
          size: { name: --title-small-size, value: "var(--font-size-xs)", resolved: 14px }
          height: { name: --title-small-height, value: 20px }
          weight: { name: --title-small-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --title-small-tracking, value: 0.1px }
        mixin: text-title-small
        class: .text-title-small
        html_element: h6

  body:
    description: "Regular text"
    levels:
      - name: body-large
        tokens:
          size: { name: --body-large-size, value: "var(--font-size-s)", resolved: 16px }
          height: { name: --body-large-height, value: 24px }
          weight: { name: --body-large-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --body-large-tracking, value: 0.5px }
        mixin: text-body-large
        class: .text-body-large

      - name: body-medium
        tokens:
          size: { name: --body-medium-size, value: "var(--font-size-xs)", resolved: 14px }
          height: { name: --body-medium-height, value: 20px }
          weight: { name: --body-medium-weight, value: "var(--font-weight-regular)" }
          tracking: { name: --body-medium-tracking, value: 0.25px }
        mixin: text-body-medium
        class: .text-body-medium
        html_element: p

      - name: body-small
        tokens:
          size: { name: --body-small-size, value: "var(--font-size-xxs)", resolved: 12px }
          height: { name: --body-small-height, value: 16px }
          weight: { name: --body-small-weight, value: "var(--font-weight-bold)" }
          tracking: { name: --body-small-tracking, value: 0.4px }
        mixin: text-body-small
        class: .text-body-small

  label:
    description: "Captions, tags, small UI text"
    levels:
      - name: label-large
        tokens:
          size: { name: --label-large-size, value: 14px }
          height: { name: --label-large-height, value: 20px }
          weight: { name: --label-large-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --label-large-tracking, value: 0.1px }
        mixin: text-label-large
        class: .text-label-large

      - name: label-medium
        tokens:
          size: { name: --label-medium-size, value: 12px }
          height: { name: --label-medium-height, value: 16px }
          weight: { name: --label-medium-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --label-medium-tracking, value: 0.5px }
        mixin: text-label-medium
        class: .text-label-medium

      - name: label-small
        tokens:
          size: { name: --label-small-size, value: 11px }
          height: { name: --label-small-height, value: 16px }
          weight: { name: --label-small-weight, value: "var(--font-weight-medium)" }
          tracking: { name: --label-small-tracking, value: 0.5px }
        mixin: text-label-small
        class: .text-label-small

# ──────────────────────────────────────────────────────────────
# HTML ELEMENT MAPPING
# ──────────────────────────────────────────────────────────────
global_resets:
  description: >
    Global CSS resets applied at the top of the typography layer.
    Includes the universal box-model reset and font inheritance rules.
    These ensure consistent sizing and typography across the entire app.
  file: src/assets/design-system/_typography.scss
  rules:
    - selector: "*, *::before, *::after"
      styles:
        box-sizing: border-box
      note: >
        Universal border-box sizing. Ensures padding and border are
        included within declared width/height on all elements. Prevents
        overflow bugs in flex/grid layouts with padding. See design
        principle: global-box-model.
    - selector: "body"
      styles:
        font-family: "var(--font-family)"
      note: "Sets the base font for all inherited elements"
    - selector: "button, input, select, textarea"
      styles:
        font-family: inherit
      note: "Form elements do not inherit font-family by default in browsers"

html_element_mapping:
  description: >
    HTML elements are styled via @include mixins.
    All headings have margin-top: 0 and margin-bottom: var(--spacing-md).
  elements:
    - element: h1
      mixin: text-headline-large
    - element: h2
      mixin: text-headline-medium
    - element: h3
      mixin: text-headline-small
    - element: h4
      mixin: text-title-large
    - element: h5
      mixin: text-title-medium
    - element: h6
      mixin: text-title-small
    - element: p
      mixin: text-body-medium

# ──────────────────────────────────────────────────────────────
# CUSTOM PAGE STYLES
# ──────────────────────────────────────────────────────────────
custom_styles:
  - class: .page-title
    styles:
      margin: "28px 0 20px 0"
      font-size: 2.8rem
      font-weight: "400"
    responsive:
      max_768px:
        font-size: 2rem

  - class: .page-description
    styles:
      margin: "0 0 16px 0"
      font-size: 1.3rem
      text-align: center
      color: "var(--text-secondary-color)"
      font-weight: "400"
    responsive:
      max_768px:
        font-size: 1rem

  - class: .screen-title
    styles:
      font-weight: "600"
      font-size: 2.8rem

  - class: .group-title
    styles:
      font-weight: "600"
      font-size: 19px

# ──────────────────────────────────────────────────────────────
# TEXT COLOR UTILITIES
# ──────────────────────────────────────────────────────────────
text_color_utilities:
  file: src/assets/design-system/_typography.scss
  description: >
    Utility classes for text color. Applied as CSS classes on any element.
  classes:
    - class: .text-primary
      color: "var(--text-primary-color)"
      note: "Primary text (neutral-9, darkest)"
    - class: .text-secondary
      color: "var(--text-secondary-color)"
      note: "Secondary text (neutral-7)"
    - class: .text-disabled
      color: "var(--neutral-color-5)"
      note: "Disabled/placeholder text"
    - class: .text-accent
      color: "var(--primary-color-600)"
      note: "Accent/link text using primary color"
    - class: .text-error
      color: "var(--error-color)"
      note: "Error text"
    - class: .text-success
      color: "var(--success-color)"
      note: "Success text"
