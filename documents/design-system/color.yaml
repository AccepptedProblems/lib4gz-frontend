openspec: "1.0"
kind: ColorSystem
info:
  title: LMS Platform - Color System
  version: "1.0.0"
  description: >
    Two-layer color system. Base colors defined in _color.scss provide
    default fallbacks. Theme file (theme-mint.scss) overrides primary
    and neutral palettes, plus adds semantic colors.

# ──────────────────────────────────────────────────────────────
# BASE COLORS (fallback defaults)
# ──────────────────────────────────────────────────────────────
base_colors:
  file: src/assets/design-system/_color.scss
  selector: ":root"
  description: >
    Default color palette. These are overridden by the active theme.
    The base primary uses a blue palette; the active theme (Mint) replaces it.

  primary:
    description: "Base primary (Blue) - overridden by theme"
    tokens:
      - { name: --primary-color-900, value: "#0f3375" }
      - { name: --primary-color-800, value: "#13459c" }
      - { name: --primary-color-700, value: "#1557c0" }
      - { name: --primary-color-600, value: "#196bde" }
      - { name: --primary-color-500, value: "#3a7dfb" }
      - { name: --primary-color-400, value: "#4b9cf9" }
      - { name: --primary-color-300, value: "#77b6fb" }
      - { name: --primary-color-200, value: "#a4cefc" }
      - { name: --primary-color-100, value: "#cce4fd" }
      - { name: --primary-color-50, value: "#e8f3fe" }

  neutral:
    description: "Grayscale palette (0=white, 9=darkest)"
    tokens:
      - { name: --neutral-color-0, value: "#ffffff" }
      - { name: --neutral-color-1, value: "#f8f8f8" }
      - { name: --neutral-color-2, value: "#f2f2f2" }
      - { name: --neutral-color-3, value: "#e4e4e4" }
      - { name: --neutral-color-4, value: "#cecece", note: "Default border" }
      - { name: --neutral-color-5, value: "#adadad", note: "Placeholder text" }
      - { name: --neutral-color-6, value: "#808080" }
      - { name: --neutral-color-7, value: "#646464", note: "Secondary text" }
      - { name: --neutral-color-8, value: "#484848" }
      - { name: --neutral-color-9, value: "#333333", note: "Primary text" }

  warning:
    description: "Warning / amber-orange scale (10 shades)"
    tokens:
      - { name: --warning-color-0, value: "#fff8e1" }
      - { name: --warning-color-1, value: "#ffe082" }
      - { name: --warning-color-2, value: "#ffd54f" }
      - { name: --warning-color-3, value: "#ffca28" }
      - { name: --warning-color-4, value: "#ffb300" }
      - { name: --warning-color-5, value: "#ffa000" }
      - { name: --warning-color-6, value: "#ff8f00" }
      - { name: --warning-color-7, value: "#ff6f00" }
      - { name: --warning-color-8, value: "#e86722" }
      - { name: --warning-color-9, value: "#e0562c" }

  success:
    description: "Success / green scale (10 shades)"
    tokens:
      - { name: --success-color-0, value: "#e8f5e9" }
      - { name: --success-color-1, value: "#c8e6c9" }
      - { name: --success-color-2, value: "#a5d6a7" }
      - { name: --success-color-3, value: "#81c784" }
      - { name: --success-color-4, value: "#66bb6a" }
      - { name: --success-color-5, value: "#4caf50" }
      - { name: --success-color-6, value: "#43a047" }
      - { name: --success-color-7, value: "#388e3c" }
      - { name: --success-color-8, value: "#2e7d32" }
      - { name: --success-color-9, value: "#1b5e20" }

  error:
    description: "Error / red scale (10 shades)"
    tokens:
      - { name: --error-color-0, value: "#ffebee" }
      - { name: --error-color-1, value: "#ffcdd2" }
      - { name: --error-color-2, value: "#ef9a9a" }
      - { name: --error-color-3, value: "#e57373" }
      - { name: --error-color-4, value: "#ef5350" }
      - { name: --error-color-5, value: "#f44336" }
      - { name: --error-color-6, value: "#e53935" }
      - { name: --error-color-7, value: "#d32f2f" }
      - { name: --error-color-8, value: "#c62828" }
      - { name: --error-color-9, value: "#b71c1c" }

# ──────────────────────────────────────────────────────────────
# ACTIVE THEME COLORS (Mint/Teal)
# ──────────────────────────────────────────────────────────────
theme_colors:
  file: src/assets/design-system/theme/theme-mint.scss
  selector: ":root"
  description: >
    Active theme overrides. These values take precedence over base colors.

  primary:
    description: "Mint/Teal primary palette — overrides base blue in _color.scss"
    tokens:
      - { name: --primary-color-900, value: "#004d40" }
      - { name: --primary-color-800, value: "#00695c" }
      - { name: --primary-color-700, value: "#00796b" }
      - { name: --primary-color-600, value: "#00897b", note: "Base primary" }
      - { name: --primary-color-500, value: "#26a69a" }
      - { name: --primary-color-400, value: "#4db6ac" }
      - { name: --primary-color-300, value: "#80cbc4" }
      - { name: --primary-color-200, value: "#b2dfdb" }
      - { name: --primary-color-100, value: "#e0f2f1" }
      - { name: --primary-color-50, value: "#f1f8f6" }

  neutral:
    description: "Declared in theme — _color.scss is not imported, so theme is the sole source"
    tokens:
      - { name: --neutral-color-0, value: "#ffffff" }
      - { name: --neutral-color-1, value: "#f8f8f8" }
      - { name: --neutral-color-2, value: "#f2f2f2" }
      - { name: --neutral-color-3, value: "#e4e4e4" }
      - { name: --neutral-color-4, value: "#cecece", note: "Default border" }
      - { name: --neutral-color-5, value: "#adadad", note: "Placeholder text, input border" }
      - { name: --neutral-color-6, value: "#808080" }
      - { name: --neutral-color-7, value: "#646464", note: "Secondary text" }
      - { name: --neutral-color-8, value: "#484848" }
      - { name: --neutral-color-9, value: "#333333", note: "Primary text" }

  semantic:
    description: "Semantic shorthand colors"
    tokens:
      - { name: --warning-color, value: "#fbaa21" }
      - { name: --success-color, value: "#4caf50" }
      - { name: --error-color, value: "#f44336" }

  text:
    description: "Text color tokens"
    tokens:
      - { name: --text-color-on-primary-bg, value: "var(--neutral-color-0)" }
      - { name: --button-text-color, value: "var(--neutral-color-0)" }

  surfaces:
    description: "Surface color tokens for white-background premium design"
    tokens:
      - { name: --surface-page, value: "var(--neutral-color-0)", note: "Main page background (WHITE)" }
      - { name: --surface-raised, value: "var(--neutral-color-0)", note: "Cards (distinguished by border + shadow)" }
      - { name: --surface-sunken, value: "var(--neutral-color-1)", note: "Sidebars, code blocks" }
      - { name: --surface-overlay, value: "rgba(0, 0, 0, 0.5)", note: "Modal backdrops" }
      - { name: --surface-hover, value: "var(--neutral-color-1)", note: "Row/card hover" }
      - { name: --surface-selected, value: "var(--primary-color-50)", note: "Selected items" }
      - { name: --surface-primary-subtle, value: "var(--primary-color-50)", note: "Callout backgrounds" }
      - { name: --surface-success-subtle, value: "var(--success-color-0)", note: "Success messages" }
      - { name: --surface-warning-subtle, value: "var(--warning-color-0)", note: "Warning messages" }
      - { name: --surface-error-subtle, value: "var(--error-color-0)", note: "Error messages" }
