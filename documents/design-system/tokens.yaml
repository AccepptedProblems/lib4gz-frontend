openspec: "1.0"
kind: DesignTokens
info:
  title: LMS Platform - Design Tokens
  version: "1.0.0"
  description: >
    Core design tokens defined as CSS custom properties on :root.
    Located in src/assets/design-system/_typography.scss (spacing, radius,
    motion, z-index, font-size/weight sections).

file: src/assets/design-system/_typography.scss

spacing:
  description: "4px base unit scale"
  selector: ":root"
  tokens:
    - name: --spacing-none
      value: "0"
    - name: --spacing-xxs
      value: 2px
    - name: --spacing-xs
      value: 4px
    - name: --spacing-sm
      value: 8px
    - name: --spacing-md
      value: 16px
      note: Default spacing
    - name: --spacing-lg
      value: 24px
    - name: --spacing-xl
      value: 32px
    - name: --spacing-2xl
      value: 48px
    - name: --spacing-3xl
      value: 64px
    - name: --spacing-4xl
      value: 96px
    - name: --spacing-5xl
      value: 128px

border_radius:
  selector: ":root"
  tokens:
    - name: --radius-none
      value: "0"
    - name: --radius-xs
      value: 2px
    - name: --radius-sm
      value: 4px
    - name: --radius-md
      value: 8px
    - name: --radius-lg
      value: 12px
    - name: --radius-xl
      value: 16px
    - name: --radius-2xl
      value: 24px
    - name: --radius-full
      value: 9999px
      note: Full rounding (pills, circles)

motion:
  selector: ":root"
  durations:
    - name: --duration-instant
      value: 0ms
    - name: --duration-fast
      value: 100ms
    - name: --duration-normal
      value: 200ms
      note: Default transition duration
    - name: --duration-slow
      value: 300ms
    - name: --duration-slower
      value: 400ms
    - name: --duration-slowest
      value: 500ms
  easing:
    - name: --easing-linear
      value: linear
    - name: --easing-ease
      value: ease
    - name: --easing-ease-in
      value: "cubic-bezier(0.4, 0, 1, 1)"
    - name: --easing-ease-out
      value: "cubic-bezier(0, 0, 0.2, 1)"
    - name: --easing-ease-in-out
      value: "cubic-bezier(0.4, 0, 0.2, 1)"
    - name: --easing-spring
      value: "cubic-bezier(0.175, 0.885, 0.32, 1.275)"

z_index:
  selector: ":root"
  tokens:
    - name: --z-index-below
      value: "-1"
    - name: --z-index-base
      value: "0"
    - name: --z-index-dropdown
      value: "100"
    - name: --z-index-sticky
      value: "200"
    - name: --z-index-fixed
      value: "300"
    - name: --z-index-drawer
      value: "400"
    - name: --z-index-modal-backdrop
      value: "500"
    - name: --z-index-modal
      value: "600"
    - name: --z-index-popover
      value: "700"
    - name: --z-index-tooltip
      value: "800"
    - name: --z-index-toast
      value: "900"
    - name: --z-index-max
      value: "9999"

font_size:
  selector: ":root"
  tokens:
    - name: --font-size-xxs
      value: 12px
    - name: --font-size-xs
      value: 14px
    - name: --font-size-s
      value: 16px
    - name: --font-size-m
      value: 20px
    - name: --font-size-l
      value: 24px
    - name: --font-size-xl
      value: 28px
    - name: --font-size-xxl
      value: 32px
    - name: --font-size-xxxl
      value: 40px
    - name: --font-size-xxxxl
      value: 48px

font_weight:
  selector: ":root"
  tokens:
    - name: --font-weight-light
      value: "300"
    - name: --font-weight-regular
      value: "400"
    - name: --font-weight-medium
      value: "500"
    - name: --font-weight-bold
      value: "700"

elevation:
  description: "Low-opacity multi-layer shadows for premium floating/lifting"
  selector: ":root"
  tokens:
    - name: --shadow-none
      value: "none"
    - name: --shadow-xs
      value: "0 1px 2px rgba(0,0,0,0.04)"
      note: Subtle lift for cards at rest
    - name: --shadow-sm
      value: "0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)"
      note: Raised cards
    - name: --shadow-md
      value: "0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04)"
      note: Card hover, dropdowns, tooltips
    - name: --shadow-lg
      value: "0 10px 15px rgba(0,0,0,0.05), 0 4px 6px rgba(0,0,0,0.03)"
      note: Toasts, floating panels
    - name: --shadow-xl
      value: "0 20px 25px rgba(0,0,0,0.05), 0 8px 10px rgba(0,0,0,0.03)"
      note: Modals
    - name: --shadow-inner
      value: "inset 0 2px 4px rgba(0,0,0,0.04)"
      note: Inset inputs

border:
  description: "Semantic border tokens for premium feel"
  selector: ":root"
  tokens:
    - name: --border-default
      value: "1px solid var(--neutral-color-3)"
      note: Card borders (lighter than neutral-4)
    - name: --border-strong
      value: "1px solid var(--neutral-color-4)"
      note: Input fields, selects, checkboxes
    - name: --border-subtle
      value: "1px solid var(--neutral-color-2)"
      note: Dividers, table rows, sidebar edges
    - name: --border-focus
      value: "2px solid var(--primary-color-500)"
      note: Focus rings
    - name: --border-error
      value: "1px solid var(--error-color)"
      note: Error state borders

opacity:
  selector: ":root"
  tokens:
    - name: --opacity-disabled
      value: "0.5"
    - name: --opacity-hover-overlay
      value: "0.04"
    - name: --opacity-backdrop
      value: "0.5"

focus_ring:
  description: "Double-ring focus style for premium accessibility"
  selector: ":root"
  tokens:
    - name: --focus-ring-color
      value: "var(--primary-color-300)"
    - name: --focus-ring-width
      value: 2px
    - name: --focus-ring-offset
      value: 2px
    - name: --focus-ring
      value: "0 0 0 2px var(--neutral-color-0), 0 0 0 4px var(--focus-ring-color)"
      note: White gap + color ring (double-ring pattern)

image:
  file: src/assets/design-system/_component.scss
  selector: ":root"
  tokens:
    - name: --img-border-radius
      value: 0px
