# ──────────────────────────────────────────────────────────────
# CHIP COMPONENT
# ──────────────────────────────────────────────────────────────
chip:
  selector: lib-chip
  status: implemented
  component:
    file: src/app/shared/components/chip/chip.component.ts
    styles: src/app/shared/components/chip/chip.component.scss
    standalone: true
    imports: []

  description: >
    Reusable filter chip component used for inline filter lists.
    Supports selected/unselected toggle states, optional count badge,
    and variant-based coloring. Emits a click event when toggled.

  types:
    - name: ChipVariant
      definition: "'default' | 'success' | 'warning' | 'error' | 'neutral'"

  inputs:
    - name: label
      type: string
      required: true
      description: Display text for the chip
    - name: value
      type: string
      required: true
      description: Value emitted on selection (e.g. status enum value)
    - name: selected
      type: boolean
      default: "false"
      description: Whether the chip is currently selected/active
    - name: variant
      type: ChipVariant
      default: "'default'"
      description: >
        Color variant applied when selected. Uses matching semantic
        surface tokens. Unselected chips use neutral styling.
    - name: count
      type: "number | null"
      default: "null"
      description: >
        Optional count badge displayed inside the chip. When non-null
        and > 0, renders a small numeric badge after the label text.

  outputs:
    - name: chipClick
      type: string
      description: Emits the chip's value when clicked

  behavior:
    - "Toggleable chip with selected/unselected visual states"
    - "Selected state uses variant-specific background and text color"
    - "Unselected state uses neutral border and text"
    - "Optional count badge renders inline after label text"
    - "Emits chipClick with value on click"
    - "Uses role=option and aria-selected for accessibility"

  implementation: |
    import { Component, input, output } from '@angular/core';

    export type ChipVariant = 'default' | 'success' | 'warning' | 'error' | 'neutral';

    @Component({
      selector: 'lib-chip',
      standalone: true,
      template: `
        <button
          class="chip"
          [class.selected]="selected()"
          [class]="'variant-' + variant()"
          [attr.aria-selected]="selected()"
          role="option"
          (click)="chipClick.emit(value())"
        >
          <span class="chip__label">{{ label() }}</span>
          @if (count() !== null && count()! > 0) {
            <span class="chip__count">{{ count() }}</span>
          }
        </button>
      `,
      styleUrl: './chip.component.scss',
    })
    export class ChipComponent {
      label = input.required<string>();
      value = input.required<string>();
      selected = input<boolean>(false);
      variant = input<ChipVariant>('default');
      count = input<number | null>(null);

      chipClick = output<string>();
    }

  styles: |
    :host {
      display: inline-block;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-full, 9999px);
      border: 1px solid var(--neutral-color-3, #e0e0e0);
      background: var(--surface-default, #fff);
      color: var(--neutral-color-7, #646464);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 150ms ease;
      white-space: nowrap;

      &:hover:not(.selected) {
        border-color: var(--neutral-color-4, #c0c0c0);
        background: var(--neutral-color-1, #fafafa);
      }

      &.selected {
        border-color: transparent;
      }

      // ── Variant colors (applied when selected) ──────────────
      &.selected.variant-default {
        background: var(--primary-color-100, #e0f2f1);
        color: var(--primary-color-700, #00796b);
        border-color: var(--primary-color-200, #b2dfdb);
      }

      &.selected.variant-success {
        background: var(--surface-success-subtle, #e8f5e9);
        color: var(--success-color-8, #2e7d32);
        border-color: transparent;
      }

      &.selected.variant-warning {
        background: var(--surface-warning-subtle, #fff8e1);
        color: var(--warning-color-8, #e86722);
        border-color: transparent;
      }

      &.selected.variant-error {
        background: var(--surface-error-subtle, #ffebee);
        color: var(--error-color-8, #c62828);
        border-color: transparent;
      }

      &.selected.variant-neutral {
        background: var(--neutral-color-2, #f2f2f2);
        color: var(--neutral-color-8, #424242);
        border-color: transparent;
      }
    }

    .chip__count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: var(--radius-full, 9999px);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      background: currentColor;
      // Use contrasting text color for count badge
      .chip:not(.selected) & {
        background: var(--neutral-color-3, #e0e0e0);
        color: var(--neutral-color-7, #646464);
      }
      .chip.selected & {
        background: currentColor;
        // White text on colored background
        span { color: #fff; }
      }
    }

    // Use a pseudo-element approach for the count text color
    .chip__count {
      position: relative;
      color: #fff;
      -webkit-text-fill-color: #fff;
    }

    .chip:not(.selected) .chip__count {
      color: var(--neutral-color-7, #646464);
      -webkit-text-fill-color: var(--neutral-color-7, #646464);
      background: var(--neutral-color-3, #e0e0e0);
    }

  usage: |
    <!-- Status filter chips -->
    <div class="chip-list" role="listbox" aria-label="Filter by status">
      <lib-chip label="All" value="All" [selected]="filter() === 'All'" (chipClick)="setFilter($event)" />
      <lib-chip label="Active" value="ACTIVE" variant="success" [selected]="filter() === 'ACTIVE'" (chipClick)="setFilter($event)" />
      <lib-chip label="Pending" value="PENDING" variant="warning" [selected]="filter() === 'PENDING'" [count]="pendingCount()" (chipClick)="setFilter($event)" />
      <lib-chip label="Rejected" value="REJECTED" variant="error" [selected]="filter() === 'REJECTED'" (chipClick)="setFilter($event)" />
    </div>

# ──────────────────────────────────────────────────────────────
# DIALOG COMPONENT
# ──────────────────────────────────────────────────────────────
dialog:
  selector: lib-dialog
  status: planned
  component:
    file: src/app/shared/components/dialog/dialog.component.ts
    template: src/app/shared/components/dialog/dialog.component.html
    styles: src/app/shared/components/dialog/dialog.component.scss
    standalone: true
    imports: []

  inputs:
    - name: open
      type: boolean
      default: "false"
      description: Whether the dialog is visible
    - name: title
      type: string
      default: "''"
      description: Dialog header title text
    - name: width
      type: string
      default: "'480px'"
      description: Dialog max-width

  outputs:
    - name: closed
      type: void
      description: Emitted when dialog is closed (backdrop click, escape, or close button)

  behavior:
    - "Shadow-xl only (no border) for floating overlay feel"
    - "Backdrop with blur effect and --surface-overlay color"
    - "Focus trap: Tab cycles through dialog focusable elements"
    - "Escape key closes dialog"
    - "Backdrop click closes dialog"
    - "Scale animation on open (0.95 -> 1.0 with ease-out)"
    - "Three content projection slots: header actions, body, footer"

  template: |
    @if (open()) {
      <div class="dialog-backdrop" (click)="onBackdropClick()">
        <div
          class="dialog-panel"
          [style.max-width]="width()"
          role="dialog"
          aria-modal="true"
          [attr.aria-label]="title()"
          (click)="$event.stopPropagation()"
          (keydown.escape)="close()"
        >
          <div class="dialog-header">
            <h2 class="dialog-title text-title-large">{{ title() }}</h2>
            <button
              class="dialog-close"
              type="button"
              aria-label="Close dialog"
              (click)="close()"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <div class="dialog-body">
            <ng-content />
          </div>
          <div class="dialog-footer">
            <ng-content select="[dialog-footer]" />
          </div>
        </div>
      </div>
    }

  styles: |
    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background-color: var(--surface-overlay);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-index-modal-backdrop);
      animation: fadeIn var(--duration-normal) var(--easing-ease-out);
    }

    .dialog-panel {
      background-color: var(--neutral-color-0);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      z-index: var(--z-index-modal);
      animation: scaleIn var(--duration-normal) var(--easing-ease-out);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-lg) var(--spacing-lg) var(--spacing-md);
    }

    .dialog-title {
      margin: 0;
    }

    .dialog-close {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--neutral-color-6);
      cursor: pointer;
      padding: var(--spacing-xs);
      border-radius: var(--radius-sm);

      &:hover {
        background-color: var(--surface-hover);
        color: var(--neutral-color-9);
      }
    }

    .dialog-body {
      padding: 0 var(--spacing-lg);
      overflow-y: auto;
      flex: 1;
    }

    .dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-lg) var(--spacing-lg);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

  usage: |
    <lib-dialog
      [open]="showConfirm"
      title="Confirm Deletion"
      (closed)="showConfirm = false"
    >
      <p>Are you sure you want to delete this course?</p>
      <div dialog-footer>
        <lib-button variant="secondary" (buttonClick)="showConfirm = false">Cancel</lib-button>
        <lib-button variant="destructive" (buttonClick)="onDelete()">Delete</lib-button>
      </div>
    </lib-dialog>

# ──────────────────────────────────────────────────────────────
# TOAST COMPONENT
# ──────────────────────────────────────────────────────────────
toast:
  selector: lib-toast
  status: planned
  component:
    file: src/app/shared/components/toast/toast.component.ts
    template: src/app/shared/components/toast/toast.component.html
    styles: src/app/shared/components/toast/toast.component.scss
    standalone: true
    imports: []

  types:
    - name: ToastVariant
      definition: "'success' | 'error' | 'warning' | 'info'"
    - name: ToastPosition
      definition: "'top-right' | 'top-center' | 'bottom-right'"

  inputs:
    - name: message
      type: string
      required: true
      description: Toast message text
    - name: variant
      type: ToastVariant
      default: "'info'"
      description: Visual style variant
    - name: duration
      type: number
      default: "5000"
      description: Auto-dismiss duration in milliseconds (0 = no auto-dismiss)
    - name: dismissible
      type: boolean
      default: "true"
      description: Show close button

  outputs:
    - name: dismissed
      type: void
      description: Emitted when toast is dismissed (auto or manual)

  behavior:
    - "Shadow-lg only (no border) for floating notification feel"
    - "Slide-in animation from the right"
    - "Auto-dismiss after duration (default 5s)"
    - "Manual dismiss via close button"
    - "Variant-specific icon and left accent border"
    - "Stacks vertically when multiple toasts are shown"

  template: |
    <div
      class="toast"
      [class]="variant()"
      role="alert"
      aria-live="polite"
    >
      <span class="toast-icon material-symbols-outlined">{{ iconName() }}</span>
      <span class="toast-message">{{ message() }}</span>
      @if (dismissible()) {
        <button
          class="toast-close"
          type="button"
          aria-label="Dismiss"
          (click)="dismiss()"
        >
          <span class="material-symbols-outlined">close</span>
        </button>
      }
    </div>

  styles: |
    :host {
      display: block;
      position: fixed;
      top: var(--spacing-lg);
      right: var(--spacing-lg);
      z-index: var(--z-index-toast);
      animation: slideInRight var(--duration-slow) var(--easing-ease-out);
    }

    .toast {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      background-color: var(--neutral-color-0);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      min-width: 320px;
      max-width: 480px;
      border-left: 3px solid transparent;

      &.success { border-left-color: var(--success-color); }
      &.error { border-left-color: var(--error-color); }
      &.warning { border-left-color: var(--warning-color); }
      &.info { border-left-color: var(--primary-color); }
    }

    .toast-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .success .toast-icon { color: var(--success-color); }
    .error .toast-icon { color: var(--error-color); }
    .warning .toast-icon { color: var(--warning-color); }
    .info .toast-icon { color: var(--primary-color); }

    .toast-message {
      flex: 1;
      font-size: var(--body-medium-size);
      color: var(--text-primary-color);
    }

    .toast-close {
      display: flex;
      background: none;
      border: none;
      color: var(--neutral-color-5);
      cursor: pointer;
      padding: 0;

      &:hover { color: var(--neutral-color-8); }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

  computed:
    - name: iconName
      expression: "{ success: 'check_circle', error: 'error', warning: 'warning', info: 'info' }[this.variant()]"

  usage: |
    <lib-toast
      message="Course saved successfully"
      variant="success"
      (dismissed)="onToastDismissed()"
    />

# ──────────────────────────────────────────────────────────────
# TABS COMPONENT
# ──────────────────────────────────────────────────────────────
tabs:
  selector: lib-tabs
  status: planned
  component:
    file: src/app/shared/components/tabs/tabs.component.ts
    template: src/app/shared/components/tabs/tabs.component.html
    styles: src/app/shared/components/tabs/tabs.component.scss
    standalone: true
    imports: []

  types:
    - name: Tab
      definition: "{ label: string; value: string; disabled?: boolean }"

  inputs:
    - name: tabs
      type: "Tab[]"
      required: true
      description: List of tab definitions
    - name: activeTab
      type: string
      required: true
      description: Currently active tab value

  outputs:
    - name: tabChange
      type: string
      description: Emitted with tab value when active tab changes

  behavior:
    - "Bottom 2px primary border indicator on active tab"
    - "Keyboard navigation: left/right arrows move between tabs"
    - "Home/End keys jump to first/last tab"
    - "Disabled tabs are visually muted and non-interactive"
    - "ARIA tabs pattern (role=tablist, role=tab, aria-selected)"

  template: |
    <div class="tabs" role="tablist">
      @for (tab of tabs(); track tab.value) {
        <button
          class="tab"
          role="tab"
          type="button"
          [class.active]="activeTab() === tab.value"
          [class.disabled]="tab.disabled"
          [attr.aria-selected]="activeTab() === tab.value"
          [attr.aria-disabled]="tab.disabled"
          [disabled]="tab.disabled"
          (click)="selectTab(tab.value)"
          (keydown)="onKeydown($event)"
        >
          {{ tab.label }}
        </button>
      }
    </div>

  styles: |
    :host {
      display: block;
    }

    .tabs {
      display: flex;
      border-bottom: var(--border-subtle);
      gap: var(--spacing-xs);
    }

    .tab {
      padding: var(--spacing-sm) var(--spacing-md);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-secondary-color);
      font-size: var(--body-medium-size);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition:
        color var(--duration-normal) var(--easing-ease-in-out),
        border-color var(--duration-normal) var(--easing-ease-in-out);
      white-space: nowrap;

      &:hover:not(.disabled) {
        color: var(--text-primary-color);
      }

      &.active {
        color: var(--primary-color-600);
        border-bottom-color: var(--primary-color-600);
      }

      &.disabled {
        color: var(--neutral-color-5);
        cursor: not-allowed;
        opacity: var(--opacity-disabled);
      }

      &:focus-visible {
        box-shadow: var(--focus-ring);
        border-radius: var(--radius-xs);
        outline: none;
      }
    }

  usage: |
    <lib-tabs
      [tabs]="[
        { label: 'My Courses', value: 'enrolled' },
        { label: 'All Courses', value: 'all' },
        { label: 'Completed', value: 'completed' }
      ]"
      [activeTab]="currentTab"
      (tabChange)="currentTab = $event"
    />

