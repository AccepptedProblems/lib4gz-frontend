  usage: |
    <lib-card variant="elevated" [hoverable]="true">
      <h3>Course Title</h3>
      <p>Course description text</p>
    </lib-card>

    <lib-card variant="outlined" padding="lg">
      <p>Settings panel content</p>
    </lib-card>

