# ──────────────────────────────────────────────────────────────
# SKELETON COMPONENT
# ──────────────────────────────────────────────────────────────
skeleton:
  selector: lib-skeleton
  status: planned
  component:
    file: src/app/shared/components/skeleton/skeleton.component.ts
    template: src/app/shared/components/skeleton/skeleton.component.html
    styles: src/app/shared/components/skeleton/skeleton.component.scss
    standalone: true
    imports: []

  types:
    - name: SkeletonVariant
      definition: "'text' | 'circle' | 'rect'"

  inputs:
    - name: variant
      type: SkeletonVariant
      default: "'text'"
      description: Shape variant (text=line, circle=avatar, rect=card/image)
    - name: width
      type: string
      default: "'100%'"
      description: Element width
    - name: height
      type: string
      default: "'16px'"
      description: Element height (ignored for circle, uses width)
    - name: lines
      type: number
      default: "1"
      description: Number of text lines (only for text variant)

  behavior:
    - "Shimmer animation using CSS gradient moving left-to-right"
    - "Text variant: horizontal bar with rounded ends"
    - "Circle variant: perfect circle (width=height)"
    - "Rect variant: rectangle with border-radius"
    - "Multiple lines: last line at 75% width for natural look"

  template: |
    @if (variant() === 'text') {
      @for (i of lineArray(); track i) {
        <div
          class="skeleton text"
          [class.last-line]="i === lines() - 1 && lines() > 1"
          [style.width]="i === lines() - 1 && lines() > 1 ? '75%' : width()"
          [style.height]="height()"
        ></div>
      }
    } @else if (variant() === 'circle') {
      <div
        class="skeleton circle"
        [style.width]="width()"
        [style.height]="width()"
      ></div>
    } @else {
      <div
        class="skeleton rect"
        [style.width]="width()"
        [style.height]="height()"
      ></div>
    }

  styles: |
    :host {
      display: block;
    }

    .skeleton {
      background: linear-gradient(
        90deg,
        var(--neutral-color-2) 25%,
        var(--neutral-color-1) 50%,
        var(--neutral-color-2) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;

      &.text {
        border-radius: var(--radius-xs);
        margin-bottom: var(--spacing-xs);
      }

      &.circle {
        border-radius: var(--radius-full);
      }

      &.rect {
        border-radius: var(--radius-md);
      }
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

  computed:
    - name: lineArray
      expression: "Array.from({ length: this.lines() }, (_, i) => i)"

  usage: |
    <!-- Text skeleton (3 lines) -->
    <lib-skeleton variant="text" [lines]="3" height="14px" />

    <!-- Avatar skeleton -->
    <lib-skeleton variant="circle" width="40px" />

    <!-- Card image skeleton -->
    <lib-skeleton variant="rect" width="100%" height="200px" />

# ──────────────────────────────────────────────────────────────
# AVATAR COMPONENT
# ──────────────────────────────────────────────────────────────
avatar:
  selector: lib-avatar
  status: planned
  component:
    file: src/app/shared/components/avatar/avatar.component.ts
    template: src/app/shared/components/avatar/avatar.component.html
    styles: src/app/shared/components/avatar/avatar.component.scss
    standalone: true
    imports: []

  types:
    - name: AvatarSize
      definition: "'sm' | 'md' | 'lg'"

  inputs:
    - name: src
      type: "string | null"
      default: "null"
      description: Image URL for the avatar
    - name: name
      type: string
      default: "''"
      description: User name (used for initials fallback and alt text)
    - name: size
      type: AvatarSize
      default: "'md'"
      description: "Avatar size (sm=28px, md=36px, lg=48px)"

  computed:
    - name: initials
      expression: >
        this.name().split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2)
      description: Up to 2 initials from the name
    - name: sizeInPx
      expression: "{ sm: 28, md: 36, lg: 48 }[this.size()]"

  behavior:
    - "Shows image when src is provided and loads successfully"
    - "Falls back to initials on colored background when no image or image fails"
    - "Initials background uses primary-color-100 with primary-color-700 text"
    - "Always circular (border-radius: full)"

  template: |
    <div
      class="avatar"
      [class]="'size-' + size()"
      [attr.aria-label]="name()"
    >
      @if (src() && !imgError) {
        <img
          [src]="src()"
          [alt]="name()"
          (error)="imgError = true"
        />
      } @else {
        <span class="initials">{{ initials() }}</span>
      }
    </div>

  styles: |
    :host {
      display: inline-block;
    }

    .avatar {
      border-radius: var(--radius-full);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--primary-color-100);
      color: var(--primary-color-700);
      font-weight: var(--font-weight-medium);

      &.size-sm { width: 28px; height: 28px; font-size: 11px; }
      &.size-md { width: 36px; height: 36px; font-size: 14px; }
      &.size-lg { width: 48px; height: 48px; font-size: 18px; }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    }

    .initials {
      line-height: 1;
      user-select: none;
    }

  usage: |
    <lib-avatar src="/api/users/123/avatar" name="John Doe" size="md" />
    <lib-avatar name="Jane Smith" size="lg" />
    <lib-avatar size="sm" />

# ──────────────────────────────────────────────────────────────
# PROGRESS BAR COMPONENT
# ──────────────────────────────────────────────────────────────
progress_bar:
  selector: lib-progress-bar
  status: planned
  component:
    file: src/app/shared/components/progress-bar/progress-bar.component.ts
    template: src/app/shared/components/progress-bar/progress-bar.component.html
    styles: src/app/shared/components/progress-bar/progress-bar.component.scss
    standalone: true
    imports: []

  inputs:
    - name: value
      type: number
      default: "0"
      description: Progress percentage (0-100)
    - name: showLabel
      type: boolean
      default: "false"
      description: Show percentage label
    - name: variant
      type: "'primary' | 'success'"
      default: "'primary'"
      description: Fill color variant

  computed:
    - name: clampedValue
      expression: "Math.max(0, Math.min(100, this.value()))"

  behavior:
    - "Track + fill bar pattern"
    - "Fill width is percentage of value"
    - "Optional label shows percentage text"
    - "Smooth width transition on value change"

  template: |
    <div class="progress-bar" role="progressbar"
      [attr.aria-valuenow]="clampedValue()"
      aria-valuemin="0"
      aria-valuemax="100"
    >
      <div class="progress-track">
        <div
          class="progress-fill"
          [class]="variant()"
          [style.width.%]="clampedValue()"
        ></div>
      </div>
      @if (showLabel()) {
        <span class="progress-label">{{ clampedValue() }}%</span>
      }
    </div>

  styles: |
    :host {
      display: block;
    }

    .progress-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background-color: var(--neutral-color-2);
      border-radius: var(--radius-full);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width var(--duration-slow) var(--easing-ease-in-out);

      &.primary { background-color: var(--primary-color-500); }
      &.success { background-color: var(--success-color); }
    }

    .progress-label {
      font-size: var(--label-small-size);
      color: var(--text-secondary-color);
      min-width: 36px;
      text-align: right;
    }

  usage: |
    <lib-progress-bar [value]="75" [showLabel]="true" />
    <lib-progress-bar [value]="courseProgress" variant="success" />

# ──────────────────────────────────────────────────────────────
# BREADCRUMB COMPONENT
# ──────────────────────────────────────────────────────────────
breadcrumb:
  selector: lib-breadcrumb
  status: planned
  component:
    file: src/app/shared/components/breadcrumb/breadcrumb.component.ts
    template: src/app/shared/components/breadcrumb/breadcrumb.component.html
    styles: src/app/shared/components/breadcrumb/breadcrumb.component.scss
    standalone: true
    imports: [RouterLink]

  types:
    - name: BreadcrumbItem
      definition: "{ label: string; routerLink?: string | any[] }"

  inputs:
    - name: items
      type: "BreadcrumbItem[]"
      required: true
      description: Ordered list of breadcrumb path items

  behavior:
    - "Displays path items separated by chevron_right icon"
    - "All items except the last are links"
    - "Last item is plain text (current page)"
    - "Uses nav element with aria-label='Breadcrumb'"

  template: |
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol>
        @for (item of items(); track item.label; let last = $last) {
          <li>
            @if (!last && item.routerLink) {
              <a [routerLink]="item.routerLink">{{ item.label }}</a>
            } @else {
              <span class="current" [attr.aria-current]="last ? 'page' : null">
                {{ item.label }}
              </span>
            }
            @if (!last) {
              <span class="separator material-symbols-outlined">chevron_right</span>
            }
          </li>
        }
      </ol>
    </nav>

  styles: |
    :host {
      display: block;
    }

    .breadcrumb ol {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: var(--spacing-xxs);
    }

    .breadcrumb li {
      display: flex;
      align-items: center;
      gap: var(--spacing-xxs);
    }

    .breadcrumb a {
      color: var(--primary-color-600);
      text-decoration: none;
      font-size: var(--body-medium-size);

      &:hover {
        text-decoration: underline;
      }
    }

    .current {
      color: var(--text-secondary-color);
      font-size: var(--body-medium-size);
    }

    .separator {
      font-size: 18px;
      color: var(--neutral-color-5);
    }

  usage: |
    <lib-breadcrumb
      [items]="[
        { label: 'Dashboard', routerLink: '/' },
        { label: 'Course Name', routerLink: '/course/123' },
        { label: 'Lesson 1' }
      ]"
    />

# ──────────────────────────────────────────────────────────────
# PAGINATION COMPONENT
# ──────────────────────────────────────────────────────────────
pagination:
  selector: lib-pagination
  status: planned
  component:
    file: src/app/shared/components/pagination/pagination.component.ts
    template: src/app/shared/components/pagination/pagination.component.html
    styles: src/app/shared/components/pagination/pagination.component.scss
    standalone: true
    imports: []

  inputs:
    - name: totalItems
      type: number
      required: true
      description: Total number of items
    - name: pageSize
      type: number
      default: "10"
      description: Items per page
    - name: currentPage
      type: number
      default: "1"
      description: Current active page (1-indexed)
    - name: pageSizeOptions
      type: "number[]"
      default: "[10, 25, 50]"
      description: Available page size options for dropdown

  outputs:
    - name: pageChange
      type: number
      description: Emitted with new page number
    - name: pageSizeChange
      type: number
      description: Emitted with new page size

  computed:
    - name: totalPages
      expression: "Math.ceil(this.totalItems() / this.pageSize())"
    - name: pages
      expression: "computed array of visible page numbers with ellipsis"
      description: >
        Shows first, last, current, and adjacent pages.
        Uses -1 sentinel for ellipsis gaps.

  behavior:
    - "Page number buttons with prev/next navigation"
    - "Ellipsis for large page ranges"
    - "Items-per-page dropdown"
    - "Prev disabled on page 1, next disabled on last page"
    - "Keyboard accessible"

  template: |
    <div class="pagination">
      <div class="page-size">
        <label class="page-size-label">Items per page:</label>
        <select
          class="page-size-select"
          [value]="pageSize()"
          (change)="onPageSizeChange($event)"
        >
          @for (size of pageSizeOptions(); track size) {
            <option [value]="size">{{ size }}</option>
          }
        </select>
      </div>
      <div class="page-controls">
        <button
          class="page-btn nav"
          [disabled]="currentPage() <= 1"
          (click)="goToPage(currentPage() - 1)"
          aria-label="Previous page"
        >
          <span class="material-symbols-outlined">chevron_left</span>
        </button>
        @for (page of pages(); track $index) {
          @if (page === -1) {
            <span class="ellipsis">...</span>
          } @else {
            <button
              class="page-btn"
              [class.active]="page === currentPage()"
              (click)="goToPage(page)"
              [attr.aria-current]="page === currentPage() ? 'page' : null"
            >
              {{ page }}
            </button>
          }
        }
        <button
          class="page-btn nav"
          [disabled]="currentPage() >= totalPages()"
          (click)="goToPage(currentPage() + 1)"
          aria-label="Next page"
        >
          <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </div>

  styles: |
    :host {
      display: block;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-sm) 0;
      gap: var(--spacing-md);
    }

    .page-size {
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .page-size-label {
      font-size: var(--body-medium-size);
      color: var(--text-secondary-color);
    }

    .page-size-select {
      border: var(--border-strong);
      border-radius: var(--radius-sm);
      padding: var(--spacing-xxs) var(--spacing-xs);
      font-size: var(--body-medium-size);
      background-color: var(--neutral-color-0);
    }

    .page-controls {
      display: flex;
      align-items: center;
      gap: var(--spacing-xxs);
    }

    .page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      border: none;
      border-radius: var(--radius-sm);
      background: none;
      color: var(--text-primary-color);
      font-size: var(--body-medium-size);
      cursor: pointer;
      transition: background-color var(--duration-fast) var(--easing-ease);

      &:hover:not(:disabled):not(.active) {
        background-color: var(--surface-hover);
      }

      &.active {
        background-color: var(--primary-color-600);
        color: var(--neutral-color-0);
      }

      &:disabled {
        color: var(--neutral-color-4);
        cursor: not-allowed;
      }

      &.nav .material-symbols-outlined {
        font-size: 20px;
      }

      &:focus-visible {
        box-shadow: var(--focus-ring);
        outline: none;
      }
    }

    .ellipsis {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      color: var(--text-secondary-color);
    }

  usage: |
    <lib-pagination
      [totalItems]="students.length"
      [pageSize]="pageSize"
      [currentPage]="currentPage"
      (pageChange)="currentPage = $event"
      (pageSizeChange)="onPageSizeChange($event)"
    />

# ──────────────────────────────────────────────────────────────
# DROPDOWN MENU COMPONENT
# ──────────────────────────────────────────────────────────────
dropdown_menu:
  selector: lib-dropdown-menu
  status: planned
  component:
    file: src/app/shared/components/dropdown-menu/dropdown-menu.component.ts
    template: src/app/shared/components/dropdown-menu/dropdown-menu.component.html
    styles: src/app/shared/components/dropdown-menu/dropdown-menu.component.scss
    standalone: true
    imports: []

  types:
    - name: DropdownItem
      definition: "{ label: string; value: string; icon?: string; disabled?: boolean; danger?: boolean }"
    - name: DropdownPosition
      definition: "'bottom-left' | 'bottom-right'"

  inputs:
    - name: items
      type: "DropdownItem[]"
      required: true
      description: Menu items
    - name: position
      type: DropdownPosition
      default: "'bottom-left'"
      description: Dropdown panel position relative to trigger

  outputs:
    - name: itemClick
      type: DropdownItem
      description: Emitted when a menu item is clicked

  behavior:
    - "Border-subtle + shadow-lg for floating dropdown feel"
    - "Trigger element projected via ng-content select='[trigger]'"
    - "Click on trigger toggles menu open/closed"
    - "Click outside closes menu"
    - "Escape key closes menu"
    - "Hover items show surface-hover background"
    - "Danger items show error color text"
    - "Keyboard navigation: up/down arrows, Enter to select"

  template: |
    <div class="dropdown" (clickOutside)="close()">
      <div class="dropdown-trigger" (click)="toggle()">
        <ng-content select="[trigger]" />
      </div>
      @if (isOpen) {
        <div class="dropdown-panel" [class]="position()" (keydown.escape)="close()">
          @for (item of items(); track item.value) {
            <button
              class="dropdown-item"
              [class.danger]="item.danger"
              [class.disabled]="item.disabled"
              [disabled]="item.disabled"
              (click)="selectItem(item)"
            >
              @if (item.icon) {
                <span class="material-symbols-outlined dropdown-item-icon">{{ item.icon }}</span>
              }
              {{ item.label }}
            </button>
          }
        </div>
      }
    </div>

  styles: |
    :host {
      display: inline-block;
      position: relative;
    }

    .dropdown-trigger {
      cursor: pointer;
    }

    .dropdown-panel {
      position: absolute;
      top: 100%;
      margin-top: var(--spacing-xs);
      min-width: 180px;
      background-color: var(--neutral-color-0);
      border: var(--border-subtle);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: var(--z-index-dropdown);
      padding: var(--spacing-xs) 0;
      animation: fadeIn var(--duration-fast) var(--easing-ease-out);

      &.bottom-left { left: 0; }
      &.bottom-right { right: 0; }
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      width: 100%;
      padding: var(--spacing-sm) var(--spacing-md);
      background: none;
      border: none;
      color: var(--text-primary-color);
      font-size: var(--body-medium-size);
      cursor: pointer;
      text-align: left;
      transition: background-color var(--duration-fast) var(--easing-ease);

      &:hover:not(:disabled) {
        background-color: var(--surface-hover);
      }

      &.danger {
        color: var(--error-color);
      }

      &.disabled {
        color: var(--neutral-color-5);
        cursor: not-allowed;
      }

      &:focus-visible {
        background-color: var(--surface-hover);
        outline: none;
      }
    }

    .dropdown-item-icon {
      font-size: 18px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

  usage: |
    <lib-dropdown-menu
      [items]="[
        { label: 'Edit', value: 'edit', icon: 'edit' },
        { label: 'Duplicate', value: 'duplicate', icon: 'content_copy' },
        { label: 'Delete', value: 'delete', icon: 'delete', danger: true }
      ]"
      (itemClick)="onMenuAction($event)"
    >
      <button trigger type="button">
        <span class="material-symbols-outlined">more_vert</span>
      </button>
    </lib-dropdown-menu>
