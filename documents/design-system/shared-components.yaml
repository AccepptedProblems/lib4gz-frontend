        flat = no border or shadow.
    - name: hoverable
      type: boolean
      default: "false"
      description: Enable hover lift effect (shadow-md + translateY(-2px))
    - name: padding
      type: string
      default: "'md'"
      description: "Content padding using spacing tokens (none, sm, md, lg)"

  behavior:
    - "Content projection via ng-content for flexible card body"
    - "Elevated variant: --border-subtle + --shadow-xs at rest"
    - "Hoverable: transitions to --shadow-md + translateY(-2px) on hover"
    - "Outlined variant: --border-default, no shadow"
    - "Flat variant: no border, no shadow (background only)"

  template: |
    <div
      class="card"
      [class.elevated]="variant() === 'elevated'"
      [class.outlined]="variant() === 'outlined'"
      [class.flat]="variant() === 'flat'"
      [class.hoverable]="hoverable()"
      [class]="'padding-' + padding()"
    >
      <ng-content />
    </div>

  styles: |
    :host {
      display: block;
    }

    .card {
      background-color: var(--card-bg-color);
      border-radius: var(--radius-md);
      transition:
        box-shadow var(--duration-normal) var(--easing-ease-in-out),
        transform var(--duration-normal) var(--easing-ease-in-out);

      &.elevated {
        border: var(--border-subtle);
        box-shadow: var(--card-shadow);
      }

      &.outlined {
