openspec: "1.0"
kind: SharedComponents
info:
  title: LMS Platform - Shared Angular Components
  version: "1.0.0"
  description: >
    Reusable Angular standalone components used across the application.
    Located in src/app/shared/components/.

barrel_export:
  file: src/app/shared/components/index.ts
  exports:
    - ./button/button.component
    - ./spinner/spinner.component
    - ./input/input.component
    - ./card/card.component
    - ./badge/badge.component
    - ./dialog/dialog.component
    - ./toast/toast.component
    - ./tabs/tabs.component
    - ./empty-state/empty-state.component
    - ./skeleton/skeleton.component
    - ./avatar/avatar.component
    - ./progress-bar/progress-bar.component
    - ./breadcrumb/breadcrumb.component
    - ./pagination/pagination.component
    - ./dropdown-menu/dropdown-menu.component
    - ./chip/chip.component
    - ./textarea/textarea.component

# ──────────────────────────────────────────────────────────────
# TEXTAREA COMPONENT
# ──────────────────────────────────────────────────────────────
textarea:
  selector: lib-textarea
  status: implemented
  component:
    file: src/app/shared/components/textarea/textarea.component.ts
    template: src/app/shared/components/textarea/textarea.component.html
    styles: src/app/shared/components/textarea/textarea.component.scss
    standalone: true
    imports: []

  description: >
    Reusable auto-expanding textarea component. Height automatically adjusts
    to fit content — grows as the user types and shrinks when content is
    removed. Supports an optional floating label (matching lib-input design
    language), error state, disabled state, and size variants. Implements
    ControlValueAccessor for reactive/template-driven forms AND supports
    direct [value] + (valueChange) binding for simple use cases.

  types:
    - name: TextareaSize
      definition: "'normal' | 'small'"

  inputs:
    - name: label
      type: string
      default: "''"
      description: >
        Optional floating label. When provided, renders an animated label
        that floats above the textarea on focus or when content exists.
        When empty, no label is rendered (use ariaLabel for a11y).
    - name: placeholder
      type: string
      default: "''"
      description: >
        Native placeholder text. When a floating label is present, the
        placeholder is hidden until the label floats (focus or has value).
    - name: size
      type: TextareaSize
      default: "'normal'"
      description: >
        Controls padding, border-radius, and font-size. 'normal' uses
        16px padding and 8px border-radius. 'small' uses 12px 16px
        padding, 10px border-radius, and 0.875rem font-size.
    - name: error
      type: "string | null"
      default: "null"
      description: >
        Error message to display below the textarea. When set, the border
        and label turn error color (--error-color).
    - name: disabled
      type: boolean
      default: "false"
    - name: required
      type: boolean
      default: "false"
      description: "Adds ' *' after the floating label text."
    - name: minRows
      type: number
      default: "3"
      description: >
        Minimum visible rows. Sets the native rows attribute. The textarea
        never shrinks below this height during auto-resize.
    - name: maxRows
      type: number
      default: "15"
      description: >
        Maximum visible rows. Caps the textarea height via max-height
        computed as maxRows * line-height + vertical padding. When content
        exceeds this height, overflow-y switches to auto to show a scrollbar.
    - name: ariaLabel
      type: string
      default: "''"
      description: >
        Accessible label for screen readers when no floating label is used.
        Falls back to label value if ariaLabel is not provided.
    - name: value
      type: string
      default: "''"
      description: >
        Direct value binding input for non-CVA usage. When the parent sets
        [value], an internal effect syncs it to the textarea. Ignored when
        ControlValueAccessor is active (writeValue takes precedence).

  outputs:
    - name: valueChange
      type: string
      description: >
        Emitted on every input event with the current textarea value.
        Use with [value] for direct binding: [value]="signal()"
        (valueChange)="signal.set($event)".

  cva:
    description: >
      Implements ControlValueAccessor for integration with Angular
      reactive forms and ngModel. When writeValue is called, CVA mode
      activates and the [value] input is ignored.
    methods:
      - writeValue
      - registerOnChange
      - registerOnTouched
      - setDisabledState

  behavior:
    auto_resize: >
      On every input event, the textarea height is reset to 'auto' then
      set to scrollHeight + 'px'. This makes the textarea grow and shrink
      with content. CSS overflow-y is hidden by default but switches to
      auto when content exceeds maxRows height. The native rows attribute
      provides the minimum height. maxRows caps growth via max-height
      computed as maxRows * line-height (1.5em) + vertical padding, and
      autoResize clamps the height to this maximum. Auto-resize skips
      hidden elements (checks offsetParent) to prevent collapsing to
      zero height when inside unopened dialogs. CSS min-height (45px
      normal, 34px small) provides a safety floor matching lib-input.
      On value changes (via input binding or writeValue), resize is
      scheduled via afterNextRender to ensure DOM is updated first.

  design:
    matches: lib-input
    description: >
      Mirrors the lib-input component's visual design: same border color
      (--input-border-color), focus state (--primary-color border + label),
      error state (--error-color), disabled state (opacity 0.6), floating
      label animation, and size variants. The key difference is multi-line
      support with auto-expanding height and no resize handle.

  usage_patterns:
    - name: Direct binding (no label)
      example: |
        <lib-textarea
          [value]="mySignal()"
          (valueChange)="mySignal.set($event)"
          placeholder="Enter text..."
          [minRows]="3"
          ariaLabel="Description"
        />
    - name: With floating label
      example: |
        <lib-textarea
          label="Exercise Title"
          [value]="title()"
          (valueChange)="title.set($event)"
          [required]="true"
          [error]="titleError()"
          [minRows]="1"
        />
    - name: Small size (inline editing)
      example: |
        <lib-textarea
          [value]="description()"
          (valueChange)="description.set($event)"
          placeholder="Description"
          size="small"
          [minRows]="3"
        />

  current_implementation: |
    import {
      Component, input, output, signal, computed, forwardRef, effect,
      viewChild, ElementRef, afterNextRender, Injector, inject,
    } from '@angular/core';
    import {
      ControlValueAccessor, NG_VALUE_ACCESSOR,
    } from '@angular/forms';

    export type TextareaSize = 'normal' | 'small';

    @Component({
      selector: 'lib-textarea',
      standalone: true,
      templateUrl: './textarea.component.html',
      styleUrl: './textarea.component.scss',
      providers: [
        {
          provide: NG_VALUE_ACCESSOR,
          useExisting: forwardRef(() => TextareaComponent),
          multi: true,
        },
      ],
    })
    export class TextareaComponent implements ControlValueAccessor {
      private static nextId = 0;
      protected readonly textareaId = `lib-textarea-${TextareaComponent.nextId++}`;
      private readonly injector = inject(Injector);

      // Config inputs
      label = input<string>('');
      placeholder = input<string>('');
      size = input<TextareaSize>('normal');
      error = input<string | null>(null);
      disabled = input<boolean>(false);
      required = input<boolean>(false);
      minRows = input<number>(3);
      maxRows = input<number>(15);
      ariaLabel = input<string>('');

      // Value input for direct binding (non-CVA)
      value = input<string>('');
      valueChange = output<string>();

      // Internal state
      protected internalValue = signal<string>('');
      focused = signal<boolean>(false);
      private internalDisabled = signal<boolean>(false);
      private cvaActive = false;

      isFloating = computed(() => this.focused() || this.internalValue().length > 0);
      isDisabled = computed(() => this.disabled() || this.internalDisabled());

      protected textareaRef = viewChild<ElementRef<HTMLTextAreaElement>>('textareaEl');

      private onChange: (value: string) => void = () => {};
      private onTouched: () => void = () => {};

      constructor() {
        // Sync external value input → internal value (when not using CVA)
        effect(() => {
          const v = this.value();
          if (!this.cvaActive) {
            this.internalValue.set(v);
            this.scheduleResize();
          }
        });
      }

      // ── ControlValueAccessor ──────────────────────────────────────

      writeValue(val: string): void {
        this.cvaActive = true;
        this.internalValue.set(val ?? '');
        this.scheduleResize();
      }

      registerOnChange(fn: (value: string) => void): void {
        this.onChange = fn;
      }

      registerOnTouched(fn: () => void): void {
        this.onTouched = fn;
      }

      setDisabledState(isDisabled: boolean): void {
        this.internalDisabled.set(isDisabled);
      }

      // ── Event handlers ────────────────────────────────────────────

      onInput(event: Event): void {
        const target = event.target as HTMLTextAreaElement;
        this.internalValue.set(target.value);
        this.onChange(target.value);
        this.valueChange.emit(target.value);
        this.autoResize();
      }

      onFocus(): void {
        this.focused.set(true);
      }

      onBlur(): void {
        this.focused.set(false);
        this.onTouched();
      }

      // ── Auto-resize ───────────────────────────────────────────────

      autoResize(): void {
        const ta = this.textareaRef()?.nativeElement;
        if (!ta || !ta.offsetParent) return;
        ta.style.height = 'auto';
        const lineHeight = parseFloat(getComputedStyle(ta).lineHeight) || (parseFloat(getComputedStyle(ta).fontSize) * 1.5);
        const padding = parseFloat(getComputedStyle(ta).paddingTop) + parseFloat(getComputedStyle(ta).paddingBottom);
        const border = parseFloat(getComputedStyle(ta).borderTopWidth) + parseFloat(getComputedStyle(ta).borderBottomWidth);
        const maxHeight = lineHeight * this.maxRows() + padding + border;
        const clampedHeight = Math.min(ta.scrollHeight, maxHeight);
        ta.style.height = clampedHeight + 'px';
        ta.style.overflowY = ta.scrollHeight > maxHeight ? 'auto' : 'hidden';
      }

      private scheduleResize(): void {
        afterNextRender(() => this.autoResize(), { injector: this.injector });
      }
    }

  current_template: |
    <div
      class="textarea-wrapper"
      [class.normal]="size() === 'normal'"
      [class.small]="size() === 'small'"
      [class.focused]="focused()"
      [class.floating]="isFloating()"
      [class.has-error]="error()"
      [class.disabled]="isDisabled()"
      [class.has-label]="!!label()"
    >
      <div class="textarea-field">
        <textarea
          #textareaEl
          [id]="textareaId"
          [attr.rows]="minRows()"
          [disabled]="isDisabled()"
          [required]="required()"
          [value]="internalValue()"
          [placeholder]="label() && !isFloating() ? '' : placeholder()"
          [attr.aria-label]="ariaLabel() || label() || null"
          [attr.aria-invalid]="!!error()"
          [attr.aria-describedby]="error() ? textareaId + '-error' : null"
          (input)="onInput($event)"
          (focus)="onFocus()"
          (blur)="onBlur()"
        ></textarea>
        @if (label()) {
          <label [for]="textareaId" [class.required]="required()">
            {{ label() }}
          </label>
        }
      </div>
      @if (error()) {
        <span class="error-text" [id]="textareaId + '-error'" role="alert">
          {{ error() }}
        </span>
      }
    </div>

  current_styles: |
    :host {
      display: block;
      width: 100%;
    }

    .textarea-wrapper {
      width: 100%;

      .textarea-field {
        position: relative;

        textarea {
          width: 100%;
          box-sizing: border-box;
          border: 1px solid var(--input-border-color);
          background: transparent;
          outline: none;
          font-family: inherit;
          line-height: 1.5;
          resize: none;
          transition: border-color var(--duration-normal) var(--easing-ease-in-out);

          &:disabled {
            opacity: 0.6;
            cursor: not-allowed;
          }
        }

        label {
          position: absolute;
          left: 16px;
          color: var(--neutral-color-5);
          pointer-events: none;
          transition:
            top var(--duration-normal) var(--easing-ease-in-out),
            font-size var(--duration-normal) var(--easing-ease-in-out),
            color var(--duration-normal) var(--easing-ease-in-out),
            background-color var(--duration-normal) var(--easing-ease-in-out);

          &.required::after {
            content: ' *';
          }
        }
      }

      // ── Normal size ──
      &.normal .textarea-field {
        textarea {
          min-height: 45px;
          padding: 16px;
          border-radius: 8px;
        }
        label { top: 16px; }
      }

      &.normal.floating .textarea-field label {
        top: 0;
        transform: translateY(-50%);
        font-size: 0.75rem;
        background-color: var(--neutral-color-0);
        padding: 0 4px;
      }

      // ── Small size ──
      &.small .textarea-field {
        textarea {
          min-height: 34px;
          padding: 12px 16px;
          border-radius: 10px;
          font-size: 0.875rem;
        }
        label { top: 12px; font-size: 0.875rem; }
      }

      &.small.floating .textarea-field label {
        top: 0;
        transform: translateY(-50%);
        font-size: 0.7rem;
        background-color: var(--neutral-color-0);
        padding: 0 4px;
      }

      // ── Focused state ──
      &.focused .textarea-field {
        textarea { border-color: var(--primary-color); }
        label { color: var(--primary-color); }
      }

      // ── Error state ──
      &.has-error .textarea-field {
        textarea { border-color: var(--error-color); }
        label { color: var(--error-color); }
      }

      // ── Error text ──
      .error-text {
        display: block;
        color: var(--error-color);
        font-size: 0.75rem;
        margin-top: 4px;
        margin-left: var(--spacing-2);
      }

      // ── Disabled state ──
      &.disabled {
        opacity: 0.6;
        pointer-events: none;
      }

      // ── Prevent iOS zoom on focus ──
      @media (max-width: 768px) {
        &.normal .textarea-field textarea,
        &.small .textarea-field textarea {
          font-size: 16px;
        }
      }
    }

# ──────────────────────────────────────────────────────────────
# BUTTON COMPONENT
# ──────────────────────────────────────────────────────────────
button:
  selector: lib-button
  status: implemented
  component:
    file: src/app/shared/components/button/button.component.ts
    template: src/app/shared/components/button/button.component.html
    styles: src/app/shared/components/button/button.component.scss
    standalone: true
    imports: [SpinnerComponent]

  types:
    - name: ButtonVariant
      definition: "'primary' | 'secondary' | 'destructive'"
    - name: ButtonSize
      definition: "'sm' | 'md' | 'lg'"
    - name: ButtonType
      definition: "'button' | 'submit' | 'reset'"

  inputs:
    - name: isLoading
      type: boolean
      default: "false"
      description: Show loading spinner and disable interaction
    - name: variant
      type: ButtonVariant
      default: "'primary'"
      description: Visual style variant
    - name: size
      type: ButtonSize
      default: "'md'"
      description: Button size
    - name: disabled
      type: boolean
      default: "false"
      description: Disable the button
    - name: type
      type: ButtonType
      default: "'button'"
      description: Native button type attribute
    - name: routerLink
      type: "string | any[] | null"
      default: "null"
      description: Angular router navigation path
    - name: routerState
      type: "Record<string, any> | null"
      default: "null"
      description: Router state object for navigation
    - name: ariaLabel
      type: "string | null"
      default: "null"
      description: Accessibility label

  outputs:
    - name: buttonClick
      type: MouseEvent
      description: Emitted on click (after disabled/loading check)

  computed:
    - name: isDisabled
      expression: "this.disabled() || this.isLoading()"
      description: True when disabled OR loading
    - name: spinnerDiameter
      expression: "{ sm: 16, md: 20, lg: 24 }[this.size()]"
      description: Spinner size matched to button size

  behavior:
    - Returns early if isDisabled
    - If routerLink is set, navigates via Router.navigate()
    - Emits buttonClick output after navigation

  implementation: |
    import { Component, input, output, computed, inject } from '@angular/core';
    import { Router } from '@angular/router';
    import { SpinnerComponent } from '../spinner/spinner.component';

    export type ButtonVariant = 'primary' | 'secondary' | 'destructive';
    export type ButtonSize = 'sm' | 'md' | 'lg';
    export type ButtonType = 'button' | 'submit' | 'reset';

    @Component({
      selector: 'lib-button',
      standalone: true,
      imports: [SpinnerComponent],
      templateUrl: './button.component.html',
      styleUrl: './button.component.scss',
    })
    export class ButtonComponent {
      isLoading = input<boolean>(false);
      variant = input<ButtonVariant>('primary');
      size = input<ButtonSize>('md');
      disabled = input<boolean>(false);
      type = input<ButtonType>('button');
      routerLink = input<string | any[] | null>(null);
      routerState = input<Record<string, any> | null>(null);
      ariaLabel = input<string | null>(null);

      buttonClick = output<MouseEvent>();

      isDisabled = computed(() => this.disabled() || this.isLoading());

      spinnerDiameter = computed(() => {
        const sizeMap: Record<ButtonSize, number> = { sm: 16, md: 20, lg: 24 };
        return sizeMap[this.size()];
      });

      private router = inject(Router);

      handleClick(event: MouseEvent): void {
        if (this.isDisabled()) return;

        const link = this.routerLink();
        if (link) {
          const path = Array.isArray(link) ? link : [link];
          this.router.navigate(path, { state: this.routerState() ?? undefined });
        }

        this.buttonClick.emit(event);
      }
    }

  template: |
    <button
      [type]="type()"
      [disabled]="isDisabled()"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-busy]="isLoading()"
      [class.primary]="variant() === 'primary'"
      [class.secondary]="variant() === 'secondary'"
      [class.destructive]="variant() === 'destructive'"
      [class.sm]="size() === 'sm'"
      [class.md]="size() === 'md'"
      [class.lg]="size() === 'lg'"
      [class.loading]="isLoading()"
      (click)="handleClick($event)"
    >
      @if (isLoading()) {
        <lib-spinner
          [diameter]="spinnerDiameter()"
          type="inline"
          color="inherit"
          class="button-spinner"
        />
      }
      <span class="button-content" [class.hidden]="isLoading()">
        <ng-content />
      </span>
    </button>

  styles: |
    :host {
      display: inline-block;
    }

    button {
      width: 100%;
      position: relative;
      font-family: inherit;
    }

    .button-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      &.hidden {
        visibility: hidden;
      }
    }

    .button-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

  usage: |
    <lib-button
      variant="primary"
      size="md"
      [isLoading]="isSubmitting"
      (buttonClick)="onSubmit()"
    >
      Save Changes
    </lib-button>

    <lib-button
      variant="secondary"
      routerLink="/"
    >
      Cancel
    </lib-button>

    <lib-button
      variant="destructive"
      size="sm"
      (buttonClick)="onDelete()"
    >
      Delete
    </lib-button>

# ──────────────────────────────────────────────────────────────
# SPINNER COMPONENT
# ──────────────────────────────────────────────────────────────
spinner:
  selector: lib-spinner
  status: implemented
  component:
    file: src/app/shared/components/spinner/spinner.component.ts
    template: src/app/shared/components/spinner/spinner.component.html
    styles: src/app/shared/components/spinner/spinner.component.scss
    standalone: true
    imports: [MatProgressSpinner]
    dependency: "@angular/material/progress-spinner"

  types:
    - name: SpinnerType
      definition: "'screen' | 'inline' | 'overlay'"
    - name: SpinnerColor
      definition: "'primary' | 'accent' | 'inherit'"

  inputs:
    - name: type
      type: SpinnerType
      default: "'inline'"
      description: >
        Display mode. screen = full viewport, inline = fits content,
        overlay = fixed fullscreen with backdrop.
    - name: diameter
      type: number
      default: "40"
      description: Spinner size in pixels
    - name: strokeWidth
      type: number
      default: "4"
      description: Spinner stroke thickness
    - name: color
      type: SpinnerColor
      default: "'primary'"
      description: Color theme. inherit uses --spinner-color or currentColor.
    - name: label
      type: string
      default: "'Loading'"
      description: Accessibility label for screen readers

  computed:
    - name: matColor
      expression: "this.color() === 'inherit' ? undefined : this.color()"
      description: Maps color to Angular Material color input (undefined for inherit)

  implementation: |
    import { Component, input, computed } from '@angular/core';
    import { MatProgressSpinner } from '@angular/material/progress-spinner';

    export type SpinnerType = 'screen' | 'inline' | 'overlay';
    export type SpinnerColor = 'primary' | 'accent' | 'inherit';

    @Component({
      selector: 'lib-spinner',
      standalone: true,
      imports: [MatProgressSpinner],
      templateUrl: './spinner.component.html',
      styleUrl: './spinner.component.scss',
    })
    export class SpinnerComponent {
      type = input<SpinnerType>('inline');
      diameter = input<number>(40);
      strokeWidth = input<number>(4);
      color = input<SpinnerColor>('primary');
      label = input<string>('Loading');

      matColor = computed(() => {
        const c = this.color();
        return c === 'inherit' ? undefined : c;
      });
    }

  template: |
    <div
      class="spinner-container"
      [class.screen]="type() === 'screen'"
      [class.inline]="type() === 'inline'"
      [class.overlay]="type() === 'overlay'"
      [class.inherit-color]="color() === 'inherit'"
      role="status"
      [attr.aria-label]="label()"
    >
      <mat-spinner
        [diameter]="diameter()"
        [strokeWidth]="strokeWidth()"
        [color]="matColor()"
      />
    </div>

  styles: |
    .spinner-container {
      display: flex;
      align-items: center;
      justify-content: center;

      &.inline {
        width: auto;
        height: auto;
      }

      &.screen {
        width: 100%;
        height: calc(100vh - 70px);
        min-height: 200px;
      }

      &.overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(255, 255, 255, 0.8);
        z-index: var(--z-index-modal);
      }

      &.inherit-color {
        ::ng-deep .mdc-circular-progress__indeterminate-circle-graphic {
          stroke: var(--spinner-color, currentColor);
        }
      }
    }

  type_layouts:
    - type: inline
      description: Minimal sizing, fits within parent container
      use_case: Inside buttons, table cells, small containers

    - type: screen
      description: Full viewport height minus navbar (70px)
      use_case: Page-level loading state

    - type: overlay
      description: Fixed fullscreen with semi-transparent white backdrop
      use_case: Blocking operations that prevent interaction

  usage: |
    <!-- Inline spinner (in button) -->
    <lib-spinner type="inline" [diameter]="20" color="inherit" />

    <!-- Full page loading -->
    <lib-spinner type="screen" />

    <!-- Overlay during save -->
    <lib-spinner type="overlay" label="Saving..." />

# ──────────────────────────────────────────────────────────────
# INPUT COMPONENT
# ──────────────────────────────────────────────────────────────
input:
  selector: lib-input
  status: implemented
  component:
    file: src/app/shared/components/input/input.component.ts
    template: src/app/shared/components/input/input.component.html
    styles: src/app/shared/components/input/input.component.scss
    standalone: true
    imports: []
    providers:
      - provide: NG_VALUE_ACCESSOR
        useExisting: "forwardRef(() => InputComponent)"
        multi: true

  description: >
    Floating-label text input with ControlValueAccessor integration.
    Label acts as placeholder when empty/unfocused and animates to the
    top border edge on focus or when the input has a value.
    Similar to Angular Material outlined input, but implemented with
    pure CSS/HTML — no external library dependencies.

  layout:
    width: "100% of parent container by default (fluid)"
    host_display: block
    constraint: >
      Width is determined by the parent container. To fix the width,
      apply CSS on the host element (e.g. lib-input { width: 300px; })
      or constrain the parent container.

  types:
    - name: InputSize
      definition: "'normal' | 'small'"
    - name: InputType
      definition: "'text' | 'email' | 'password' | 'number' | 'tel' | 'url'"

  inputs:
    - name: label
      type: string
      required: true
      description: Label text displayed as floating placeholder
    - name: size
      type: InputSize
      default: "'normal'"
      description: "Input size variant (normal: 45px, small: 34px)"
    - name: type
      type: InputType
      default: "'text'"
      description: Native input type attribute
    - name: error
      type: "string | null"
      default: "null"
      description: Error message text. When set, input shows error styling.
    - name: disabled
      type: boolean
      default: "false"
      description: Disable the input
    - name: required
      type: boolean
      default: "false"
      description: Mark field as required (shows asterisk on label)

  signals:
    - name: value
      type: "signal<string>"
      initial: "''"
      description: Current input value (internal state managed by CVA)
    - name: focused
      type: "signal<boolean>"
      initial: "false"
      description: Whether input is currently focused
    - name: internalDisabled
      type: "signal<boolean>"
      initial: "false"
      description: Disabled state set by ControlValueAccessor.setDisabledState()

  computed:
    - name: isFloating
      expression: "this.focused() || this.value().length > 0"
      description: Label floats when input is focused or has a value
    - name: isDisabled
      expression: "this.disabled() || this.internalDisabled()"
      description: True when disabled via input or form control

  interfaces:
    - name: ControlValueAccessor
      source: "@angular/forms"
      description: Enables Angular reactive and template-driven form integration
      methods:
        - name: writeValue
          description: Sets value from form control
        - name: registerOnChange
          description: Registers change callback
        - name: registerOnTouched
          description: Registers touched callback
        - name: setDisabledState
          description: Updates internalDisabled signal from form control

  behavior:
    - "Label acts as placeholder when input is empty and not focused"
    - "On focus or when input has value: label animates to the top border edge"
    - "Floating label uses CSS transition on top, font-size, color, and background-color"
    - "Floating label gets a background-color patch to visually cut through the border"
    - "When focused, border and label color change to primary color"
    - "When error is set, border and label color change to error color"
    - "Inner .input-field div isolates input+label from error text so label top:50% is relative to input height only"
    - "Required indicator (*) appended to label text via ::after pseudo-element"
    - "Implements ControlValueAccessor for Angular reactive and template-driven forms"
    - "setDisabledState from form control merges with disabled input"
    - "onBlur triggers onTouched callback for form validation timing"
    - "Width fills parent container by default (:host display:block, wrapper width:100%)"
    - "Width can be constrained via CSS on the host element or by sizing the parent"

  implementation: |
    import {
      Component, input, computed, signal, forwardRef
    } from '@angular/core';
    import {
      ControlValueAccessor, NG_VALUE_ACCESSOR
    } from '@angular/forms';

    export type InputSize = 'normal' | 'small';
    export type InputType = 'text' | 'email' | 'password' | 'number' | 'tel' | 'url';

    @Component({
      selector: 'lib-input',
      standalone: true,
      imports: [],
      templateUrl: './input.component.html',
      styleUrl: './input.component.scss',
      providers: [
        {
          provide: NG_VALUE_ACCESSOR,
          useExisting: forwardRef(() => InputComponent),
          multi: true,
        },
      ],
    })
    export class InputComponent implements ControlValueAccessor {
      private static nextId = 0;
      protected readonly inputId = `lib-input-${InputComponent.nextId++}`;

      label = input.required<string>();
      size = input<InputSize>('normal');
      type = input<InputType>('text');
      error = input<string | null>(null);
      disabled = input<boolean>(false);
      required = input<boolean>(false);

      value = signal<string>('');
      focused = signal<boolean>(false);
      private internalDisabled = signal<boolean>(false);

      isFloating = computed(() => this.focused() || this.value().length > 0);
      isDisabled = computed(() => this.disabled() || this.internalDisabled());

      private onChange: (value: string) => void = () => {};
      private onTouched: () => void = () => {};

      writeValue(value: string): void {
        this.value.set(value ?? '');
      }

      registerOnChange(fn: (value: string) => void): void {
        this.onChange = fn;
      }

      registerOnTouched(fn: () => void): void {
        this.onTouched = fn;
      }

      setDisabledState(isDisabled: boolean): void {
        this.internalDisabled.set(isDisabled);
      }

      onInput(event: Event): void {
        const target = event.target as HTMLInputElement;
        this.value.set(target.value);
        this.onChange(target.value);
      }

      onFocus(): void {
        this.focused.set(true);
      }

      onBlur(): void {
        this.focused.set(false);
        this.onTouched();
      }
    }

  template: |
    <div
      class="input-wrapper"
      [class.normal]="size() === 'normal'"
      [class.small]="size() === 'small'"
      [class.focused]="focused()"
      [class.floating]="isFloating()"
      [class.has-error]="error()"
      [class.disabled]="isDisabled()"
    >
      <div class="input-field">
        <input
          [id]="inputId"
          [type]="type()"
          [disabled]="isDisabled()"
          [required]="required()"
          [value]="value()"
          [attr.aria-label]="label()"
          [attr.aria-invalid]="!!error()"
          [attr.aria-describedby]="error() ? inputId + '-error' : null"
          (input)="onInput($event)"
          (focus)="onFocus()"
          (blur)="onBlur()"
        />
        <label [for]="inputId" [class.required]="required()">
          {{ label() }}
        </label>
      </div>
      @if (error()) {
        <span class="error-text" [id]="inputId + '-error'" role="alert">
          {{ error() }}
        </span>
      }
    </div>

  styles: |
    :host {
      display: block;
      width: 100%;
    }

    .input-wrapper {
      width: 100%;

      .input-field {
        position: relative;

        input {
          width: 100%;
          box-sizing: border-box;
          border: 1px solid var(--neutral-color-4);
          background: transparent;
          outline: none;
          font-family: inherit;
          transition: border-color var(--duration-normal) var(--easing-ease-in-out);

          &:disabled {
            opacity: 0.6;
            cursor: not-allowed;
          }
        }

        label {
          position: absolute;
          left: 10px;
          color: var(--neutral-color-5);
          pointer-events: none;
          transition:
            top var(--duration-normal) var(--easing-ease-in-out),
            font-size var(--duration-normal) var(--easing-ease-in-out),
            color var(--duration-normal) var(--easing-ease-in-out),
            background-color var(--duration-normal) var(--easing-ease-in-out);

          &.required::after {
            content: ' *';
          }
        }
      }

      // ── Normal size (45px height) ──
      &.normal .input-field {
        input {
          height: 45px;
          padding: 0 10px;
          border-radius: 8px;
        }

        label {
          top: 50%;
          transform: translateY(-50%);
        }
      }

      &.normal.floating .input-field label {
        top: 0;
        transform: translateY(-50%);
        font-size: 0.75rem;
        background-color: var(--neutral-color-0);
        padding: 0 4px;
      }

      // ── Small size (34px height) ──
      &.small .input-field {
        input {
          height: 34px;
          padding: 0 10px;
          border-radius: 10px;
          font-size: 0.875rem;
        }

        label {
          top: 50%;
          transform: translateY(-50%);
          font-size: 0.875rem;
        }
      }

      &.small.floating .input-field label {
        top: 0;
        transform: translateY(-50%);
        font-size: 0.7rem;
        background-color: var(--neutral-color-0);
        padding: 0 4px;
      }

      // ── Focused state ──
      &.focused .input-field {
        input {
          border-color: var(--primary-color);
        }
        label {
          color: var(--primary-color);
        }
      }

      // ── Error state ──
      &.has-error .input-field {
        input {
          border-color: var(--error-color);
        }
        label {
          color: var(--error-color);
        }
      }

      // ── Error text ──
      .error-text {
        display: block;
        color: var(--error-color);
        font-size: 0.75rem;
        margin-top: 4px;
        margin-left: var(--spacing-2);
      }

      // ── Disabled state ──
      &.disabled {
        opacity: 0.6;
        pointer-events: none;
      }

      // ── Prevent iOS zoom on focus ──
      @media (max-width: 768px) {
        &.normal .input-field input,
        &.small .input-field input {
          font-size: 16px;
        }
      }
    }

  usage: |
    <!-- Reactive form usage -->
    <form [formGroup]="loginForm">
      <lib-input
        formControlName="email"
        label="Email"
        type="email"
        [required]="true"
        [error]="loginForm.get('email')?.touched &&
                 loginForm.get('email')?.invalid
                 ? 'Valid email is required' : null"
      />
    </form>

    <!-- Small size with ngModel -->
    <lib-input
      label="Search courses..."
      size="small"
      [(ngModel)]="searchQuery"
    />

    <!-- With error -->
    <lib-input
      label="Username"
      [error]="'Username is already taken'"
    />

    <!-- Width fills parent container by default.
         Constrain via parent or host CSS: -->
    <div style="width: 300px">
      <lib-input label="Fixed by parent" />
    </div>

