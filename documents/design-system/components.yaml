openspec: "1.0"
kind: ComponentStyles
info:
  title: LMS Platform - Component Styles
  version: "1.0.0"
  description: >
    Global component styles for button, input, select, checkbox, and form.
    These are CSS/SCSS styles applied globally, not Angular components.
    Angular shared components are documented in shared-components.yaml.

# ──────────────────────────────────────────────────────────────
# BUTTON
# ──────────────────────────────────────────────────────────────
button:
  file: src/assets/design-system/components/_button.scss
  selector: button
  description: >
    Global button element styling with variant and size classes.
    Uses CSS custom property tokens for theming.

  base_styles:
    min_height: 36px
    color: "var(--button-text-color)"
    display: flex
    justify_content: center
    align_items: center
    text_align: center
    border: none
    user_select: none
    cursor: pointer
    font_weight: "500"
    transition: >
      transform var(--duration-normal) var(--easing-ease-in-out),
      background-color var(--duration-normal) var(--easing-ease-in-out)

  hover:
    description: "translateY(-2px) lift effect on hover (non-disabled)"
    transform: "translateY(-2px)"

  focus_visible:
    outline: "2px solid var(--primary-color)"
    outline_offset: 2px

  variants:
    - name: primary
      class: ".primary"
      styles:
        background_color: "var(--button-bg-color)"
        color: "var(--button-text-color)"
        spinner_color: "var(--button-text-color)"
      hover:
        background_color: "var(--button-bg-color-hover)"

    - name: secondary
      class: ".secondary"
      styles:
        border: "1px solid var(--button-secondary-border-color)"
        background_color: "var(--button-secondary-bg-color)"
        color: "var(--button-secondary-text-color)"
        spinner_color: "var(--button-secondary-text-color)"
      hover:
        background_color: "var(--button-secondary-bg-color-hover)"

    - name: destructive
      class: ".destructive"
      styles:
        background_color: "var(--button-destructive-bg-color)"
        color: "var(--button-text-color)"
        spinner_color: "var(--button-text-color)"
      hover:
        filter: "brightness(0.9)"

  disabled:
    class: ":disabled"
    styles:
      background_color: "var(--button-disabled-bg-color)"
      color: "var(--button-disabled-text-color)"
      cursor: not-allowed
      transform: none
      spinner_color: "var(--button-disabled-text-color)"

  sizes:
    - name: sm
      class: ".sm"
      min_height: 30px
      padding: "0 var(--spacing-md)"
      font_size: 0.875rem
      border_radius: "var(--radius-full)"

    - name: md
      class: ".md"
      min_height: 36px
      padding: "0 var(--spacing-lg)"
      border_radius: "var(--radius-full)"

    - name: lg
      class: ".lg"
      min_height: 44px
      padding: "var(--spacing-sm) var(--spacing-lg)"
      font_size: 1rem
      border_radius: "var(--radius-full)"

  modifiers:
    - name: loading
      class: ".loading"
      pointer_events: none

# ──────────────────────────────────────────────────────────────
# INPUT
# ──────────────────────────────────────────────────────────────
input:
  file: src/assets/design-system/components/_input.scss
  description: >
    Global input field styling. Dimensions and tokens are referenced by
    the lib-input shared component (shared-components.yaml#/input).

  medium_input:
    class: ".medium-input"
    height: 45px
    padding: "0 10px"
    border: "1px solid var(--neutral-color-4)"
    border_radius: 8px
    focus:
      outline: none
      border: "1px solid var(--primary-color)"
    responsive:
      max_768px:
        font_size: 16px
        font_weight: "400"
        placeholder_font_size: 16px
        placeholder_font_weight: "300"

  small_input:
    class: ".small-input"
    height: 34px
    padding: "0 10px"
    border: "1px solid var(--neutral-color-4)"
    border_radius: 10px
    focus:
      outline: none
      border: "1px solid var(--primary-color-500)"

  placeholder:
    selector: "::placeholder"
    color: "var(--neutral-color-5)"

# ──────────────────────────────────────────────────────────────
# SELECT BOX
# ──────────────────────────────────────────────────────────────
select_box:
  file: src/assets/design-system/components/_input.scss
  description: Custom select dropdown styling

  container:
    class: ".select-box-container"
    height: 45px
    min_width: fit-content
    display: flex
    align_items: center
    background_color: "var(--neutral-color-1)"
    border: "1px solid var(--neutral-color-4)"
    border_radius: 10px
    position: relative
    overflow: hidden

  select:
    class: ".select-box"
    background_color: unset
    flex: "1 1 0"
    border: none
    appearance: none
    width: "100%"
    height: "100%"
    padding: "0 10px"
    z_index: 100

  icon:
    class: ".select-box-icon"
    position: absolute
    right: 5px
    top: "50%"
    transform: "translateY(-50%)"
    color: "var(--neutral-color-6)"
    z_index: 99

  html_usage: |
    <div class="select-box-container">
      <select class="select-box">
        @for (data of dataList; track index) {
          <option [ngValue]="data">{{ data }}</option>
        }
      </select>
      <span class="material-symbols-outlined select-box-icon">
        keyboard_arrow_down
      </span>
    </div>

# ──────────────────────────────────────────────────────────────
# TEXTAREA
# ──────────────────────────────────────────────────────────────
textarea:
  file: src/assets/design-system/components/_input.scss
  description: >
    Global textarea element styling. Matches input field design language
    with border-strong tokens and consistent focus states.

  base_styles:
    class: ".medium-textarea"
    min_height: 120px
    padding: "16px"
    border: "var(--border-strong)"
    border_radius: 8px
    font_family: inherit
    font_size: inherit
    line_height: 1.5
    resize: vertical
    background_color: "var(--input-bg-color)"
    outline: none
    width: "100%"
    box_sizing: border-box
    transition: "border-color var(--duration-normal) var(--easing-ease-in-out)"

  focus:
    outline: none
    border: "1px solid var(--primary-color)"

  error:
    border_color: "var(--error-color)"

  disabled:
    opacity: "var(--opacity-disabled)"
    cursor: not-allowed
    resize: none

  placeholder:
    color: "var(--neutral-color-5)"

  small_textarea:
    class: ".small-textarea"
    min_height: 80px
    padding: "12px 16px"
    border: "var(--border-strong)"
    border_radius: 10px
    font_size: 0.875rem

# ──────────────────────────────────────────────────────────────
# RADIO BUTTON
# ──────────────────────────────────────────────────────────────
radio:
  file: src/assets/design-system/components/_input.scss
  description: >
    Custom radio button styling. Circular variant matching the
    checkbox pattern. Uses --border-strong for unchecked state.

  radio_container:
    class: ".radio-container"
    display: flex
    flex_direction: column
    gap: 12px

    radio_row:
      class: ".radio"
      display: flex
      align_items: center
      gap: 12px

    input_radio:
      selector: "input[type='radio']"
      appearance: none
      width: 18px
      height: 18px
      border: "var(--border-strong)"
      border_radius: "var(--radius-full)"
      cursor: pointer
      outline: none
      background_color: "var(--neutral-color-0)"
      margin: "0"
      position: relative

      checked:
        border_color: "var(--primary-color-600)"
        inner_dot:
          description: "Filled inner circle via ::after pseudo-element"
          width: 10px
          height: 10px
          border_radius: "var(--radius-full)"
          background_color: "var(--primary-color-600)"
          position: absolute
          top: "50%"
          left: "50%"
          transform: "translate(-50%, -50%)"

      hover:
        border_color: "var(--primary-color-600)"

      focus_visible:
        box_shadow: "var(--focus-ring)"

# ──────────────────────────────────────────────────────────────
# DATA TABLE
# ──────────────────────────────────────────────────────────────
data_table:
  file: src/assets/design-system/components/_table.scss
  description: >
    Data table styling for enrollment lists, submission tables, etc.
    Uses surface tokens for header/row backgrounds and border-subtle for separators.

  table:
    class: ".data-table"
    width: "100%"
    border_collapse: collapse
    border_spacing: "0"

  header:
    class: ".data-table thead th"
    background_color: "var(--surface-sunken)"
    color: "var(--text-primary-color)"
    font_weight: "var(--font-weight-medium)"
    font_size: "var(--font-size-xs)"
    text_align: left
    padding: "var(--spacing-sm) var(--spacing-md)"
    border_bottom: "var(--border-subtle)"
    white_space: nowrap

  row:
    class: ".data-table tbody tr"
    background_color: "var(--neutral-color-0)"
    border_bottom: "var(--border-subtle)"
    transition: "background-color var(--duration-fast) var(--easing-ease)"

    hover:
      background_color: "var(--surface-hover)"

    selected:
      background_color: "var(--surface-selected)"

  cell:
    class: ".data-table tbody td"
    padding: "var(--spacing-sm) var(--spacing-md)"
    font_size: "var(--font-size-xs)"
    color: "var(--text-primary-color)"
    vertical_align: middle

  empty_state:
    class: ".data-table-empty"
    padding: "var(--spacing-3xl) var(--spacing-md)"
    text_align: center
    color: "var(--text-secondary-color)"

# ──────────────────────────────────────────────────────────────
# CHECKBOX
# ──────────────────────────────────────────────────────────────
checkbox:
  file: src/assets/design-system/components/_input.scss
  description: Custom checkbox styling

  checkbox_primary:
    class: ".checkbox-primary"
    display: inline-block
    position: relative
    height: 15px
    width: 15px
    cursor: pointer
    border: none
    margin_right: 10px

  checkbox_container:
    class: ".checkbox-container"
    display: flex
    flex_direction: column
    gap: 12px

    checkbox_row:
      class: ".checkbox"
      display: flex
      align_items: center
      gap: 12px

    input_checkbox:
      selector: "input[type='checkbox']"
      appearance: none
      width: 18px
      height: 18px
      border: "1px solid var(--neutral-color-4)"
      border_radius: 4px
      cursor: pointer
      outline: none
      background_color: "var(--neutral-color-0)"
      margin: "0"

      checked:
        background_color: "var(--primary-color-600)"
        border_color: "var(--primary-color-600)"
        checkmark:
          description: "White checkmark via ::after pseudo-element"
          top: 1px
          left: 5px
          width: 4px
          height: 9px
          border: "solid white"
          border_width: "0 2px 2px 0"
          transform: "rotate(45deg)"

      hover:
        border_color: "var(--primary-color-600)"

# ──────────────────────────────────────────────────────────────
# FORM
# ──────────────────────────────────────────────────────────────
form:
  file: src/assets/design-system/_form.scss
  description: Form layout component styles
  imports:
    - "'typography' as typography"

  form_row:
    class: ".form-row"
    display: flex
    flex_direction: row
    justify_content: space-between
    align_items: flex-start
    margin_bottom: 16px
    gap: 24px

  form_field:
    class: ".form-field"
    flex: "1"
    display: flex
    flex_direction: column
    align_items: stretch

    label:
      class: ".form-field-label"
      font_weight: "600"
      margin_bottom: 4px

    error:
      class: ".form-field-error"
      extends: ".text-body-small"
      color: "var(--error-color)"
      margin_left: "var(--spacing-2)"

    required:
      selector: ".form-field.required .form-field-label::after"
      content: "' *'"

# ──────────────────────────────────────────────────────────────
# UI STYLE (DATA ATTRIBUTE)
# ──────────────────────────────────────────────────────────────
ui_style:
  file: src/assets/design-system/ui-style/ui-style-default.scss
  selector: '[data-ui="default"]'
  description: >
    Optional data-attribute based UI style overrides.
    Applied when HTML element has data-ui="default" attribute.
  tokens:
    - name: --button-border-radius
      value: 4px
    - name: --button-lg-padding
      value: "12px 24px"
    - name: --button-md-padding
      value: "8px 16px"
    - name: --button-sm-padding
      value: "4px 8px"
