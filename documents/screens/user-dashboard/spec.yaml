openspec: "1.0"
kind: Screen
info:
  title: User Dashboard
  version: "1.0.0"
  description: Central hub for authenticated users to view and access all their courses.

screen:
  id: user-dashboard
  name: User Dashboard
  route: /
  default_route: true
  default_route_note: >
    Dashboard is served at the root path "/".
    If the user is not authenticated, authGuard redirects to /login.
    After login, user lands here.
  component:
    selector: app-user-dashboard
    file: src/app/components/home/user-dashboard/user-dashboard.component.ts
    template: src/app/components/home/user-dashboard/user-dashboard.component.html
    styles: src/app/components/home/user-dashboard/user-dashboard.component.scss
    standalone: true
  guard: authGuard
  target_users: [student, teacher]
  status: scaffold

  purpose: >
    Central hub for users to view and access all their courses.
    Provides quick overview of enrolled courses (as student) and
    managed courses (as teacher).

  layout:
    desktop:
      description: "4-column grid of portrait course cards with header and tabs. >1200px."
      ascii: |
        +------------------------------------------------------------+
        |  Navbar                                                    |
        +------------------------------------------------------------+
        |                                                            |
        |  Welcome Message                        [Search Input]     |
        |                                                            |
        |  +----------------------------------------------------+    |
        |  | My Courses | Teaching                              |    |
        |  +----------------------------------------------------+    |
        |                                                            |
        |  +--------+  +--------+  +--------+  +--------+           |
        |  | [4:3]  |  | [4:3]  |  | [4:3]  |  | [4:3]  |           |
        |  | thumb  |  | thumb  |  | thumb  |  | thumb  |           |
        |  |--------|  |--------|  |--------|  |--------|           |
        |  | Title  |  | Title  |  | Title  |  | Title  |           |
        |  | Instr. |  | Instr. |  | Instr. |  | Instr. |           |
        |  | Badge  |  | Badge  |  | Badge  |  | Badge  |           |
        |  +--------+  +--------+  +--------+  +--------+           |
        |                                                            |
        +------------------------------------------------------------+
    tablet:
      description: "3-column grid of portrait cards. 768px-1200px."
      ascii: |
        +------------------------------------------+
        |  Navbar                                  |
        +------------------------------------------+
        |  Welcome Message                         |
        |  [Search Input]                          |
        +------------------------------------------+
        |  My Courses | Teaching                   |
        +------------------------------------------+
        |  +---------+  +---------+  +---------+   |
        |  | [4:3]   |  | [4:3]   |  | [4:3]   |   |
        |  | thumb   |  | thumb   |  | thumb   |   |
        |  |---------|  |---------|  |---------|   |
        |  | Title   |  | Title   |  | Title   |   |
        |  | Badge   |  | Badge   |  | Badge   |   |
        |  +---------+  +---------+  +---------+   |
        +------------------------------------------+
    mobile:
      description: "Single column. <768px."
      ascii: |
        +----------------------+
        |  Navbar              |
        +----------------------+
        |  Welcome Message     |
        |  [Search Input]      |
        +----------------------+
        |  My Courses|Teaching |
        +----------------------+
        |  +----------------+  |
        |  |  Course Card   |  |
        |  +----------------+  |
        |  +----------------+  |
        |  |  Course Card   |  |
        |  +----------------+  |
        +----------------------+

  components:
    - id: header
      name: Header Section
      type: inline
      elements:
        - name: Welcome Message
          text: "Welcome back, {userName}!"
          typography: text-headline-medium
        - name: Search by Code Input
          type: text-input
          placeholder: "Enter course code..."
          behavior: >
            Code-based course lookup. As user types, filters enrolled courses
            whose code starts with the typed value and shows matches in a
            dropdown. On Enter or dropdown item click, resolves the course:
            if enrolled → navigate to course dashboard; if not enrolled →
            open course preview dialog.

    - id: course-search-dropdown
      name: Course Search Dropdown
      type: inline
      description: >
        Dropdown list shown below the search input when the user types a
        code that partially matches one or more enrolled courses. Each item
        shows the course code and title. Clicking an item or pressing Enter
        navigates to that course's dashboard.
      visibility: "searchCodeInput is not empty AND matching enrolled courses exist"
      layout: |
        +--------------------------------------+
        |  Enter course code...         [×]    |
        +--------------------------------------+
        |  1234567890 — Introduction to CS     |
        |  1234500001 — Data Structures        |
        +--------------------------------------+
      elements:
        - name: Dropdown Container
          type: div
          class: search-dropdown
          z_index: "--z-index-dropdown (100)"
          style: >
            Positioned absolutely below .search-wrapper. White background,
            border-radius --radius-md, border --border-default,
            box-shadow --shadow-md. Max-height 240px with overflow-y auto.
        - name: Dropdown Item
          type: div
          class: search-dropdown-item
          elements:
            - name: Course Code
              typography: text-label-medium
              color: "--text-primary-color"
              description: "10-digit numeric code displayed as monospace"
            - name: Course Title
              typography: text-body-medium
              color: "--text-secondary-color"
              description: "Truncated to single line with ellipsis"
          interaction:
            hover: "background --surface-hover"
            click: "Navigate to /course/{id}"
            keyboard: "Enter key navigates to course"
      behavior:
        trigger: searchCodeInput value changes (after debounce)
        steps:
          - Filter enrolledCourses by code.startsWith(input)
          - If matches found → show dropdown with matching courses
          - If no matches → hide dropdown (do not show empty dropdown)
          - On item click → navigate to /course/{id}
          - On Enter with single match → navigate to that course
          - On Enter with no enrolled match → call CourseService.getByCode()
          - On blur → hide dropdown after short delay (150ms)

    - id: course-preview-dialog
      name: Course Preview Dialog
      type: inline
      description: >
        Modal dialog showing course details for a course the user is NOT
        enrolled in. Appears when the user searches for a valid course code
        that exists in the system but is not in their enrolled list. Provides
        an "Apply" button to request enrollment.
      layout: |
        +--------------------------------------------+
        |  Course Details                             |
        |--------------------------------------------|
        |                                             |
        |  Introduction to Computer Science           |
        |  (text-title-large)                         |
        |                                             |
        |  CODE 1234567890                            |
        |  (text-label-medium, monospace, with chip)  |
        |                                             |
        |  This course covers fundamental concepts    |
        |  of computer science including...           |
        |  (text-body-medium, secondary color)        |
        |                                             |
        |  ┌───────────────────────────────────────┐  |
        |  │  Instructor     John Doe              │  |
        |  │  Modules        12                    │  |
        |  │  Students       45                    │  |
        |  │  Visibility     PUBLIC                │  |
        |  └───────────────────────────────────────┘  |
        |                                             |
        |--------------------------------------------|
        |                       [Cancel]  [Apply]     |
        +--------------------------------------------+
      elements:
        - name: Dialog Container
          type: lib-dialog
          inputs:
            open: showCoursePreview()
            title: "Course Details"
            confirmLabel: "Apply"
            cancelLabel: "Cancel"
            loading: isApplying()
          outputs:
            confirm: onApplyConfirm()
            cancel: onPreviewCancel()
        - name: Course Title
          typography: text-title-large
          color: "--text-primary-color"
          description: Full course title, no truncation
        - name: Course Code Chip
          type: span
          class: course-code-chip
          typography: text-label-medium
          description: >
            Monospace code display in a subtle chip. Background
            --surface-sunken (#f8f8f8), border-radius --radius-sm,
            padding 2px 8px. Label prefix "CODE" in secondary color.
        - name: Course Description
          typography: text-body-medium
          color: "--text-secondary-color"
          description: >
            Full description text. If null/empty, this section is hidden.
            Max 4 lines with ellipsis overflow.
        - name: Course Meta Grid
          type: div
          class: course-meta-grid
          description: >
            2-column key-value grid showing course metadata.
            Keys in text-label-medium secondary color, values in
            text-body-medium primary color. Separated from description
            by 16px gap. Background --surface-sunken, border-radius
            --radius-md, padding 16px.
          items:
            - key: Instructor
              value: "{course.createdBy.name}"
            - key: Modules
              value: "{course.moduleCount ?? '—'}"
            - key: Students
              value: "{course.enrollmentCount ?? '—'}"
            - key: Visibility
              value: "{course.visibility}"
      behavior:
        on_confirm:
          - Set isApplying to true
          - Call EnrollmentService.enroll(course.id)
          - On success: close dialog, clear search, show success (navigate or reload)
          - On error: set isApplying to false, set applyError signal
        on_cancel:
          - Close dialog (showCoursePreview = false)
          - Clear previewCourse and applyError

    - id: tab-navigation
      name: Tab Navigation
      type: inline
      tabs:
        - label: My Courses
          description: Courses where user is enrolled as student
          default: true
          data_source: "CourseService.list('enrolled')"
        - label: Teaching
          description: Courses where user is teacher/creator
          data_source: "CourseService.list('created')"
      style: Active tab highlighted with primary color underline
      actions:
        - id: create-course-button
          name: Create Course Button
          visibility: "activeTab === 'created'"
          description: >
            Primary button displayed inline at the right end of the tab bar
            when the Teaching tab is active. Opens a dialog for the user to
            fill in course details before creating.
          element:
            type: lib-button
            variant: primary
            size: sm
            label: "+ Create Course"
          behavior:
            trigger: click
            steps:
              - Set showCreateDialog signal to true
              - Dialog opens with Create Course form

    - id: create-course-dialog
      name: Create Course Dialog
      type: inline
      description: >
        Modal dialog containing a reactive form for creating a new course.
        Uses lib-dialog with lib-input (title), lib-textarea (description),
        and a native select (visibility). Calls CourseService.create() on
        confirm and navigates to the new course manage page on success.
      layout: |
        +--------------------------------------------+
        |  Create Course                             |
        |--------------------------------------------|
        |                                            |
        |  [Title Input*]          (required)        |
        |                                            |
        |  [Description Textarea]  (optional)        |
        |                                            |
        |  [Visibility Select]     (default: PUBLIC) |
        |                                            |
        |--------------------------------------------|
        |                     [Cancel]  [Create]     |
        +--------------------------------------------+
      elements:
        - name: Dialog Container
          type: lib-dialog
          inputs:
            open: showCreateDialog()
            title: "Create Course"
            confirmLabel: "Create"
            cancelLabel: "Cancel"
            loading: isCreating()
          outputs:
            confirm: onCreateConfirm()
            cancel: onCreateCancel()
        - name: Title Input
          type: lib-input
          label: "Course Title"
          required: true
          formControl: createForm.controls.title
          validation: "required, shown on submit attempt"
        - name: Description Textarea
          type: lib-textarea
          label: "Description"
          formControl: createForm.controls.description
        - name: Visibility Select
          type: native select
          options: [PUBLIC, PRIVATE, UNLISTED]
          default: PUBLIC
          formControl: createForm.controls.visibility
      behavior:
        on_confirm:
          - Validate form (mark fields as touched if invalid)
          - If invalid: stop, show validation errors
          - Set isCreating to true
          - Call CourseService.create({ title, description, visibility })
          - On success: close dialog, reset form, navigate to /course/{id}/manage
          - On error: set isCreating to false, set createError signal
        on_cancel:
          - Close dialog (showCreateDialog = false)
          - Reset form and clear errors

    - id: course-card
      name: Course Card
      type: inline
      description: Displays course summary in a clickable card.
      layout: |
        +----------------------------------+
        |  [Thumbnail Image - 16:9]        |
        +----------------------------------+
        |  Course Title (truncated)        |
        |  Instructor: John Doe            |
        |                                  |
        |  [====----] 60%                  |
        |                                  |
        |  [Student Badge] Last: 2 days ago|
        +----------------------------------+
      elements:
        - name: Thumbnail
          description: >
            Responsive aspect ratio: 4:3 at tablet and desktop sizes
            for portrait-oriented cards (height > width), 16:9 on mobile
            for natural horizontal layout. Placeholder icon if no image.
        - name: Title
          typography: text-title-medium
          description: Max 2 lines, ellipsis overflow
        - name: Instructor
          description: Teacher name from createdBy field
        - name: Progress Bar
          description: Completion percentage (student view only)
        - name: Role Badge
          description: '"Student" or "Teacher" chip'
        - name: Last Activity
          description: Relative timestamp

    - id: empty-state
      name: Empty State
      type: inline
      elements:
        - Illustration/icon
        - Text "No courses yet"
        - CTA button "Browse Courses" or "Create Course"

    - id: loading-state
      name: Loading State
      type: inline
      description: 6 skeleton cards in grid matching course card dimensions

  states:
    - name: loading
      description: Skeleton cards displayed, tab navigation visible but disabled
    - name: loaded
      description: Course cards in grid, search functional, tabs switchable
    - name: empty
      description: Empty state illustration with helpful message and action button
    - name: error
      description: Error message with retry button
    - name: search-dropdown-open
      description: >
        User is typing a course code. Dropdown shows matching enrolled
        courses below the search input.
    - name: search-loading
      description: >
        User pressed Enter with a code that has no enrolled match.
        Spinner shown in search input while CourseService.getByCode() resolves.
    - name: course-preview-open
      description: >
        Course preview dialog is visible showing details of a non-enrolled
        course. Apply button available.
    - name: applying
      description: >
        User clicked Apply in the course preview dialog. Loading state on
        the Apply button while EnrollmentService.enroll() is in progress.

  data_flow:
    route_params: none
    service_calls:
      - service: CourseService
        method: list
        params: "type: 'enrolled'"
        description: Fetch enrolled courses for My Courses tab
      - service: CourseService
        method: list
        params: "type: 'created'"
        description: Fetch created courses for Teaching tab
      - service: CourseService
        method: create
        params: "{ title, description, visibility }"
        description: Create a new course from Teaching tab, then navigate to manage page
      - service: CourseService
        method: getByCode
        params: "code"
        description: >
          Look up a course by its unique code. Called when user presses
          Enter in search and the code does not match any enrolled course.
      - service: EnrollmentService
        method: enroll
        params: "courseId"
        description: >
          Request enrollment in a course. Called when user clicks "Apply"
          in the course preview dialog.

  interactions:
    - action: Search course by code
      trigger: Type in search input
      result: >
        Debounced 300ms. Filters enrolled courses whose code starts with
        the typed value. Shows matching courses in a dropdown below input.
    - action: Select course from dropdown
      trigger: Click dropdown item or press Enter with single match
      result: Navigate to /course/{id}
    - action: Search non-enrolled course
      trigger: Press Enter when no enrolled course matches the full code
      result: >
        Calls CourseService.getByCode(code). If course found and user is
        enrolled → navigate to course. If found and not enrolled → open
        course preview dialog. If not found → show inline error message.
    - action: Apply to course
      trigger: Click "Apply" in course preview dialog
      result: >
        Calls EnrollmentService.enroll(courseId). On success → close dialog,
        reload courses, navigate to course dashboard. On error → show error
        in dialog.
    - action: Cancel course preview
      trigger: Click "Cancel" or backdrop in course preview dialog
      result: Close dialog, clear preview state
    - action: Switch tabs
      trigger: Click tab
      result: Show respective course list
    - action: Click course card
      trigger: Click on card
      result: Navigate to /course/{id}
    - action: Clear search
      trigger: Click X in search
      result: Reset search input, hide dropdown
    - action: Create course
      trigger: Click "+ Create Course" button (visible on Teaching tab)
      result: >
        Opens a dialog with a form (title, description, visibility).
        On confirm, validates the form, calls CourseService.create(),
        then navigates to /course/{id}/manage for the newly created course.
        Dialog shows loading state on the confirm button during API call.

  business_logic:
    tab_logic:
      - Default to "My Courses" tab
      - If no enrolled courses, show "Teaching" tab
      - Badge count on each tab (optional)
    search_by_code:
      - Input accepts course code (numeric string)
      - Debounce 300ms on input
      - As user types, filter enrolled courses whose code starts with input
      - Show matches in dropdown below search input
      - On Enter key:
          1. If single enrolled match exists → navigate to that course
          2. If no enrolled match → call CourseService.getByCode(code)
          3. If API returns course AND user is enrolled → navigate to course
          4. If API returns course AND user is NOT enrolled → show preview dialog
          5. If API returns 404 → show "Course not found" inline error
      - On dropdown item click → navigate to /course/{id}
      - Clear button resets search and hides dropdown
    course_preview_dialog:
      - Shows course title, code, description, metadata (instructor, modules, students, visibility)
      - "Apply" button calls EnrollmentService.enroll(courseId)
      - On enrollment success → close dialog, reload courses, navigate to course
      - On enrollment error → show error message in dialog
      - "Cancel" closes dialog and clears state
    sorting:
      default: Last activity (most recent first)
      fallback: Course title alphabetically
    navigation:
      - Click anywhere on card navigates to course
      - Student courses navigate to /course/{id}
      - Teacher courses navigate to /course/{id}/manage (optional)

  accessibility:
    - Tab navigation keyboard accessible
    - Course cards are focusable and clickable via Enter
    - Search input has proper label
    - Progress bar has aria-valuenow
    - Role badges have proper semantics

  responsive:
    card_philosophy: >
      Cards are designed to be portrait-oriented (height > width) at tablet
      and desktop sizes for a more elegant, compact appearance. This is
      achieved by using more grid columns (narrower cards) combined with a
      taller thumbnail aspect ratio (4:3 instead of 16:9).
    breakpoints:
      - range: "> 1200px"
        grid_columns: 4
        card_width: ~270px
        thumbnail_aspect_ratio: "4:3"
        card_body_padding: 12px
        note: "4 columns produce narrow portrait cards"
      - range: "768px - 1200px"
        grid_columns: 3
        card_width: ~280px
        thumbnail_aspect_ratio: "4:3"
        card_body_padding: 12px
        note: "3 columns at tablet for compact portrait cards"
      - range: "< 768px"
        grid_columns: 1
        card_width: 100%
        thumbnail_aspect_ratio: "16:9"
        card_body_padding: 16px
        note: "Single column with landscape thumbnails for mobile"

  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/headline/levels/1"
        usage: "Welcome message heading (text-headline-medium)"
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/1"
        usage: Course card titles (text-title-medium)
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/1"
        usage: Course card descriptions (text-body-medium)
      - $ref: "../../design-system/typography.yaml#/scale/label/levels/0"
        usage: Tab labels, badges (text-label-large)
    colors:
      - $ref: "../../design-system/color.yaml#/theme_colors/primary"
        usage: Active tab underline, progress bars, badges
      - $ref: "../../design-system/color.yaml#/theme_colors/neutral"
        usage: Card backgrounds, borders, secondary text
    components:
      - $ref: "../../design-system/components.yaml#/input"
        usage: Input field styling (used via lib-input shared component)
      - $ref: "../../design-system/components.yaml#/button"
        usage: Empty state CTA buttons
    shared_components:
      - $ref: "../../design-system/shared-components.yaml#/button"
        usage: Browse Courses / Create Course CTA
      - $ref: "../../design-system/shared-components.yaml#/spinner"
        usage: Loading state (screen type)
      - $ref: "../../design-system/shared-components.yaml#/input"
        usage: Search input field with floating label (lib-input)
    tokens:
      - $ref: "../../design-system/tokens.yaml#/spacing"
        usage: Card grid gaps, section padding
      - $ref: "../../design-system/tokens.yaml#/border_radius"
        usage: Card corners (--radius-md or --radius-lg)
    breakpoints:
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
        usage: "768px: 3-col to 1-col grid, thumbnail 4:3 to 16:9"
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/3"
        usage: "1200px: 4-col to 3-col grid"

  related_services:
    - $ref: "../../network/api-endpoints.yaml#/resources/courses"
    - $ref: "../../network/api-endpoints.yaml#/resources/enrollments"

  current_implementation: |
    import { Component, inject, signal, computed, OnInit, DestroyRef } from '@angular/core';
    import { Router } from '@angular/router';
    import { FormBuilder, ReactiveFormsModule, Validators } from '@angular/forms';
    import { Subject, debounceTime, distinctUntilChanged } from 'rxjs';
    import { takeUntilDestroyed } from '@angular/core/rxjs-interop';
    import { CourseService } from '../../../services/course.service';
    import { EnrollmentService } from '../../../services/enrollment.service';
    import { AuthService } from '../../../services/auth.service';
    import { CourseResponse, Visibility } from '../../../shared/models';
    import { ButtonComponent, DialogComponent, InputComponent, TextareaComponent } from '../../../shared/components';

    type Tab = 'enrolled' | 'created';

    @Component({
      selector: 'app-user-dashboard',
      imports: [ReactiveFormsModule, ButtonComponent, DialogComponent, InputComponent, TextareaComponent],
      templateUrl: './user-dashboard.component.html',
      styleUrl: './user-dashboard.component.scss'
    })
    export class UserDashboardComponent implements OnInit {
      private readonly courseService = inject(CourseService);
      private readonly enrollmentService = inject(EnrollmentService);
      private readonly authService = inject(AuthService);
      private readonly router = inject(Router);
      private readonly destroyRef = inject(DestroyRef);
      private readonly fb = inject(FormBuilder);

      readonly visibilityOptions = Object.values(Visibility);

      userName = signal('');
      activeTab = signal<Tab>('enrolled');
      isLoading = signal(true);
      isCreating = signal(false);
      showCreateDialog = signal(false);
      createError = signal('');
      errorMessage = signal('');

      // Search by code
      searchCodeInput = signal('');
      showDropdown = signal(false);
      isSearching = signal(false);
      searchError = signal('');

      // Course preview dialog
      showCoursePreview = signal(false);
      previewCourse = signal<CourseResponse | null>(null);
      isApplying = signal(false);
      applyError = signal('');

      createForm = this.fb.nonNullable.group({
        title: ['', Validators.required],
        description: [''],
        visibility: [Visibility.PUBLIC],
      });

      enrolledCourses = signal<CourseResponse[]>([]);
      createdCourses = signal<CourseResponse[]>([]);

      private readonly searchSubject = new Subject<string>();

      // Dropdown: enrolled courses whose code starts with typed input
      matchingEnrolledCourses = computed(() => {
        const input = this.searchCodeInput().trim();
        if (!input) return [];
        return this.enrolledCourses().filter(c => c.code.startsWith(input));
      });

      // Course grid: show all courses for active tab (no client-side title filter)
      filteredCourses = computed(() => {
        return this.activeTab() === 'enrolled'
          ? this.enrolledCourses()
          : this.createdCourses();
      });

      ngOnInit(): void {
        this.userName.set(this.authService.getUserName());
        this.loadCourses();

        this.searchSubject.pipe(
          debounceTime(300),
          distinctUntilChanged(),
          takeUntilDestroyed(this.destroyRef)
        ).subscribe(query => {
          this.searchCodeInput.set(query);
          this.searchError.set('');
          this.showDropdown.set(query.trim().length > 0);
        });
      }

      onSearchInput(event: Event): void {
        const value = (event.target as HTMLInputElement).value;
        this.searchSubject.next(value);
      }

      onSearchKeydown(event: KeyboardEvent): void {
        if (event.key !== 'Enter') return;
        const code = this.searchCodeInput().trim();
        if (!code) return;

        // If single enrolled match, navigate directly
        const matches = this.matchingEnrolledCourses();
        if (matches.length === 1 && matches[0].code === code) {
          this.navigateToCourse(matches[0]);
          return;
        }

        // Check if exact match in enrolled courses
        const exactEnrolled = this.enrolledCourses().find(c => c.code === code);
        if (exactEnrolled) {
          this.navigateToCourse(exactEnrolled);
          return;
        }

        // Look up via API
        this.showDropdown.set(false);
        this.isSearching.set(true);
        this.searchError.set('');
        this.courseService.getByCode(code).subscribe({
          next: course => {
            this.isSearching.set(false);
            // Check if user is enrolled
            const enrolled = this.enrolledCourses().find(c => c.id === course.id);
            if (enrolled) {
              this.router.navigate(['/course', course.id]);
            } else {
              this.previewCourse.set(course);
              this.showCoursePreview.set(true);
            }
          },
          error: () => {
            this.isSearching.set(false);
            this.searchError.set('Course not found');
          }
        });
      }

      selectDropdownCourse(course: CourseResponse): void {
        this.showDropdown.set(false);
        this.searchCodeInput.set('');
        this.searchSubject.next('');
        this.router.navigate(['/course', course.id]);
      }

      hideDropdown(): void {
        setTimeout(() => this.showDropdown.set(false), 150);
      }

      switchTab(tab: Tab): void {
        this.activeTab.set(tab);
      }

      navigateToCourse(course: CourseResponse): void {
        if (this.activeTab() === 'created') {
          this.router.navigate(['/course', course.id, 'manage']);
        } else {
          this.router.navigate(['/course', course.id]);
        }
      }

      openCreateDialog(): void {
        this.showCreateDialog.set(true);
      }

      onCreateCancel(): void {
        this.showCreateDialog.set(false);
        this.createForm.reset({ title: '', description: '', visibility: Visibility.PUBLIC });
        this.createError.set('');
      }

      onCreateConfirm(): void {
        if (this.createForm.invalid) {
          this.createForm.markAllAsTouched();
          return;
        }
        const { title, description, visibility } = this.createForm.getRawValue();
        this.isCreating.set(true);
        this.createError.set('');
        this.courseService.create({
          title,
          description: description || null,
          visibility,
        }).subscribe({
          next: course => {
            this.isCreating.set(false);
            this.showCreateDialog.set(false);
            this.createForm.reset({ title: '', description: '', visibility: Visibility.PUBLIC });
            this.router.navigate(['/course', course.id, 'manage']);
          },
          error: err => {
            this.isCreating.set(false);
            this.createError.set(err.error?.message || 'Failed to create course. Please try again.');
          }
        });
      }

      onApplyConfirm(): void {
        const course = this.previewCourse();
        if (!course) return;
        this.isApplying.set(true);
        this.applyError.set('');
        this.enrollmentService.enroll(course.id).subscribe({
          next: () => {
            this.isApplying.set(false);
            this.showCoursePreview.set(false);
            this.previewCourse.set(null);
            this.searchCodeInput.set('');
            this.searchSubject.next('');
            this.loadCourses();
            this.router.navigate(['/course', course.id]);
          },
          error: err => {
            this.isApplying.set(false);
            this.applyError.set(err.error?.message || 'Failed to apply. Please try again.');
          }
        });
      }

      onPreviewCancel(): void {
        this.showCoursePreview.set(false);
        this.previewCourse.set(null);
        this.applyError.set('');
      }

      retry(): void {
        this.loadCourses();
      }

      clearSearch(): void {
        this.searchCodeInput.set('');
        this.searchSubject.next('');
        this.showDropdown.set(false);
        this.searchError.set('');
      }

      private loadCourses(): void {
        this.isLoading.set(true);
        this.errorMessage.set('');

        let enrolledDone = false;
        let createdDone = false;
        const checkDone = () => {
          if (enrolledDone && createdDone) {
            this.isLoading.set(false);
            if (this.enrolledCourses().length === 0 && this.createdCourses().length > 0) {
              this.activeTab.set('created');
            }
          }
        };

        this.courseService.list('enrolled').subscribe({
          next: courses => {
            this.enrolledCourses.set(courses);
            enrolledDone = true;
            checkDone();
          },
          error: err => {
            this.errorMessage.set(err.error?.message || 'Failed to load courses. Please try again.');
            this.isLoading.set(false);
          }
        });

        this.courseService.list('created').subscribe({
          next: courses => {
            this.createdCourses.set(courses);
            createdDone = true;
            checkDone();
          },
          error: err => {
            this.errorMessage.set(err.error?.message || 'Failed to load courses. Please try again.');
            this.isLoading.set(false);
          }
        });
      }
    }

  current_template: |
    <div class="dashboard">
      <!-- Header -->
      <div class="dashboard-header">
        <h2 class="text-headline-medium welcome-message">Welcome back, {{ userName() }}!</h2>
        <div class="search-wrapper">
          <span class="search-icon material-icons">search</span>
          <input
            type="text"
            class="search-input"
            placeholder="Enter course code..."
            [value]="searchCodeInput()"
            (input)="onSearchInput($event)"
            (keydown)="onSearchKeydown($event)"
            (blur)="hideDropdown()"
            aria-label="Search course by code"
          />
          @if (isSearching()) {
            <span class="search-spinner"></span>
          } @else if (searchCodeInput()) {
            <button class="search-clear" (click)="clearSearch()" aria-label="Clear search">
              &times;
            </button>
          }
          @if (searchError()) {
            <span class="search-error-msg text-label-medium">{{ searchError() }}</span>
          }

          <!-- Search Dropdown -->
          @if (showDropdown() && matchingEnrolledCourses().length > 0) {
            <div class="search-dropdown">
              @for (course of matchingEnrolledCourses(); track course.id) {
                <div
                  class="search-dropdown-item"
                  (mousedown)="selectDropdownCourse(course)"
                >
                  <span class="dropdown-code text-label-medium">{{ course.code }}</span>
                  <span class="dropdown-title text-body-medium">{{ course.title }}</span>
                </div>
              }
            </div>
          }
        </div>
      </div>

      <!-- Tab Navigation -->
      <div class="tab-navigation" role="tablist">
        <button
          class="tab-button"
          [class.active]="activeTab() === 'enrolled'"
          (click)="switchTab('enrolled')"
          role="tab"
          [attr.aria-selected]="activeTab() === 'enrolled'"
        >
          My Courses
          <span class="tab-count">{{ enrolledCourses().length }}</span>
        </button>
        <button
          class="tab-button"
          [class.active]="activeTab() === 'created'"
          (click)="switchTab('created')"
          role="tab"
          [attr.aria-selected]="activeTab() === 'created'"
        >
          Teaching
          <span class="tab-count">{{ createdCourses().length }}</span>
        </button>
        <div class="tab-spacer"></div>
        @if (activeTab() === 'created') {
          <lib-button variant="primary" size="sm" (buttonClick)="openCreateDialog()">
            + Create Course
          </lib-button>
        }
      </div>

      <!-- Loading State -->
      @if (isLoading()) {
        <div class="course-grid">
          @for (i of [1,2,3,4,5,6]; track i) {
            <div class="skeleton-card">
              <div class="skeleton-thumbnail"></div>
              <div class="skeleton-body">
                <div class="skeleton-line skeleton-title"></div>
                <div class="skeleton-line skeleton-subtitle"></div>
                <div class="skeleton-line skeleton-progress"></div>
                <div class="skeleton-line skeleton-meta"></div>
              </div>
            </div>
          }
        </div>
      }

      <!-- Error State -->
      @else if (errorMessage()) {
        <div class="error-state">
          <span class="error-icon">!</span>
          <p class="text-body-large">{{ errorMessage() }}</p>
          <lib-button variant="primary" (buttonClick)="retry()">Retry</lib-button>
        </div>
      }

      <!-- Empty State -->
      @else if (filteredCourses().length === 0) {
        <div class="empty-state">
          <div class="empty-icon">
            @if (activeTab() === 'enrolled') {
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
            } @else {
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 4.5v15m7.5-7.5h-15"/>
              </svg>
            }
          </div>
          <p class="text-title-large">No courses yet</p>
          @if (activeTab() === 'enrolled') {
            <p class="text-body-medium empty-subtitle">Enroll in a course to get started</p>
          } @else {
            <p class="text-body-medium empty-subtitle">Create your first course</p>
          }
        </div>
      }

      <!-- Course Grid -->
      @else {
        <div class="course-grid">
          @for (course of filteredCourses(); track course.id) {
            <div
              class="course-card"
              tabindex="0"
              role="link"
              [attr.aria-label]="'Go to course: ' + course.title"
              (click)="navigateToCourse(course)"
              (keydown.enter)="navigateToCourse(course)"
            >
              <div class="card-thumbnail">
                <div class="thumbnail-placeholder">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                  </svg>
                </div>
              </div>
              <div class="card-body">
                <h3 class="card-title text-title-medium">{{ course.title }}</h3>
                <p class="card-instructor text-body-medium">Instructor: {{ course.createdBy.name }}</p>

                @if (activeTab() === 'enrolled') {
                  <div class="card-progress">
                    <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                      <div class="progress-fill" [style.width.%]="0"></div>
                    </div>
                    <span class="progress-text text-label-medium">0%</span>
                  </div>
                }

                <div class="card-meta">
                  <span class="role-badge text-label-medium" [class.teacher]="activeTab() === 'created'">
                    {{ activeTab() === 'enrolled' ? 'Student' : 'Teacher' }}
                  </span>
                  @if (course.moduleCount !== null && course.moduleCount !== undefined) {
                    <span class="meta-info text-label-medium">{{ course.moduleCount }} modules</span>
                  }
                </div>
              </div>
            </div>
          }
        </div>
      }
    </div>

    <!-- Create Course Dialog -->
    <lib-dialog
      [open]="showCreateDialog()"
      title="Create Course"
      confirmLabel="Create"
      cancelLabel="Cancel"
      [loading]="isCreating()"
      (confirm)="onCreateConfirm()"
      (cancel)="onCreateCancel()"
    >
      <form [formGroup]="createForm" class="create-course-form">
        <lib-input
          label="Course Title"
          [required]="true"
          formControlName="title"
          [error]="createForm.controls.title.touched && createForm.controls.title.errors?.['required'] ? 'Title is required' : null"
        />
        <lib-textarea
          label="Description"
          formControlName="description"
          [minRows]="10"
        />
        <div class="form-field">
          <label class="form-label text-label-medium" for="visibility-select">Visibility</label>
          <select id="visibility-select" class="form-select" formControlName="visibility">
            @for (opt of visibilityOptions; track opt) {
              <option [value]="opt">{{ opt }}</option>
            }
          </select>
        </div>
        @if (createError()) {
          <p class="create-error text-body-medium">{{ createError() }}</p>
        }
      </form>
    </lib-dialog>

    <!-- Course Preview Dialog -->
    <lib-dialog
      [open]="showCoursePreview()"
      title="Course Details"
      confirmLabel="Apply"
      cancelLabel="Cancel"
      [loading]="isApplying()"
      (confirm)="onApplyConfirm()"
      (cancel)="onPreviewCancel()"
    >
      @if (previewCourse(); as course) {
        <div class="course-preview">
          <h3 class="text-title-large course-preview-title">{{ course.title }}</h3>
          <span class="course-code-chip text-label-medium">CODE {{ course.code }}</span>
          @if (course.description) {
            <p class="text-body-medium course-preview-desc">{{ course.description }}</p>
          }
          <div class="course-meta-grid">
            <span class="meta-key text-label-medium">Instructor</span>
            <span class="meta-value text-body-medium">{{ course.createdBy.name }}</span>
            <span class="meta-key text-label-medium">Modules</span>
            <span class="meta-value text-body-medium">{{ course.moduleCount ?? '—' }}</span>
            <span class="meta-key text-label-medium">Students</span>
            <span class="meta-value text-body-medium">{{ course.enrollmentCount ?? '—' }}</span>
            <span class="meta-key text-label-medium">Visibility</span>
            <span class="meta-value text-body-medium">{{ course.visibility }}</span>
          </div>
          @if (applyError()) {
            <p class="apply-error text-body-medium">{{ applyError() }}</p>
          }
        </div>
      }
    </lib-dialog>

  current_styles: |
    :host { display: block; }
    .dashboard { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; }
    .welcome-message { margin: 0; }
    .search-wrapper {
      position: relative; width: 300px; flex-shrink: 0;
      .search-icon {
        position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
        font-size: 20px; color: var(--neutral-color-5); pointer-events: none;
      }
      .search-input {
        width: 100%; height: 40px; padding: 0 36px 0 36px; border: 1px solid var(--input-border-color);
        border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;
        &:focus { border-color: var(--input-border-color-focus); }
        &::placeholder { color: var(--neutral-color-5); }
      }
      .search-clear {
        position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
        background: none; border: none; font-size: 20px; color: var(--neutral-color-6); cursor: pointer; line-height: 1;
      }
      .search-spinner {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        width: 18px; height: 18px; border: 2px solid var(--neutral-color-3);
        border-top-color: var(--primary-color); border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      .search-error-msg {
        position: absolute; left: 0; top: 100%; margin-top: 4px;
        color: var(--error-color); white-space: nowrap;
      }
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .search-dropdown {
      position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
      background: var(--surface-page, #fff); border: var(--border-default);
      border-radius: var(--radius-md, 8px); box-shadow: var(--shadow-md);
      max-height: 240px; overflow-y: auto; z-index: var(--z-index-dropdown, 100);
    }
    .search-dropdown-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px; cursor: pointer;
      transition: background var(--duration-fast, 100ms);
      &:hover { background: var(--surface-hover, #f8f8f8); }
      &:not(:last-child) { border-bottom: var(--border-subtle); }
      .dropdown-code { font-family: monospace; color: var(--text-primary-color); white-space: nowrap; }
      .dropdown-title {
        color: var(--text-secondary-color); overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap; flex: 1;
      }
    }
    .tab-navigation { display: flex; align-items: center; border-bottom: 2px solid var(--neutral-color-3); margin-bottom: 24px; }
    .tab-spacer { flex: 1; }
    .tab-button {
      padding: 8px 16px; background: none; border: none; border-bottom: 2px solid transparent;
      margin-bottom: -2px; font-size: 14px; font-weight: 500;
      color: var(--text-secondary-color); cursor: pointer;
      &:hover { color: var(--text-primary-color); }
      &.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
      .tab-count { margin-left: 4px; font-size: 12px; color: var(--neutral-color-5); }
    }
    .course-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .course-card {
      border: 1px solid var(--neutral-color-3); border-radius: 12px; overflow: hidden; cursor: pointer;
      &:hover, &:focus-visible { box-shadow: 0 4px 12px rgba(0,0,0,.1); transform: translateY(-2px); }
      &:focus-visible { outline: 2px solid var(--primary-color); outline-offset: 2px; }
    }
    .card-thumbnail { aspect-ratio: 4/3; background: var(--primary-color-100); display: flex; align-items: center; justify-content: center; }
    .thumbnail-placeholder { color: var(--primary-color-400); }
    .card-body { padding: 12px; }
    .card-title { margin: 0 0 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-instructor { margin: 0 0 8px; color: var(--text-secondary-color); }
    .card-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .progress-bar { flex: 1; height: 6px; background: var(--neutral-color-3); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary-color); border-radius: 99px; }
    .progress-text { color: var(--text-secondary-color); }
    .card-meta { display: flex; align-items: center; gap: 8px; }
    .role-badge {
      padding: 2px 8px; border-radius: 99px; background: var(--primary-color-100); color: var(--primary-color-800); font-size: 12px;
      &.teacher { background: #fff3e0; color: #e65100; }
    }
    .meta-info { color: var(--text-secondary-color); font-size: 12px; }
    .skeleton-card { border: 1px solid var(--neutral-color-3); border-radius: 12px; overflow: hidden; }
    .skeleton-thumbnail { aspect-ratio: 4/3; background: var(--neutral-color-2); animation: sh 1.5s infinite; }
    .skeleton-body { padding: 16px; }
    .skeleton-line { height: 14px; background: var(--neutral-color-2); border-radius: 4px; margin-bottom: 8px; animation: sh 1.5s infinite; }
    .skeleton-title { width: 80%; height: 20px; }
    .skeleton-subtitle { width: 50%; }
    .skeleton-progress { width: 100%; height: 6px; }
    .skeleton-meta { width: 40%; }
    @keyframes sh { 50% { opacity: .5; } }
    .create-course-form {
      display: flex; flex-direction: column; gap: 16px;
    }
    .form-field {
      display: flex; flex-direction: column; gap: 4px;
    }
    .form-label {
      color: var(--text-secondary-color);
    }
    .form-select {
      height: 40px; padding: 0 12px; border: 1px solid var(--input-border-color);
      border-radius: 8px; font-size: 14px; outline: none; background: #fff;
      &:focus { border-color: var(--input-border-color-focus); }
    }
    .create-error {
      color: var(--error-color); margin: 0;
    }
    // Course Preview Dialog
    .course-preview {
      display: flex; flex-direction: column; gap: 12px;
    }
    .course-preview-title { margin: 0; color: var(--text-primary-color); }
    .course-code-chip {
      display: inline-block; width: fit-content;
      font-family: monospace; background: var(--surface-sunken, #f8f8f8);
      padding: 2px 10px; border-radius: var(--radius-sm, 4px);
      color: var(--text-secondary-color); letter-spacing: 0.5px;
    }
    .course-preview-desc {
      margin: 0; color: var(--text-secondary-color);
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .course-meta-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 8px 16px;
      background: var(--surface-sunken, #f8f8f8); border-radius: var(--radius-md, 8px); padding: 16px;
      .meta-key { color: var(--text-secondary-color); }
      .meta-value { color: var(--text-primary-color); }
    }
    .apply-error { color: var(--error-color); margin: 0; }
    .empty-state, .error-state { display: flex; flex-direction: column; align-items: center; padding: 96px 16px; text-align: center; }
    .empty-icon { color: var(--neutral-color-5); margin-bottom: 16px; }
    .empty-subtitle { color: var(--text-secondary-color); margin: 4px 0 24px; }
    .error-icon {
      width: 48px; height: 48px; border-radius: 50%; background: #fde8e8; color: var(--error-color);
      display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 16px;
    }
    @media (max-width: 1200px) { .course-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .dashboard-header { flex-direction: column; align-items: flex-start; }
      .search-wrapper { width: 100%; }
      .course-grid { grid-template-columns: 1fr; }
      .card-thumbnail { aspect-ratio: 16/9; }
      .card-body { padding: 16px; }
    }

  acceptance_criteria:
    - User sees personalized welcome message
    - User can switch between "My Courses" and "Teaching" tabs
    - Course cards display correct information
    - Progress bar shows accurate completion percentage
    - Clicking course card navigates to course page
    - Loading state shows skeleton cards
    - Empty state shows appropriate message
    - Layout responds correctly to screen size
    - Page is keyboard navigable
    - Teacher sees "+ Create Course" button on Teaching tab
    - Clicking button opens Create Course dialog with title, description, visibility fields
    - Title field is required with validation error on empty submit
    - Clicking "Create" submits the form, calls API, and navigates to manage page
    - Dialog shows loading state on Create button during API call
    - Clicking "Cancel" or backdrop closes dialog and resets form
    - API errors display inline in the dialog
    # Search by code
    - Search input accepts course code with placeholder "Enter course code..."
    - Typing a code shows dropdown of matching enrolled courses (code starts with input)
    - Dropdown items show course code (monospace) and title
    - Clicking a dropdown item navigates to that course's dashboard
    - Pressing Enter with a code not in enrolled list calls CourseService.getByCode()
    - Loading spinner appears in search input during API lookup
    - If course found and not enrolled, course preview dialog opens
    - If course not found, inline error "Course not found" appears below input
    # Course preview dialog
    - Dialog shows course title, code chip, description, and metadata grid
    - Metadata grid shows instructor, modules, students, visibility
    - "Apply" button calls EnrollmentService.enroll() and shows loading state
    - On successful enrollment, dialog closes and user is navigated to course
    - On enrollment error, error message displays inline in dialog
    - "Cancel" closes dialog and clears state
