openspec: "1.0"
kind: Screen
info:
  title: Summary View (Lesson Content)
  version: "1.0.0"
  description: Display lesson summary content with navigation.

screen:
  id: summary-view
  name: Summary View
  route: /course/:courseId/lesson/:lessonId/summary
  component:
    selector: app-summary-view
    file: src/app/components/course/summary-view/summary-view.component.ts
    template: src/app/components/course/summary-view/summary-view.component.html
    styles: src/app/components/course/summary-view/summary-view.component.scss
    standalone: true
  guard: authGuard
  target_users: [student]
  status: scaffold

  purpose: >
    Display lesson summary content. Shows the main learning material
    for a lesson including text, images, and media. Provides navigation
    to previous/next lessons.

  layout:
    desktop:
      description: "Two-column with sidebar and content area. >1200px."
      ascii: |
        +----------------------------------------------------------+
        |  Navbar                                                  |
        +----------------------------------------------------------+
        |  Breadcrumb: Course > Module > Lesson                    |
        +----------------------------------------------------------+
        |                                                          |
        |  +------------+  +-----------------------------------+   |
        |  |            |  |                                   |   |
        |  |  Sidebar   |  |  Lesson Title                     |   |
        |  |  (280px)   |  |  ─────────────────────            |   |
        |  |            |  |                                   |   |
        |  |  Module 1  |  |  Lesson content...                |   |
        |  |    - Lesson|  |  Lorem ipsum dolor sit amet,      |   |
        |  |    - Lesson|  |  consectetur adipiscing elit.     |   |
        |  |  Module 2  |  |                                   |   |
        |  |    - Lesson|  |  [Image]                          |   |
        |  |            |  |                                   |   |
        |  |            |  |  More content...                  |   |
        |  +------------+  +-----------------------------------+   |
        |                                                          |
        |                  +-----------------------------------+   |
        |                  | [< Prev]  [Mark Complete]  [Next >]|   |
        |                  +-----------------------------------+   |
        +----------------------------------------------------------+
    mobile:
      description: "Full width content, no sidebar. <768px."
      ascii: |
        +----------------------+
        |  Navbar              |
        +----------------------+
        |  < Back to Course    |
        +----------------------+
        |  Course > Module >   |
        |  Lesson              |
        +----------------------+
        |                      |
        |  Lesson Title        |
        |  ─────────────────── |
        |  Content...          |
        |  [Image]             |
        |  More content...     |
        +----------------------+
        | [Prev] [Done] [Next] |
        +----------------------+

  components:
    - id: breadcrumb
      name: Breadcrumb Navigation
      type: inline
      format: "Course Name > Module Name > Lesson Name"
      behavior:
        - Course segment -> Course Dashboard
        - Module segment -> Course Dashboard (scroll to module)
        - Lesson segment -> Current page (not clickable)

    - id: sidebar
      name: Sidebar - Lesson Navigation
      type: inline
      description: Same as Course Dashboard sidebar with module accordion and completion status.
      width: 280px

    - id: content-area
      name: Content Area
      type: inline
      constraints:
        max_width: 800px
        alignment: centered
        line_length: ~70 characters
      supported_content:
        - type: text
          rendering: Styled paragraphs
        - type: headings
          rendering: H1-H6 hierarchy
        - type: lists
          rendering: Bullet/numbered
        - type: images
          rendering: Responsive, centered
        - type: videos
          rendering: Embedded player
        - type: code
          rendering: Syntax highlighted blocks
        - type: links
          rendering: Styled, external opens new tab

    - id: navigation-footer
      name: Navigation Footer
      type: inline
      layout: |
        +---------------------------------------------------+
        |  [< Previous Lesson]  [Mark Complete]  [Next Lesson >]  |
        +---------------------------------------------------+
      buttons:
        - name: Previous
          disabled_when: First lesson in course
          action: Navigate to previous lesson
        - name: Mark Complete
          type: toggle
          action: Mark/unmark lesson as complete
        - name: Next
          disabled_when: Last lesson in course
          action: Navigate to next lesson

  states:
    - name: loading
      description: Breadcrumb placeholder, content skeleton, footer disabled
    - name: loaded
      description: Content rendered, navigation enabled, completion status shown
    - name: completed
      description: '"Mark Complete" shows as checked, checkmark in sidebar'
    - name: error
      description: Error message with back to course button

  data_flow:
    route_params:
      - name: courseId
        type: string
      - name: lessonId
        type: string
    service_calls:
      - service: SummaryService
        method: get
        params: lessonId
      - service: LessonService
        method: get
        params: lessonId
      - service: ModuleService
        method: listByCourse
        params: courseId

  interactions:
    - action: Navigate breadcrumb
      trigger: Click breadcrumb segment
      result: Navigate to target
    - action: Click sidebar lesson
      trigger: Click lesson item
      result: Navigate to lesson
    - action: Mark complete
      trigger: Click button
      result: Toggle completion, update sidebar
    - action: Previous lesson
      trigger: Click "Previous"
      result: Navigate to previous lesson
    - action: Next lesson
      trigger: Click "Next"
      result: Navigate to next lesson

  business_logic:
    content_rendering:
      - Fetch raw content (HTML or Markdown)
      - Sanitize HTML for security
      - Render with proper styling
      - Handle embedded media
    completion_logic:
      - "Manual: User clicks 'Mark Complete'"
      - Toggle state immediately (optimistic UI)
      - API call to persist
      - Rollback on error
    navigation_logic:
      - Determine lesson order within module
      - Determine module order within course
      - "Previous: Go to last lesson of previous module if at first"
      - "Next: Go to first lesson of next module if at last"

  accessibility:
    - Proper heading hierarchy in content
    - Images have alt text
    - Videos have captions (if available)
    - Navigation footer is keyboard accessible
    - Focus management on page load
    - Skip to content link

  responsive:
    breakpoints:
      - range: "> 768px"
        sidebar: Fixed 280px
        content_width: Max 800px
      - range: "<= 768px"
        sidebar: Hidden
        content_width: 100% with padding

  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/headline/levels/1"
        usage: Lesson title (text-headline-medium)
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/0"
        usage: Summary content body (text-body-large)
      - $ref: "../../design-system/typography.yaml#/scale/label/levels/0"
        usage: Breadcrumb segments (text-label-large)
      - $ref: "../../design-system/typography.yaml#/html_element_mapping"
        usage: Content rendering (h1-h6, p mapped to typography scale)
    colors:
      - $ref: "../../design-system/color.yaml#/theme_colors/primary"
        usage: Active sidebar item, Mark Complete button, breadcrumb links
      - $ref: "../../design-system/color.yaml#/theme_colors/semantic"
        usage: Completion status checkmarks (--success-color)
    components:
      - $ref: "../../design-system/components.yaml#/button"
        usage: Previous/Next/Mark Complete navigation buttons
    shared_components:
      - $ref: "../../design-system/shared-components.yaml#/button"
        usage: Navigation footer buttons (lib-button)
      - $ref: "../../design-system/shared-components.yaml#/spinner"
        usage: Content loading state
    tokens:
      - $ref: "../../design-system/tokens.yaml#/spacing"
        usage: Content area padding, navigation footer spacing
    breakpoints:
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
        usage: "768px: Hide sidebar, full-width content"

  related_services:
    - $ref: "../../network/api-endpoints.yaml#/resources/summaries"
    - $ref: "../../network/api-endpoints.yaml#/resources/lessons"
    - $ref: "../../network/api-endpoints.yaml#/resources/modules"

  current_implementation: |
    import { Component } from '@angular/core';

    @Component({
      selector: 'app-summary-view',
      imports: [],
      templateUrl: './summary-view.component.html',
      styleUrl: './summary-view.component.scss'
    })
    export class SummaryViewComponent {

    }

  current_template: |
    <p>summary-view works!</p>

  acceptance_criteria:
    - Breadcrumb shows correct navigation path
    - Lesson title displays correctly
    - Content renders properly (text, images, media)
    - Sidebar shows current lesson highlighted
    - Mark Complete toggles lesson completion
    - Previous/Next buttons navigate correctly
    - First lesson disables Previous button
    - Last lesson disables Next button
    - Completion updates reflect in sidebar
    - Content is readable (proper line length)
    - Mobile layout works without sidebar
    - Page is accessible via keyboard
