  # ────────────────────────────────────────────────────────────────────
  # ACCEPTANCE CRITERIA
  # ────────────────────────────────────────────────────────────────────
  acceptance_criteria:
    - Two-column layout: sidebar (280px) on left, content area on right
    - Sidebar heading displays course name, description (3-line clamp), and instructor name
    - "Manage Course" button visible in sidebar only for users with TEACHER role enrollment
    - "Manage Course" button navigates to /course/:id/manage
    - Sidebar "Course Material" section shows module accordion list sorted by orderIndex
    - Module headers display numbered prefix (e.g. "1. Getting Started", "2. Advanced Topics")
    - Lesson items display hierarchical numbered prefix (e.g. "1.1 Introduction", "1.2 Setup")
    - Selected lesson title in content area includes the hierarchical prefix
    - Modules are collapsible (accordion), first module expanded by default
    - Clicking a lesson in sidebar loads content and shows tabbed interface
    - Content area is left-aligned with max-width 900px (no margin: 0 auto)
    - Lesson content area shows three tabs: Summary, Exercises, Submissions (teacher-only)
    - Summary tab is the default active tab when a lesson is selected
    - Summary tab displays lesson summary from SummaryService.get(lessonId)
    - Exercises tab lists all exercises with per-exercise submission status
    - Exercises tab shows exercise title, type, question count, and attempt status chip
    - "Do Exercise" button in Exercises tab navigates to /course/:id/lesson/:lessonId/attempt
    - Submissions tab is visible only for TEACHER role enrollment
    - Submissions tab lists exercises as expandable cards with submission count chip
    - Clicking an exercise card in Submissions tab expands it to show all its questions
    - Only one exercise card can be expanded at a time
    - Questions are fetched from QuestionService.listByExercise on first expand (cached)
    - Expanded card shows questions sorted by orderIndex with numbered prefix
    - Clicking a question opens a right-side side drawer (Angular Material MatDrawer)
    - Side drawer (mode="side") shrinks content to fit alongside drawer
    - Drawer shows question content as header, then all students' answers for that question
    - Each student answer card displays student name, status chip, and their answer text
    - Answer text shows the student's answer or "(no answer)" placeholder
    - Drawer closes on close button click
    - Tab data is lazy-loaded (submission statuses fetched on tab activation)
    - First lesson of first module is auto-selected on page load
    - Mobile: sidebar becomes drawer overlay (white background) with a compact hamburger icon button at the top-left of content
    - Content area MUST have padding at all viewport widths — content never touches the viewport edge
    - Loading state shows skeleton placeholders
    - Not-enrolled state shows "Enroll Now" CTA in content area and locks lesson content
    - Enrollment status badge reflects ACTIVE/PENDING/REJECTED/null states
    - Error state shows message with retry action
    - No standalone course header section — all course identity lives in sidebar
    - Tab buttons must have explicit text color (button elements do not inherit)
