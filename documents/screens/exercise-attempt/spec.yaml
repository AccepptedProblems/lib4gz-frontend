openspec: "1.0"
kind: Screen
info:
  title: Exercise Attempt
  version: "3.0.0"
  description: >
    Exercise-taking screen for students. Replaces the previous split between
    "exercise-attempt overview" and "exercise-do full-screen". This screen
    is now the single destination for doing exercises. It loads ALL exercises
    for the lesson and presents them as tabs (Exercise 1, Exercise 2, ...).
    Each tab shows the exercise title and answer UI (Multiple Choice radio
    buttons, Text Answer textarea). The header displays the lesson position
    prefix (e.g. "Exercise 1.2") with Cancel and Submit buttons on the
    same row. Includes a Fast Fill Answer feature for rapidly filling
    answers by pasting numbered text — answers are auto-distributed to
    questions of the currently active exercise.

screen:
  id: exercise-attempt
  name: Exercise Attempt
  route: /course/:id/lesson/:lessonId/attempt
  route_note: >
    Changed from the previous "/course/:id/exercise/:exerciseId/attempt"
    to be lesson-scoped, since this screen now shows ALL exercises for
    a lesson as tabs. The lessonId param identifies which lesson's exercises
    to load.
  component:
    selector: app-exercise-attempt
    file: src/app/components/course/exercise-attempt/exercise-attempt.component.ts
    template: src/app/components/course/exercise-attempt/exercise-attempt.component.html
    styles: src/app/components/course/exercise-attempt/exercise-attempt.component.scss
    standalone: true
  guard: authGuard
  target_users: [student]
  status: scaffold

  purpose: >
    Provide a focused environment for students to complete all exercises
    in a lesson. Exercises are organized as tabs so students can work
    through them sequentially or jump between them. The header provides
    context (lesson position) and action buttons (Cancel to go back,
    Submit to finalize answers). Each exercise tab shows the exercise
    title followed by the answer UI for each question in that exercise.

  # ────────────────────────────────────────────────────────────────────
  # NAVBAR VISIBILITY
  # ────────────────────────────────────────────────────────────────────
  navbar_visibility: visible
  navbar_visibility_description: >
    The navigation bar remains visible on this screen. Unlike the previous
    exercise-do full-screen approach, this screen uses the standard page
    layout with navbar for consistent navigation.

  # ────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ────────────────────────────────────────────────────────────────────
  layout:
    desktop:
      description: >
        Single-column centered layout (max-width 800px, centered with auto
        margins). Header row contains the lesson exercise title on the left
        and Cancel/Submit buttons on the right. Below the header is a
        sticky tab bar row with exercise tabs on the left and a
        "Fast Fill Answer" button on the right. Both header and tab bar
        are sticky — header sticks to top, tab bar sticks directly under
        the header. Tab content area shows the selected exercise's
        questions and answer inputs. >=768px.
      ascii: |
        +──────────────────────────────────────────────────────────────+
        │  Navbar                                                      │
        +──────────────────────────────────────────────────────────────+
        │                                                              │  ← sticky
        │  Exercise 1.2                    [Cancel]   [Submit]         │  ← header
        │                                                              │
        │  [Exercise 1]  [Exercise 2]  [Exercise 3]  [⚡ Fast Fill]    │  ← sticky
        │  ─────────────────────────────────────────────────────────    │  ← tabs
        │                                                              │
        │  Exercise Title: Introduction Quiz                           │
        │                                                              │
        │  1. What is Angular?                                         │
        │     ( ) A library                                            │
        │     (●) A framework                                          │
        │     ( ) A language                                            │
        │                                                              │
        │  2. What is TypeScript?                                      │
        │     [                                                ]       │
        │     [  Student types answer here...                  ]       │
        │     [                                                ]       │
        │                                                              │
        +──────────────────────────────────────────────────────────────+

    mobile:
      description: "Compact layout with stacked header elements. <768px."
      ascii: |
        +──────────────────────────────+
        │  Navbar                      │
        +──────────────────────────────+
        │                              │
        │  Exercise 1.2                │
        │  [Cancel]   [Submit]         │
        │                              │
        │  [Ex 1] [Ex 2]  [⚡ Fast Fill]│
        │  ────────────────────────    │
        │                              │
        │  Exercise Title              │
        │                              │
        │  1. Question text...         │
        │  (answer UI)                 │
        │                              │
        +──────────────────────────────+

  # ────────────────────────────────────────────────────────────────────
  # COMPONENTS
  # ────────────────────────────────────────────────────────────────────
  components:
    - id: header-bar
      name: Header Bar
      type: inline
      description: >
        Top section of the page with the lesson exercise title on the left
        and action buttons on the right, on the same row. The title uses
        the lesson's hierarchical position prefix from the course dashboard.
      layout: |
        +──────────────────────────────────────────────────────────────+
        │  Exercise 1.2                          [Cancel]   [Submit]   │
        +──────────────────────────────────────────────────────────────+
      elements:
        - name: Exercise Title
          class: text-headline-small
          description: >
            Displays "Exercise" followed by the lesson's position prefix.
            The prefix (e.g. "1.2") is passed via route query params or
            state from the course dashboard when navigating. This identifies
            which lesson's exercises are being attempted.
            Format: "Exercise {lessonPrefix}" (e.g. "Exercise 1.2").
          data_binding: "'Exercise ' + lessonPrefix"

        - name: Cancel Button
          component: "lib-button [variant]=\"'secondary'\" [size]=\"'md'\""
          label: "Cancel"
          description: >
            Navigates back to the course dashboard. If there are unsaved
            changes (isDirty), shows a confirmation dialog before navigating.
            Otherwise, navigates directly to /course/:id.
          action: "Navigate to /course/:id (with unsaved changes check)"

        - name: Submit Button
          component: "lib-button [variant]=\"'primary'\" [size]=\"'md'\""
          label: "Submit"
          description: >
            Submits all exercise answers. Opens a confirmation dialog showing
            the number of answered vs total questions across all exercises.
            On confirmation, saves all answers and submits each exercise's
            submission. On success, navigates back to the course dashboard.
          action: "Save all answers, submit, navigate to /course/:id"

    - id: exercise-tabs
      name: Exercise Tab Bar
      type: inline
      description: >
        Sticky horizontal tab bar below the header. Sticks directly under
        the header bar when scrolling (position sticky, top equals header
        height). Contains exercise tabs on the left and a "Fast Fill Answer"
        button on the right. One tab per exercise in the lesson, sorted by
        orderIndex. Tab labels show only the index: "Exercise 1",
        "Exercise 2", etc. (not the exercise title — the title is shown
        inside the tab content area). The active tab has a bottom border
        accent using --primary-color.
      layout: |
        [Exercise 1]  [Exercise 2]  [Exercise 3]       [⚡ Fast Fill Answer]
        ─────────────────────────────────────────────────────────────────────
      elements:
        - name: Tab Button
          description: >
            One per exercise. Label format: "Exercise {index}" where index
            is 1-based position from the exercises array sorted by orderIndex.
            Active tab has primary color bottom border and text color.
            IMPORTANT: Tab buttons must have explicit color property
            (button elements do not inherit text color).
          data_binding: "exercises() sorted by orderIndex"
        - name: Fast Fill Answer Button
          description: >
            Secondary-style button placed on the right side of the tab bar
            row (pushed right via margin-left: auto). Opens the Fast Fill
            Answer dialog for the currently active exercise. Label: "Fast
            Fill Answer" with a bolt/lightning emoji prefix (⚡). Only
            applies to the current active exercise — not all exercises.
          component: "button (native)"
          action: "Open Fast Fill Answer dialog for activeExercise()"
      styling:
        container: >
          display flex, align-items center, gap 0,
          border-bottom 1px solid var(--neutral-color-3),
          overflow-x auto (horizontal scroll on mobile if many tabs).
          position sticky, top var(--header-bar-height, 57px),
          z-index 9, background var(--surface-page, #ffffff).
          NOTE: top value must match the header-bar's rendered height so
          the tab bar sits flush below the header when both are sticky.
        tab_button: >
          padding 10px 20px, background none, border none, cursor pointer,
          color var(--text-secondary-color), font-weight 500,
          border-bottom 2px solid transparent, transition all 200ms ease,
          white-space nowrap.
          IMPORTANT: Must have explicit color (button elements do not inherit).
        tab_active: >
          color var(--primary-color-600), border-bottom-color var(--primary-color-600).
        tab_hover: >
          color var(--text-primary-color), background var(--surface-hover).
        fast_fill_button: >
          margin-left auto, padding 6px 14px, font-size 13px, font-weight 500,
          background none, border 1px solid var(--neutral-color-3),
          border-radius var(--radius-sm), color var(--text-secondary-color),
          cursor pointer, white-space nowrap, flex-shrink 0,
          transition all 150ms ease.
        fast_fill_button_hover: >
          background var(--surface-hover), color var(--text-primary-color),
          border-color var(--neutral-color-4).

    - id: exercise-content
      name: Exercise Tab Content
      type: inline
      description: >
        The content area for the currently selected exercise tab. Displays
        the exercise title as a heading, followed by all questions in that
        exercise with their answer input areas. Questions are sorted by
        orderIndex and displayed vertically in a scrollable list.
      layout: |
        +──────────────────────────────────────────────────────────────+
        │  Exercise Title: Introduction Quiz                           │
        │                                                              │
        │  1. What is Angular?                                         │
        │     ( ) A library                                            │
        │     (●) A framework                                          │
        │     ( ) A language                                            │
        │                                                              │
        │  ────────────────────────────────────────────────────────     │
        │                                                              │
        │  2. Explain dependency injection.                            │
        │     [                                                ]       │
        │     [  Student types answer here...                  ]       │
        │     [                                                ]       │
        +──────────────────────────────────────────────────────────────+
      elements:
        - name: Exercise Title
          class: text-title-large
          description: >
            The full title of the currently selected exercise.
            Example: "Introduction Quiz" or "Practice Problems".
          data_binding: "activeExercise().title"

        - name: Question List
          description: >
            All questions for the active exercise, sorted by orderIndex.
            Each question is rendered as a numbered card with the question
            content and the appropriate answer input area based on the
            exercise type.
          data_binding: "activeQuestions() — QuestionResponse[]"

        - name: Question Card
          description: >
            Individual question display. Shows:
            (1) Question number: "{index}." (1-based)
            (2) Question content text
            (3) Answer input area (type-dependent)
            Questions are separated by subtle dividers.
          styling: >
            padding 20px 0, border-bottom 1px solid var(--neutral-color-2).
            Last question: no border-bottom.

        - name: Multiple Choice Input
          description: >
            Vertical radio button group for MULTIPLE_CHOICE exercises.
            Each option from question.meta.options is rendered as a
            clickable label with a radio input. Selecting an option
            updates the local answers map.
            Options come from QuestionResponse.meta.options array.
          styling: >
            Each option: display flex, align-items center, gap 12px,
            padding 12px 16px, border-radius var(--radius-sm),
            cursor pointer, transition background 150ms ease.
            Hover: background var(--neutral-color-1).
            Selected: background var(--primary-color-50),
            border-left 3px solid var(--primary-color).

        - name: Text Answer Input
          component: lib-textarea
          description: >
            Uses the shared lib-textarea component for TEXT_ANSWER
            exercises. Auto-expands height based on content. Bound via
            [value]="getAnswer(question.id)" and
            (valueChange)="onTextChange(question.id, $event)".
            minRows=4, no floating label, placeholder "Type your answer
            here...", ariaLabel bound to question number.

    - id: submit-confirmation-dialog
      name: Submit Confirmation Dialog
      type: inline
      component: lib-dialog
      description: >
        Modal dialog shown when user clicks "Submit". Displays a summary
        of answered vs total questions, followed by a per-exercise
        breakdown listing each exercise that has unanswered questions.
        This helps students identify exactly which exercises need
        attention before finalizing. When all questions are answered,
        the breakdown is hidden and a simple confirmation is shown.
      layout: |
        When some questions are unanswered:
        ┌────────────────────────────────────────────────────┐
        │  Submit Exercises                                   │
        │                                                    │
        │  You have answered 7 out of 10 questions.          │
        │                                                    │
        │  ⚠ Exercise 1 — 2 questions not answered           │
        │  ⚠ Exercise 3 — 1 question not answered            │
        │                                                    │
        │  Are you sure you want to submit your answers?   │
        │                                                    │
        │              [Cancel]    [Submit]                   │
        └────────────────────────────────────────────────────┘

        When all questions are answered:
        ┌────────────────────────────────────────────────────┐
        │  Submit Exercises                                   │
        │                                                    │
        │  You have answered all 10 questions. Ready to      │
        │  submit\!                                           │
        │                                                    │
        │  Are you sure you want to submit your answers?   │
        │                                                    │
        │              [Cancel]    [Submit]                   │
        └────────────────────────────────────────────────────┘
      props:
        title: "Submit Exercises"
        confirmLabel: "Submit"
        cancelLabel: "Cancel"
        confirmVariant: "primary"
      body_content:
        summary_paragraph: >
          Conditional: If unansweredCount > 0, show "You have answered
          {answeredCount} out of {totalQuestions} questions." If all
          answered, show "You have answered all {totalQuestions}
          questions. Ready to submit!"
        unanswered_breakdown: >
          Shown only when unansweredCount > 0. An unordered list (ul)
          with class "unanswered-list" listing each exercise that has
          at least one unanswered question. Each item shows a warning
          icon (material-icons "warning_amber", colored --warning-color)
          followed by "Exercise {1-based index} — {count} question(s)
          not answered". The list uses flexbox column layout with 8px
          gap, no bullet markers (list-style: none), and subtle styling
          with text-body-medium class and --text-secondary-color.
        confirmation_paragraph: >
          Always shown: "Are you sure you want to submit your answers?"

    - id: cancel-confirmation-dialog
      name: Cancel Confirmation Dialog
      type: inline
      component: lib-dialog
      description: >
        Modal dialog shown when user clicks "Cancel" and has unsaved
        changes. Confirms navigation away from the exercise attempt.
      layout: |
        ┌────────────────────────────────────────────────────┐
        │  Leave Exercise?                                    │
        │                                                    │
        │  Your progress has been saved as a draft.          │
        │  You can continue this attempt later.              │
        │                                                    │
        │              [Stay]    [Leave]                      │
        └────────────────────────────────────────────────────┘
      props:
        title: "Leave Exercise?"
        confirmLabel: "Leave"
        cancelLabel: "Stay"
        confirmVariant: "destructive"

    - id: fast-fill-answer-dialog
      name: Fast Fill Answer Dialog
      type: inline
      component: lib-dialog
      description: >
        Modal dialog for rapidly filling answers for the currently active
        exercise. Students paste their numbered answer list into a textarea.
        The app parses by numbered indices (same regex as exercise-editor
        Fast Create: ^\s*(\d+)\s*[.)]\s*) and distributes each answer to
        the corresponding question by position (answer 1 → question 1,
        answer 2 → question 2, etc.). For MULTIPLE_CHOICE exercises, each
        parsed answer is fuzzy-matched against the available options — if
        an exact case-insensitive match is found, that option is selected;
        otherwise the raw text is used. For TEXT_ANSWER exercises, the
        parsed text is set directly as the answer. If more answers than
        questions are pasted, excess answers are ignored. If fewer answers
        are provided, remaining questions stay unchanged. A live preview
        counter shows how many answers were parsed (e.g. "3 answers
        detected"). On confirm, answers are applied and auto-save triggers.
        Fast Fill only applies to the current active exercise tab.
      layout: |
        ┌────────────────────────────────────────────────────┐
        │  ⚡ Fast Fill Answer                                │
        │                                                    │
        │  Paste your numbered answers below:                │
        │  ┌──────────────────────────────────────────────┐  │
        │  │ 1. Answer for first question                 │  │
        │  │ 2. Answer for second question                │  │
        │  │ 3. Answer for third question                 │  │
        │  │                                              │  │
        │  └──────────────────────────────────────────────┘  │
        │  3 answers detected (4 questions total)            │
        │                                                    │
        │              [Cancel]    [Fill N Answers]           │
        └────────────────────────────────────────────────────┘
      props:
        title: "⚡ Fast Fill Answer"
        confirmLabel: "'Fill ' + parsedAnswers().length + ' Answers'"
        cancelLabel: "Cancel"
        confirmVariant: "primary"
        width: "600px"
      body_content:
        textarea: >
          lib-textarea component with label "Paste your numbered answers
          below", placeholder showing numbered answer format example,
          minRows=6, auto-expanding. Bound to fastFillText signal with
          debounced parsing (200ms) via fastFillInput$ Subject.
        preview_counter: >
          Below textarea: "{N} answers detected ({M} questions total)"
          where N = parsedAnswers().length and M = activeQuestions().length.
          Styled with text-body-medium and --text-secondary-color.
      parsing_logic:
        description: >
          Uses the same numbered-index regex as exercise-editor Fast Create.
          Splits pasted text by lines starting with a number followed by
          . or ) — multi-line content between indices is preserved per answer.
        regex: '^\s*(\d+)\s*[.)]\s*'
        steps:
          - Split input by newlines
          - For each line, test against numbered regex
          - If match, flush previous answer buffer and start new answer
          - If no match, append line to current answer buffer
          - Trim each answer; discard empty answers
          - Return ordered array of answer strings
        answer_distribution: >
          Answers are mapped to questions by position (1-based):
          parsedAnswers[0] → activeQuestions()[0],
          parsedAnswers[1] → activeQuestions()[1], etc.
          Excess answers beyond question count are ignored.
          Missing answers (fewer than questions) leave those questions
          unchanged.
        multiple_choice_matching: >
          For MC exercises, each parsed answer is matched against
          question.meta.options using case-insensitive comparison.
          If a match is found, the original option text is used as the
          answer value (preserving case). If no match, the raw parsed
          text is used (allowing manual correction later).

  # ────────────────────────────────────────────────────────────────────
  # STATES
  # ────────────────────────────────────────────────────────────────────
  states:
    - name: loading
      description: >
        Full-page spinner (lib-spinner type="screen") while exercises
        and questions load.
    - name: loaded
      description: >
        All exercises and questions loaded. Tab bar visible, first exercise
        tab active by default, questions rendered with answer inputs.
    - name: error
      description: >
        Error state with error_outline icon, error message, and a
        "Go Back" secondary button. Shown if exercise or question
        fetch fails.
    - name: submitting
      description: >
        Submit button shows loading state. Confirmation dialog visible.
        All inputs remain visible but submit is in progress.
    - name: no-exercises
      description: >
        No exercises found for this lesson. Shows a placeholder with
        "No exercises available for this lesson." message and a "Go Back"
        button. This is an edge case (normally the user wouldn't navigate
        here if no exercises exist).

  # ────────────────────────────────────────────────────────────────────
  # DATA FLOW
  # ────────────────────────────────────────────────────────────────────
  data_flow:
    route_params:
      - name: id
        type: string
        description: Course ID (used for Cancel navigation back to course dashboard)
      - name: lessonId
        type: string
        description: Lesson ID (used to load all exercises for this lesson)
    query_params:
      - name: prefix
        type: string
        required: false
        description: >
          Lesson position prefix passed from course dashboard navigation
          (e.g. "1.2"). Used for the header title "Exercise 1.2". If not
          provided, the header falls back to "Exercise" without a prefix.
    signals:
      - name: courseId
        type: string
        source: route param 'id'
      - name: lessonId
        type: string
        source: route param 'lessonId'
      - name: lessonPrefix
        type: string
        source: "query param 'prefix' || ''"
        description: >
          Lesson hierarchical prefix (e.g. "1.2") for the header title.
      - name: screenState
        type: "'loading' | 'loaded' | 'error'"
        initial: "'loading'"
      - name: exercises
        type: ExerciseResponse[]
        initial: "[]"
        description: >
          All exercises for the lesson, sorted by orderIndex.
      - name: activeExerciseIndex
        type: number
        initial: "0"
        description: >
          Index of the currently active exercise tab (0-based).
      - name: questionsMap
        type: "Map<string, QuestionResponse[]>"
        initial: "new Map()"
        description: >
          Map from exerciseId to its questions array. All exercises'
          questions are loaded in parallel on initialization.
      - name: answersMap
        type: "Map<string, Map<string, string>>"
        initial: "new Map()"
        description: >
          Nested map: exerciseId -> (questionId -> answer string).
          Populated from any existing submission on load (regardless
          of status — DRAFT, SUBMITTED, NEEDS_REVISION, or APPROVED),
          then updated as the student answers questions. This ensures
          learners always see their previous answers when re-attempting.
      - name: submissionIds
        type: "Map<string, string>"
        initial: "new Map()"
        description: >
          Map from exerciseId to submissionId. Set when submissions
          are loaded or created during save.
      - name: isDirty
        type: boolean
        initial: "false"
        description: >
          True when any answer has changed since last save. Used for
          cancel confirmation and auto-save trigger.
      - name: isSubmitting
        type: boolean
        initial: "false"
      - name: showSubmitDialog
        type: boolean
        initial: "false"
      - name: showCancelDialog
        type: boolean
        initial: "false"
      - name: showFastFillDialog
        type: boolean
        initial: "false"
        description: >
          Controls visibility of the Fast Fill Answer dialog.
      - name: fastFillText
        type: string
        initial: "''"
        description: >
          Raw text content in the Fast Fill Answer textarea.
      - name: parsedAnswers
        type: string[]
        initial: "[]"
        description: >
          Answers parsed from fastFillText using numbered-index regex.
          Updated via debounced Subject (200ms) as user types/pastes.

    reactive_subjects:
      - name: fastFillInput$
        type: "Subject<string>"
        description: >
          RxJS Subject for debounced parsing of Fast Fill textarea input.
          Pipes through debounceTime(200) and updates parsedAnswers signal.

    computed_signals:
      - name: activeExercise
        type: ExerciseResponse | null
        computed: "exercises()[activeExerciseIndex()] ?? null"
      - name: activeQuestions
        type: QuestionResponse[]
        computed: "questionsMap().get(activeExercise()?.id ?? '') ?? []"
      - name: activeAnswers
        type: "Map<string, string>"
        computed: "answersMap().get(activeExercise()?.id ?? '') ?? new Map()"
      - name: totalQuestions
        type: number
        computed: >
          Sum of all questions across all exercises.
      - name: answeredCount
        type: number
        computed: >
          Count of non-null, non-empty answers across all exercises
          in the answersMap.
      - name: unansweredCount
        type: number
        computed: "totalQuestions() - answeredCount()"
      - name: unansweredByExercise
        type: "{ exerciseIndex: number; unansweredCount: number }[]"
        computed: >
          Iterates exercises(), for each exercise computes the number of
          unanswered questions (total questions minus answered questions
          for that exercise). Returns only entries where unansweredCount
          > 0. exerciseIndex is the 1-based display index.
      - name: headerTitle
        type: string
        computed: >
          lessonPrefix() ? 'Exercise ' + lessonPrefix() : 'Exercise'

    service_calls:
      - service: ExerciseService
        method: listByLesson
        params: lessonId
        description: >
          Load all exercises for the lesson. Sorted by orderIndex.
          These become the tabs.
      - service: QuestionService
        method: listByExercise
        params: "exerciseId (per exercise, in parallel)"
        description: >
          Load questions for each exercise. Called in parallel for all
          exercises using forkJoin. Results stored in questionsMap.
      - service: SubmissionService
        method: getMySubmission
        params: "exerciseId (per exercise, in parallel)"
        description: >
          Load existing submissions (drafts) for each exercise. Called
          in parallel. 404 responses mean no prior attempt — expected.
          If a submission exists (any status), populate answersMap from
          submission.answers so the learner sees their previous answers.
          Since creating a new attempt does not create a new record,
          pre-populating from any status improves UX continuity.
      - service: SubmissionService
        method: createOrUpdate
        params: "exerciseId, { answers: AnswerRequest[] }"
        description: >
          Save draft answers for an exercise. Called on auto-save or
          before submission. Converts per-exercise answers to
          AnswerRequest[] format.
      - service: SubmissionService
        method: submit
        params: submissionId
        description: >
          Final submission for each exercise. Called after user confirms
          in submit dialog. Iterates over all exercises with submissions.

  # ────────────────────────────────────────────────────────────────────
  # INTERACTIONS
  # ────────────────────────────────────────────────────────────────────
  interactions:
    - action: Switch exercise tab
      trigger: Click an exercise tab button
      result: >
        Set activeExerciseIndex to the tab index. If isDirty, auto-save
        current exercise's answers before switching. The new tab's
        questions and existing answers are already loaded (from init).

    - action: Select MC answer
      trigger: Click radio option in a Multiple Choice question
      result: >
        Update answersMap for the current exercise and question.
        Set isDirty to true. Trigger debounced auto-save (2 seconds).

    - action: Type text answer
      trigger: Type in textarea for a Text Answer question
      result: >
        Update answersMap for the current exercise and question.
        Set isDirty to true. Trigger debounced auto-save (2 seconds).

    - action: Click Cancel
      trigger: Click Cancel button in header
      result: >
        If isDirty: save draft first, then show cancel confirmation dialog.
        If clean: navigate directly to /course/:id (course dashboard).

    - action: Confirm cancel
      trigger: Click "Leave" in cancel confirmation dialog
      result: Navigate to /course/:id (course dashboard)

    - action: Click Submit
      trigger: Click Submit button in header
      result: >
        If isDirty: save all exercise drafts first.
        Show submit confirmation dialog with answered/unanswered count
        and per-exercise breakdown of unanswered questions.

    - action: Confirm submission
      trigger: Click "Submit" in confirmation dialog
      result: >
        Set isSubmitting to true. For each exercise that has a submission:
        call SubmissionService.submit(submissionId). On all success:
        close dialog, navigate to /course/:id with success indication.
        On error: close dialog, show error toast, stay on page.

    - action: Page load
      trigger: Route activation
      result: >
        1. Extract lessonId and courseId from route params, prefix from query.
        2. Fetch ExerciseService.listByLesson(lessonId).
        3. For each exercise in parallel:
           - Fetch QuestionService.listByExercise(exerciseId)
           - Fetch SubmissionService.getMySubmission(exerciseId) (404 = no attempt)
        4. Populate questionsMap and answersMap from results.
        5. Set screenState to 'loaded', first exercise tab active.

    - action: Auto-save
      trigger: Answer change (debounced 2 seconds via RxJS Subject)
      result: >
        Save current exercise's answers via SubmissionService.createOrUpdate.
        Update submissionIds map with returned submissionId.
        Set isDirty to false on success.

    - action: Open Fast Fill Answer
      trigger: Click "⚡ Fast Fill Answer" button in the tab bar row
      result: >
        Reset fastFillText to empty string and parsedAnswers to [].
        Set showFastFillDialog to true. The dialog opens for the current
        active exercise only.

    - action: Type/paste in Fast Fill textarea
      trigger: Input in the Fast Fill Answer dialog textarea
      result: >
        Update fastFillText signal. Emit to fastFillInput$ Subject.
        After 200ms debounce, parse the text using numbered-index regex
        and update parsedAnswers signal. The confirm button label
        dynamically updates to show "Fill {N} Answers".

    - action: Confirm Fast Fill
      trigger: Click "Fill N Answers" in Fast Fill dialog
      result: >
        Distribute parsedAnswers to the active exercise's questions by
        position. For each parsed answer at index i, update answersMap
        for activeQuestions()[i].id with the answer text. For MC
        exercises, attempt case-insensitive match against available
        options. Set isDirty to true. Trigger auto-save. Close dialog.

    - action: Cancel Fast Fill
      trigger: Click "Cancel" in Fast Fill dialog
      result: >
        Close the dialog. No changes to answersMap.

  # ────────────────────────────────────────────────────────────────────
  # BUSINESS LOGIC
  # ────────────────────────────────────────────────────────────────────
  business_logic:
    initialization:
      description: >
        On component init, load all exercises for the lesson and their
        questions and existing submissions in parallel.
      steps:
        - Fetch ExerciseService.listByLesson(lessonId)
        - Sort exercises by orderIndex
        - For each exercise in parallel (forkJoin):
          - Fetch QuestionService.listByExercise(exerciseId)
          - Fetch SubmissionService.getMySubmission(exerciseId) (404 = no attempt)
        - Sort each exercise's questions by orderIndex
        - Populate questionsMap with exerciseId -> questions[]
        - Populate answersMap from any existing submission (any status)
        - Store submissionIds for exercises with existing submissions
        - Set activeExerciseIndex to 0 (first exercise)
        - Set screenState to 'loaded'

    auto_save:
      description: >
        Auto-save mechanism using RxJS Subject with debounceTime.
      triggers:
        - On answer change (debounced 2 seconds)
        - On tab switch (immediate save if dirty)
        - Before showing submit/cancel dialogs (immediate save)
      implementation: >
        1. Answer change emits to a save$ Subject
        2. save$.pipe(debounceTime(2000)) triggers saveDraft(exerciseId)
        3. saveDraft converts answers for that exercise to AnswerRequest[]
        4. Calls SubmissionService.createOrUpdate(exerciseId, { answers })
        5. On success: store submissionId, set isDirty to false
        6. On error: show brief error indicator

    answer_mapping:
      description: >
        How answers are stored locally and sent to the API.
      local_format: >
        Nested Map: exerciseId -> Map<questionId, answerString>
      api_format: >
        Per exercise: AnswerRequest[] = [{ questionId, answer }]
      multiple_choice: >
        Answer is the text of the selected option. Null if unanswered.
      text_answer: >
        Answer is the raw text content. Null if empty.

    submission_flow:
      steps:
        - User clicks "Submit" in header
        - If dirty, save all drafts first (wait for completion)
        - Show submit confirmation dialog with answered/total counts
        - User clicks "Submit" in dialog
        - For each exercise with a submissionId, call SubmissionService.submit(submissionId) in parallel
        - On all success: close dialog, navigate to /course/:id
        - On any error: close dialog, show error toast, stay on page

    cancel_flow:
      steps:
        - User clicks "Cancel" in header
        - If dirty, save draft first, then show confirmation dialog
        - If clean, navigate directly to /course/:id
        - On confirm leave: navigate to /course/:id
        - On cancel (stay): close dialog, remain on page

    fast_fill_answer:
      description: >
        Rapid answer entry for the active exercise. Students paste a
        numbered list of answers; the app parses and distributes them
        to questions by position. Follows the same parsing pattern as
        exercise-editor Fast Create (numbered-index regex).
      steps:
        - User clicks "⚡ Fast Fill Answer" button in the tab bar
        - Dialog opens with empty textarea
        - User pastes or types numbered answers (e.g. "1. My answer\n2. Another")
        - Text is parsed with 200ms debounce using numbered-index regex
        - parsedAnswers signal updates, confirm button shows count
        - User clicks "Fill N Answers"
        - For each parsedAnswer at index i (0-based):
          - Get question = activeQuestions()[i]
          - If question exists, set answersMap[exerciseId][question.id] = answer
          - For MC exercises: case-insensitive match against options array;
            use matched option text if found, raw text otherwise
        - Set isDirty to true, trigger auto-save for the active exercise
        - Close dialog
      parsing_regex: '^\s*(\d+)\s*[.)]\s*'
      parsing_implementation: >
        Same as exercise-editor parseQuestions() method. Split by newlines,
        detect numbered lines, flush previous buffer on new number match,
        preserve multi-line content between indices, trim each result.

  # ────────────────────────────────────────────────────────────────────
  # MODELS
  # ────────────────────────────────────────────────────────────────────
  models:
    primary:
      - name: ExerciseResponse
        file: src/app/shared/models/exercise.model.ts
        ref: "$ref: ../../network/models.yaml#/models/exercise"
      - name: QuestionResponse
        file: src/app/shared/models/question.model.ts
        ref: "$ref: ../../network/models.yaml#/models/question"
      - name: SubmissionResponse
        file: src/app/shared/models/submission.model.ts
        ref: "$ref: ../../network/models.yaml#/models/submission"
    enums:
      - name: ExerciseType
        file: src/app/shared/models/enums.ts
        values: [TEXT_ANSWER, CODE, FILE_UPLOAD, MULTIPLE_CHOICE, PROJECT_LINK]
      - name: SubmissionStatus
        file: src/app/shared/models/enums.ts
        values: [DRAFT, SUBMITTED, APPROVED, NEEDS_REVISION]

  # ────────────────────────────────────────────────────────────────────
  # API ENDPOINTS
  # ────────────────────────────────────────────────────────────────────
  api:
    read_endpoints:
      - id: exercises.list-by-lesson
        method: GET
        path: /v1/lessons/{lessonId}/exercises
        auth: true
        response: ExerciseResponse[]
        ref: "$ref: ../../network/api-endpoints.yaml#/resources/exercises/endpoints/1"

      - id: questions.list-by-exercise
        method: GET
        path: /v1/exercises/{exerciseId}/questions
        auth: true
        response: QuestionResponse[]
        ref: "$ref: ../../network/api-endpoints.yaml#/resources/questions/endpoints/0"

      - id: submissions.my-submission
        method: GET
        path: /v1/exercises/{exerciseId}/my-submission
        auth: true
        response: SubmissionResponse
        ref: "$ref: ../../network/api-endpoints.yaml#/resources/submissions/endpoints/1"

    write_endpoints:
      - id: submissions.create-or-update
        method: POST
        path: /v1/exercises/{exerciseId}/submissions
        auth: true
        request: "CreateSubmissionRequest | UpdateSubmissionRequest"
        response: SubmissionResponse
        description: Save draft answers for an exercise
        ref: "$ref: ../../network/api-endpoints.yaml#/resources/submissions/endpoints/2"

      - id: submissions.submit
        method: POST
        path: /v1/submissions/{submissionId}/submit
        auth: true
        request: "{}"
        response: SubmissionResponse
        description: Final submission (DRAFT -> SUBMITTED)
        ref: "$ref: ../../network/api-endpoints.yaml#/resources/submissions/endpoints/4"

  # ────────────────────────────────────────────────────────────────────
  # DESIGN SYSTEM REFERENCES
  # ────────────────────────────────────────────────────────────────────
  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/headline/levels/2"
        usage: Header title "Exercise 1.2" (text-headline-small)
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/0"
        usage: Exercise title inside tab content (text-title-large)
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/1"
        usage: Tab button labels (text-title-medium weight)
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/0"
        usage: Question content text, radio option labels (text-body-large)
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/1"
        usage: Question number labels, meta text (text-body-medium)
    colors:
      - $ref: "../../design-system/color.yaml#/theme_colors/primary"
        usage: >
          Active tab border, selected radio highlight, Submit button,
          selected option left border accent.
      - $ref: "../../design-system/color.yaml#/theme_colors/semantic"
        usage: >
          Error state icon (--error-color), warning dialog icon.
      - $ref: "../../design-system/color.yaml#/theme_colors/neutral"
        usage: >
          Tab bar bottom border, question dividers, inactive tab text,
          radio option hover background, textarea border.
    components:
      - $ref: "../../design-system/components.yaml#/button"
        usage: Cancel/Submit header buttons, tab buttons
      - $ref: "../../design-system/components.yaml#/input"
        usage: Textarea styling for TEXT_ANSWER questions
    shared_components:
      - $ref: "../../design-system/shared-components.yaml#/button"
        usage: Cancel (lib-button secondary), Submit (lib-button primary)
      - $ref: "../../design-system/shared-components.yaml#/spinner"
        usage: Loading state (lib-spinner type="screen")
      - $ref: "../../design-system/shared-components.yaml#/dialog"
        usage: Submit and Cancel confirmation dialogs (lib-dialog)
      - $ref: "../../design-system/shared-components.yaml#/textarea"
        usage: Text answer input with auto-expanding height (lib-textarea)
    tokens:
      - $ref: "../../design-system/tokens.yaml#/spacing"
        usage: >
          Page padding (24px 32px), question card padding (20px 0),
          tab padding (10px 20px), header gap, answer option gap (12px).
      - $ref: "../../design-system/tokens.yaml#/border_radius"
        usage: >
          Answer option hover (--radius-sm), textarea (--radius-sm),
          page container (none — flush layout).
      - $ref: "../../design-system/tokens.yaml#/z_index"
        usage: >
          Confirmation dialogs (--z-index-modal).
    breakpoints:
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
        usage: "768px: Stack header elements vertically, compact padding"

  # ────────────────────────────────────────────────────────────────────
  # RESPONSIVE
  # ────────────────────────────────────────────────────────────────────
  responsive:
    breakpoints:
      - range: ">= 768px"
        layout: >
          Centered content with max-width 800px. Header title and buttons
          on the same row (flex with space-between). Tabs with comfortable
          padding (10px 20px). Question cards with 20px vertical padding.
      - range: "< 768px"
        layout: >
          Full-width with 16px padding. Header title and buttons stack
          vertically (title on first line, buttons on second). Tab bar
          has horizontal scroll if many tabs (overflow-x auto). Question
          cards with 16px vertical padding. Radio options with larger
          touch targets (min-height 44px).

  # ────────────────────────────────────────────────────────────────────
  # ACCESSIBILITY
  # ────────────────────────────────────────────────────────────────────
  accessibility:
    - Tab bar uses role="tablist" with role="tab" on each button
    - Active tab has aria-selected="true"
    - Tab content panel has role="tabpanel" with aria-labelledby
    - Radio groups have proper name attributes and aria-labels
    - Textarea has aria-label for question context
    - Confirmation dialogs use role="dialog" with aria-modal
    - Keyboard: Tab navigates between interactive elements
    - Keyboard: Arrow keys navigate within radio groups
    - Keyboard: Arrow keys navigate between tabs in tablist

  # ────────────────────────────────────────────────────────────────────
  # RELATED
  # ────────────────────────────────────────────────────────────────────
  related_screens:
    - $ref: "../course-dashboard/spec.yaml"
      relationship: "Cancel navigates back to course dashboard"

  related_services:
    - $ref: "../../network/api-endpoints.yaml#/resources/exercises"
    - $ref: "../../network/api-endpoints.yaml#/resources/questions"
    - $ref: "../../network/api-endpoints.yaml#/resources/submissions"

  # ────────────────────────────────────────────────────────────────────
  # CURRENT IMPLEMENTATION
  # ────────────────────────────────────────────────────────────────────
  current_implementation: |
    // See src/app/components/course/exercise-attempt/exercise-attempt.component.ts
