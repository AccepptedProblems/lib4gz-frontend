  current_template: |
    <p>exercise-attempt works!</p>

  current_styles: ""

  # ────────────────────────────────────────────────────────────────────
  # ACCEPTANCE CRITERIA
  # ────────────────────────────────────────────────────────────────────
  acceptance_criteria:
    - Route is /course/:id/lesson/:lessonId/attempt
    - Header displays "Exercise {lessonPrefix}" (e.g. "Exercise 1.2")
    - Header bar is sticky (position sticky, top 0, z-index 10)
    - Cancel and Submit buttons are on the same row as the header title
    - Cancel navigates back to course dashboard (with unsaved changes check)
    - Submit opens confirmation dialog with answered/unanswered question counts and per-exercise breakdown
    - Submit dialog lists each exercise with unanswered questions (e.g. "Exercise 2 — 3 questions not answered")
    - Submit dialog shows "Ready to submit!" when all questions are answered
    - Tab bar shows one tab per exercise ("Exercise 1", "Exercise 2", etc.)
    - Tab bar is sticky directly under the header (position sticky, z-index 9)
    - Tabs are sorted by exercise orderIndex
    - Active tab has primary color bottom border accent
    - "Fast Fill Answer" button is on the same row as exercise tabs, pushed right
    - Fast Fill Answer opens a dialog for the currently active exercise only
    - Fast Fill dialog has a textarea for pasting numbered answers
    - Fast Fill parses numbered answers using regex ^\s*(\d+)\s*[.)]\s*
    - Fast Fill distributes answers to questions by position (answer 1 → question 1)
    - Fast Fill for MC exercises matches answers against options (case-insensitive)
    - Fast Fill confirm button shows dynamic count ("Fill N Answers")
    - Fast Fill shows live preview counter ("N answers detected (M questions total)")
    - Tab content shows exercise title followed by all questions
    - MULTIPLE_CHOICE questions render radio option groups
    - TEXT_ANSWER questions render lib-textarea with auto-expanding height
    - Selecting a radio option updates answers and triggers auto-save
    - Typing in lib-textarea updates answers with debounced auto-save
    - All exercises' questions are loaded in parallel on init
    - Existing submissions (any status) pre-populate answer inputs
    - Auto-save persists answers as drafts (2-second debounce)
    - Submit flow saves all drafts then submits all exercises
    - On successful submission, navigates back to course dashboard
    - Loading state shows full-page spinner
    - Error state shows error message with "Go Back" button
    - No-exercises state shows placeholder message
    - Tab buttons must have explicit text color (button elements do not inherit)
    - Responsive layout: header stacks vertically on mobile (<768px)
    - Tab bar scrolls horizontally on mobile if many tabs
    - Mobile radio options have minimum 44px touch targets
