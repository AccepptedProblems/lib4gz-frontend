openspec: "1.0"
kind: Screen
info:
  title: Lesson View
  version: "1.0.0"
  description: General lesson content display with type badges and navigation.

screen:
  id: lesson-view
  name: Lesson View
  route: /course/:courseId/lesson/:lessonId
  component:
    selector: app-lesson-view
    file: src/app/components/course/lesson-view/lesson-view.component.ts
    template: src/app/components/course/lesson-view/lesson-view.component.html
    styles: src/app/components/course/lesson-view/lesson-view.component.scss
    standalone: true
  guard: authGuard
  target_users: [student]
  status: scaffold

  purpose: >
    Display general lesson content. Serves as the primary lesson viewing
    experience. May contain different content types including text,
    video, and interactive elements.

  layout:
    desktop:
      description: "Two-column with sidebar and content. >1200px."
      ascii: |
        +----------------------------------------------------------+
        |  Navbar                                                  |
        +----------------------------------------------------------+
        |  < Back to Course    |    Lesson 3 of 12                 |
        +----------------------------------------------------------+
        |                                                          |
        |  +------------+  +-----------------------------------+   |
        |  |            |  |  [Lesson Type Badge]              |   |
        |  |  Sidebar   |  |                                   |   |
        |  |  (280px)   |  |  Lesson Title                     |   |
        |  |            |  |  ═══════════════════              |   |
        |  |  Module 1  |  |                                   |   |
        |  |    - Lesson|  |  Lesson content area...           |   |
        |  |    - Lesson|  |  - Text content                   |   |
        |  |  Module 2  |  |  - Videos                         |   |
        |  |    - Lesson|  |  - Interactive elements           |   |
        |  |            |  |  - Downloadable resources         |   |
        |  +------------+  +-----------------------------------+   |
        |                                                          |
        |                  +-----------------------------------+   |
        |                  | [< Previous]           [Next >]   |   |
        |                  +-----------------------------------+   |
        +----------------------------------------------------------+
    mobile:
      description: "Single column, no sidebar. <768px."
      ascii: |
        +----------------------+
        |  Navbar              |
        +----------------------+
        |  < Back | 3 of 12    |
        +----------------------+
        |  [Type Badge]        |
        |  Lesson Title        |
        |  ═══════════════════ |
        |  Content...          |
        +----------------------+
        | [< Prev]    [Next >] |
        +----------------------+

  components:
    - id: header-bar
      name: Header Bar
      type: inline
      layout: |
        +----------------------------------------------------------+
        |  [<] Back to Course          Lesson 3 of 12    [Progress] |
        +----------------------------------------------------------+
      elements:
        - name: Back link
          action: Returns to Course Dashboard
        - name: Lesson indicator
          description: "Current position: 'Lesson X of Y'"
        - name: Progress
          description: Optional mini progress indicator

    - id: lesson-type-badge
      name: Lesson Type Badge
      type: inline
      variants:
        - type: Summary
          label: Reading
          color: Blue
        - type: Exercise
          label: Exercise
          color: Green
        - type: Video
          label: Video
          color: Purple
        - type: Quiz
          label: Quiz
          color: Orange

    - id: sidebar
      name: Sidebar
      type: inline
      description: Same module accordion as other course views with completion checkmarks.
      width: 280px

    - id: content-area
      name: Content Area
      type: inline
      constraints:
        max_width: 800px
        alignment: centered
      elements:
        - name: Title
          typography: text-headline-medium
        - name: Meta
          description: Duration, type, difficulty (optional)
        - name: Body
          description: Main lesson content
        - name: Resources
          description: Downloadable files list (optional)
        - name: Related
          description: Links to related lessons (optional)

    - id: navigation-footer
      name: Navigation Footer
      type: inline
      layout: |
        +---------------------------------------------------+
        |  [< Previous Lesson]                [Next Lesson >]  |
        +---------------------------------------------------+
      behavior:
        - Shows lesson names in buttons (truncated)
        - Disabled states for first/last lesson

  states:
    - name: loading
      description: Header skeleton, content placeholder, sidebar skeleton
    - name: loaded
      description: Full content displayed, navigation enabled, sidebar active
    - name: error
      description: Error message with retry option and back to course link
    - name: not-found
      description: 404 message with back to course link

  data_flow:
    route_params:
      - name: courseId
        type: string
      - name: lessonId
        type: string
    service_calls:
      - service: LessonService
        method: get
        params: lessonId
      - service: ModuleService
        method: listByCourse
        params: courseId

  interactions:
    - action: Back to course
      trigger: Click back link
      result: Navigate to Course Dashboard
    - action: Click sidebar lesson
      trigger: Click lesson
      result: Navigate to that lesson
    - action: Previous lesson
      trigger: Click Previous
      result: Navigate to previous lesson
    - action: Next lesson
      trigger: Click Next
      result: Navigate to next lesson
    - action: Download resource
      trigger: Click resource link
      result: Download file
    - action: Play video
      trigger: Click play (if video lesson)
      result: Start video playback

  business_logic:
    lesson_type_handling:
      - type: Summary
        rendering: Rich text/HTML content
      - type: Video
        rendering: Video player embed
      - type: Exercise
        rendering: Redirect to exercise attempt
      - type: Quiz
        rendering: Inline quiz component
    auto_completion:
      video: Mark complete when 90% watched
      reading: Mark complete when scrolled to bottom
      exercise: Mark complete on submission
    position_calculation: |
      function getLessonPosition(lessonId, modules) {
        let current = 0, total = 0;
        for (const module of modules) {
          for (const lesson of module.lessons) {
            total++;
            if (lesson.id === lessonId) current = total;
          }
        }
        return { current, total };
      }

  accessibility:
    - Video player has keyboard controls
    - Downloadable resources have descriptive text
    - Navigation buttons have proper labels
    - Content follows heading hierarchy
    - Skip links available

  responsive:
    breakpoints:
      - range: "> 768px"
        sidebar: Visible (280px)
        content: Max 800px
      - range: "<= 768px"
        sidebar: Hidden/Drawer
        content: Full width

  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/headline/levels/1"
        usage: Lesson title (text-headline-medium)
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/0"
        usage: Lesson content (text-body-large)
      - $ref: "../../design-system/typography.yaml#/scale/label/levels/0"
        usage: Type badge labels (text-label-large)
      - $ref: "../../design-system/typography.yaml#/scale/label/levels/1"
        usage: Lesson position indicator (text-label-medium)
    colors:
      - $ref: "../../design-system/color.yaml#/theme_colors/primary"
        usage: Active sidebar item, type badges, navigation buttons
      - $ref: "../../design-system/color.yaml#/theme_colors/semantic"
        usage: Completion checkmarks (--success-color)
    components:
      - $ref: "../../design-system/components.yaml#/button"
        usage: Previous/Next navigation buttons, Back link
    shared_components:
      - $ref: "../../design-system/shared-components.yaml#/button"
        usage: Navigation footer buttons (lib-button)
      - $ref: "../../design-system/shared-components.yaml#/spinner"
        usage: Content loading state
    tokens:
      - $ref: "../../design-system/tokens.yaml#/spacing"
        usage: Content area padding, section margins
    breakpoints:
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
        usage: "768px: Hide sidebar, full-width content"

  related_services:
    - $ref: "../../network/api-endpoints.yaml#/resources/lessons"
    - $ref: "../../network/api-endpoints.yaml#/resources/modules"

  current_implementation: |
    import { Component } from '@angular/core';

    @Component({
      selector: 'app-lesson-view',
      imports: [],
      templateUrl: './lesson-view.component.html',
      styleUrl: './lesson-view.component.scss'
    })
    export class LessonViewComponent {

    }

  current_template: |
    <p>lesson-view works!</p>

  acceptance_criteria:
    - Lesson title and type badge display correctly
    - Back to course link works
    - Lesson position indicator shows current/total
    - Content renders based on lesson type
    - Sidebar navigation works
    - Previous/Next navigation works correctly
    - First/last lesson disables appropriate button
    - Resources download correctly (if present)
    - Video playback works (if video lesson)
    - Mobile layout works without sidebar
    - Loading state shows placeholders
    - Error state provides recovery options
