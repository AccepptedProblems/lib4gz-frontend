  # ────────────────────────────────────────────────────────────────────
  # INTERACTIONS
  # ────────────────────────────────────────────────────────────────────
  interactions:
    # --- Sidebar Interactions ---
    - action: Select sidebar nav item
      trigger: Click nav item in sidebar (Course Material / Enrollment / Submissions)
      result: >
        Set activeView signal to the selected view. If the view's data hasn't
        been loaded yet (e.g. submissions), trigger lazy fetch. Main content
        area switches to the corresponding view.
    - action: Edit course
      trigger: Click Edit button in sidebar
      result: >
        Toggle inline edit mode in sidebar — course name and description
        become editable input/textarea fields. Save calls
        CourseService.update(id, { title, description }).
    - action: Go to course
      trigger: Click "Go to Course" button in sidebar actions area
      result: "Navigate to /course/:id"

    # --- Course Material View: Module List ---
    - action: Expand module
      trigger: Click module header in module list
      result: >
        Toggle lesson list visibility (accordion). On first expand,
        fetch lessons via LessonService.listByModule(moduleId).
    - action: Add module
      trigger: Click "+ Add Module" button (at bottom of module list)
      result: >
        Show inline form with title input at the bottom of module list.
        On submit, call ModuleService.create(courseId, { title }).
        On success, append module to list, clear form, show toast.
    - action: Edit module
      trigger: Click Edit on module header
      result: >
        Replace module title with inline input. On save, call
        ModuleService.update(moduleId, { title }). On cancel, restore.
    - action: Delete module
      trigger: Click Delete on module header
      result: >
        Show confirmation dialog warning about cascading deletion
        (lessons and exercises will be removed). On confirm, call
        ModuleService.delete(moduleId). On success, remove from list.
    - action: Add lesson
      trigger: Click "+ Add Lesson" within a module
      result: >
        Show inline form with title input within the module section.
        On submit, call LessonService.create(moduleId, { title }).
        On success, append lesson to module's lesson list.
    - action: Delete lesson
      trigger: Click Delete button on lesson row
      result: >
        Show confirmation dialog. On confirm, call
        LessonService.delete(lessonId). On success, remove from list.

    # --- Course Material View: Lesson Detail ---
    - action: Enter lesson detail
      trigger: Click lesson title in module tree
      result: >
        Set materialSubView='lesson-detail'. Set selectedLessonContext with
        the clicked lesson. Fetch summary via SummaryService.get(lessonId)
        and exercises via ExerciseService.listByLesson(lessonId).
    - action: Back to modules
      trigger: Click "Back to modules" button in lesson detail
      result: >
        Set materialSubView='module-list'. Clear selectedLessonContext.
    - action: Edit lesson title
      trigger: Click lesson title in lesson detail (inline edit)
      result: >
        Replace title with inline input. On save, call
        LessonService.update(lessonId, { title }).
    - action: Edit Summary
      trigger: Click "Edit Summary" button in lesson detail
      result: >
        Navigate to summary editor screen (TODO: separate spec).
        Target route: /course/:id/manage/lesson/:lessonId/summary/edit
    - action: Add Exercise
      trigger: Click "+ Add Exercise" in lesson detail
      result: "Navigate to /course/:id/manage/exercise/new (with lessonId context)"
    - action: Edit exercise
      trigger: Click Edit button on exercise row in lesson detail
      result: "Navigate to /course/:id/manage/exercise/:exerciseId/edit"
    - action: Delete exercise
      trigger: Click Delete button on exercise row in lesson detail
      result: >
        Show confirmation dialog warning about student submissions.
        On confirm, call ExerciseService.delete(exerciseId).
    # --- Enrollment View ---
    - action: Search enrollments
      trigger: Type in search input (enrollment view)
      result: >
        Client-side filter enrollment list by user.name or user.email.
        Debounced at 300ms.
    - action: Filter by status
      trigger: Select status from dropdown (enrollment view)
      result: Filter enrollment list by selected EnrollmentStatus
    - action: Show pending requests
      trigger: Click "Requests (N)" button
      result: >
        Set status filter to PENDING, showing only pending enrollment requests.
    - action: Approve enrollment
      trigger: Click Approve button on pending enrollment row
      result: >
        Call EnrollmentService.approve(enrollmentId). On success, update
        row status to ACTIVE, show success toast.
    - action: Reject enrollment
      trigger: Click Reject button on pending enrollment row
      result: >
        Call EnrollmentService.reject(enrollmentId). On success, update
        row status to REJECTED, show success toast.
    - action: Change student role
      trigger: Select new role from row action menu
      result: >
        Call EnrollmentService.update(enrollmentId, { role }).
        On success, update row in table.
    - action: Remove enrollment
      trigger: Click Remove in row action menu
      result: >
        Show confirmation dialog with student name. On confirm, call
        EnrollmentService.delete(enrollmentId). Remove row from table.

    # --- Submissions View ---
    - action: Filter by exercise
      trigger: Select exercise from dropdown (submissions view)
      result: Filter submissions table by selected exercise
    - action: Filter by status
      trigger: Select status from dropdown (submissions view)
      result: Filter submissions table by selected SubmissionStatus
    - action: View submission
      trigger: Click submission row or view button
      result: >
        Navigate to submission detail view or open inline review panel.

  # ────────────────────────────────────────────────────────────────────
  # BUSINESS LOGIC
  # ────────────────────────────────────────────────────────────────────
  business_logic:
    permission_check:
      description: >
        Only course teacher/owner can access this screen.
        roleGuard validates on route entry by checking the user's
        enrollment role for the course.
      guard: roleGuard
      required_role: teacher

    sidebar_structure:
      description: >
        The sidebar is divided into two sections separated by a divider:
        (1) Course heading — course name, description, action buttons (Edit, Go to Course).
        (2) Navigation items — three nav items with icons (no counts).
        Enrollment item shows a red badge with pending enrollment count when > 0.
      course_heading:
        - Course name (text-title-large)
        - Course description (text-body-medium, 3-line clamp, text-secondary)
        - Edit + Go to Course buttons (lib-button secondary sm, inline)
      navigation:
        - "Course Material" with menu_book icon
        - "Enrollment" with group icon and red pending badge (when > 0)
        - "Submissions" with assignment icon

    view_management:
      description: >
        Three views managed by a signal-based activeView state.
        Course Material is the default. View content is preserved when
        switching (not destroyed/recreated). Each view manages its own
        loading state independently.
      default_view: course-material
      views: [course-material, enrollment, submissions]
      lazy_loading:
        course-material: "Loaded on init (modules + lessons are core data)"
        enrollment: "Loaded on init (enrollment list fetched with forkJoin)"
        submissions: "Lazy — fetched on first view activation"

    lesson_detail:
      description: >
        The Course Material view supports a sub-view pattern. By default it
        shows the module list (materialSubView='module-list'). Clicking a lesson
        transitions to the lesson detail sub-view (materialSubView='lesson-detail')
        which shows summary preview and exercises table.
      sub_views: [module-list, lesson-detail]
      default: module-list
      transitions:
        - from: module-list
          to: lesson-detail
          trigger: Click lesson in module tree
          data_fetch: "SummaryService.get(lessonId) + ExerciseService.listByLesson(lessonId)"
        - from: lesson-detail
          to: module-list
          trigger: Click "Back to modules" button

    summary_preview:
      description: >
        Lesson detail shows a read-only preview of the lesson summary
        (truncated to ~200 chars). The "Edit Summary" button navigates to
        a separate summary editor screen (TODO: spec to be created).
      editor_route: "/course/:id/manage/lesson/:lessonId/summary/edit"
      editor_spec_status: "TODO — separate follow-up task"

    content_structure:
      description: >
        Hierarchical course content displayed as an accordion tree in the
        module list sub-view. Modules are top-level, containing lessons.
      hierarchy: "Course -> Modules (ordered) -> Lessons (ordered)"
      ordering:
        - Modules have orderIndex (1, 2, 3...)
        - Lessons within modules have orderIndex
      accordion:
        - First module expanded by default, others collapsed
        - Expanding one module does NOT collapse others
        - Lessons lazy-loaded per module on first expand

    inline_editing:
      description: >
        Module and lesson titles are edited inline rather than via modals.
        Clicking Edit replaces the title text with an input field pre-filled
        with the current value. Save and Cancel buttons appear beside it.
      pattern:
        - Click Edit -> show input + Save/Cancel
        - Save -> API call -> update local state -> hide input
        - Cancel -> hide input, restore original text
        - Escape key -> same as Cancel

    deletion_cascade:
      description: >
        Deletion confirmation dialogs warn about cascading effects.
        The backend handles actual cascading; the frontend only warns.
      module_delete: "Warning: This will also delete all lessons and exercises in this module."
      lesson_delete: "Warning: This will also delete the lesson summary and any linked exercises."
      exercise_delete: "Warning: This will also delete all student submissions for this exercise."
      enrollment_delete: "Warning: This will remove the student from the course."

    optimistic_updates:
      description: >
        For simple mutations (add module, rename, delete), the UI updates
        optimistically before the API confirms. On API error, the change
        is rolled back and an error toast is shown.
      applies_to: [add_module, rename_module, rename_lesson, delete_module, delete_lesson, delete_exercise]

    enrollment_management:
      description: >
        The enrollment view IS the enrollment management. It provides full
        enrollment management with inline approve/reject for pending requests,
        search, filtering, and role management. No separate screen needed.
      features:
        - Search by name/email (client-side filter)
        - Filter by status
        - Change role (LEARNER <-> TEACHER)
        - Approve/reject pending enrollments
        - Remove enrollment

    submission_aggregation:
      description: >
        Submissions view aggregates submissions across all exercises in
        the course. Data is fetched lazily on first view activation by iterating
        all exercises and calling SubmissionService.listByExercise() for each.
        Results are cached until manual refresh.
      data_joining: >
        Each SubmissionResponse contains exerciseId. The UI joins this
        with the exercise title (from the loaded exercise data) to display
        the exercise name in the table.
      pre_filtering: >
        Exercise filter can be manually set by the teacher to narrow
        submissions by a specific exercise.

    navigation:
      exercise_editor_new: "/course/:id/manage/exercise/new"
      exercise_editor_edit: "/course/:id/manage/exercise/:exerciseId/edit"
      summary_editor: "/course/:id/manage/lesson/:lessonId/summary/edit (TODO: separate spec)"
      back_to_course: "/course/:id"

  # ────────────────────────────────────────────────────────────────────
  # ACCESSIBILITY
  # ────────────────────────────────────────────────────────────────────
  accessibility:
    - Sidebar navigation uses role="navigation" with aria-label="Course management"
    - Active nav item uses aria-current="page"
    - Nav items are keyboard accessible (Tab, Enter, Space)
    - Module accordion headers use aria-expanded and aria-controls attributes
    - Data tables have proper th headers with scope="col"
    - Action menus are accessible via keyboard (Enter to open, Escape to close)
    - Confirmation dialogs are modal with focus trap and aria-modal="true"
    - Delete buttons have aria-label including entity name (e.g. "Delete Module: Introduction")
    - Inline edit inputs receive focus automatically when activated
    - Focus returns to trigger element when dialog closes
    - Mobile sidebar drawer has focus trap when open
    - Status badges use aria-label for screen readers
    - Lesson detail sub-view manages focus — focus moves to back button on enter, returns to lesson item on back
    - Approve/Reject buttons have aria-label including student name

  # ────────────────────────────────────────────────────────────────────
  # RESPONSIVE
  # ────────────────────────────────────────────────────────────────────
  responsive:
    design_principle_ref: "../../design-system/design-principles.yaml#/principles/responsive-sidebar-layout"
    breakpoints:
      - range: "> 768px"
        sidebar: Fixed 280px, always visible
        layout: Two-column (sidebar + content)
        tables: Full table view with all columns
        content_padding: "24px 32px on content-inner"
      - range: "<= 768px"
        sidebar: Hidden, accessible via drawer overlay (white background)
        layout: Single column, compact hamburger icon button shown at top-left
        toggle_button: >
          Compact hamburger icon button (40×40px, icon-only, no background/border).
          Positioned at top-left of content flow. Hover state: --surface-hover.
        sidebar_drawer_background: "var(--surface-page, #ffffff)"
        tables: Email column hidden
        content_padding: "16px on content-inner"

  # ────────────────────────────────────────────────────────────────────
  # DESIGN SYSTEM
  # ────────────────────────────────────────────────────────────────────
  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/0"
        token: text-title-large
        resolved: "22px / 28px / weight-medium"
        usage: Course name in sidebar heading, lesson title in lesson detail
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/1"
        token: text-title-medium
        resolved: "16px / 24px / weight-medium / tracking 0.15px"
        usage: "Module titles in module list, nav item labels, section headers"
      - $ref: "../../design-system/typography.yaml#/scale/title/levels/2"
        token: text-title-small
        resolved: "14px / 20px / weight-medium / tracking 0.1px"
        usage: "Sub-section headers (Summary, Exercises in lesson detail)"
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/1"
        token: text-body-medium
        resolved: "14px / 20px / weight-regular / tracking 0.25px"
        usage: Course description, lesson titles, table content, exercise titles, summary preview
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/2"
        token: text-body-small
        resolved: "12px / 16px / weight-regular / tracking 0.4px"
        usage: "Table secondary text (dates, email), cascade warnings, nav item counts, module badge in lesson detail"
      - $ref: "../../design-system/typography.yaml#/scale/label/levels/0"
        token: text-label-large
        resolved: "14px / 20px / weight-medium / tracking 0.1px"
        usage: Button labels, table headers

    text_colors:
      - token: .text-primary (--text-primary-color -> --neutral-color-9)
        usage: Course name, module titles, table primary text, lesson title
      - token: .text-secondary (--text-secondary-color -> --neutral-color-7)
        usage: Course description, nav item counts, table secondary text
      - token: "var(--primary-color) -> var(--primary-color-600) -> #00897b"
        usage: Active nav item text, active nav item left border

    colors:
      sidebar:
        $ref: "../../design-system/design-principles.yaml#/principles/unified_surface"
        note: >
          Sidebar follows Unified Surface principle — NO background-color
          difference, NO border-right. Same white background as content area.
          Separation via negative space (padding-right: 24px on sidebar).
        tokens_used:
          - { token: --sidebar-bg-color, value: "transparent (inherits --surface-page -> #ffffff)", usage: "Sidebar background — same as content area per Unified Surface" }
          - { token: --sidebar-item-hover-bg, value: "var(--surface-hover) -> #f8f8f8", usage: "Nav item hover state" }
          - { token: --sidebar-item-active-bg, value: "var(--primary-color-50) -> #f1f8f6", usage: "Active nav item background" }
          - { token: --sidebar-item-active-text, value: "var(--primary-color-600) -> #00897b", usage: "Active nav item text color" }
          - { token: --sidebar-item-active-border, value: "var(--primary-color-600) -> #00897b", usage: "Left 3px accent border on active nav item" }
      content_area:
        $ref: "../../design-system/theme.yaml#/token_mixins/default_configuration"
        tokens_used:
          - { token: --page-bg-color, value: "var(--surface-page) -> #ffffff", usage: "Content area background" }
      enrollment_badges:
        $ref: "../../design-system/color.yaml#/theme_colors/semantic"
        mapping:
          - status: ACTIVE
            badge_variant: success
            tokens: "bg: var(--surface-success-subtle) -> #e8f5e9, text: var(--success-color-8) -> #2e7d32"
          - status: PENDING
            badge_variant: warning
            tokens: "bg: var(--surface-warning-subtle) -> #fff8e1, text: var(--warning-color-8) -> #e86722"
          - status: REJECTED
            badge_variant: error
            tokens: "bg: var(--surface-error-subtle) -> #ffebee, text: var(--error-color-8) -> #c62828"
          - status: INACTIVE
            badge_variant: neutral
            tokens: "bg: var(--neutral-color-2) -> #f2f2f2, text: var(--neutral-color-7) -> #646464"
      submission_badges:
        $ref: "../../design-system/color.yaml#/theme_colors/semantic"
        mapping:
          - status: DRAFT
            badge_variant: neutral
            tokens: "bg: var(--neutral-color-2) -> #f2f2f2, text: var(--neutral-color-7) -> #646464"
          - status: SUBMITTED
            badge_variant: warning
            tokens: "bg: var(--surface-warning-subtle) -> #fff8e1, text: var(--warning-color-8) -> #e86722"
          - status: APPROVED
            badge_variant: success
            tokens: "bg: var(--surface-success-subtle) -> #e8f5e9, text: var(--success-color-8) -> #2e7d32"
          - status: NEEDS_REVISION
            badge_variant: error
            tokens: "bg: var(--surface-error-subtle) -> #ffebee, text: var(--error-color-8) -> #c62828"

