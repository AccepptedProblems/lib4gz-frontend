  # ────────────────────────────────────────────────────────────────────
  # ACCEPTANCE CRITERIA
  # ────────────────────────────────────────────────────────────────────
  acceptance_criteria:
    # Layout
    - Two-column layout: sidebar (280px) on left, content area on right (max-width 960px, left-aligned)
    - Sidebar shows course name, description (3-line clamp), Edit and Go to Course buttons
    - Sidebar nav items show icon + label for Course Material, Enrollment, Submissions (no item counts)
    - Enrollment nav item shows a red notification badge (red bg, white text, pill) with pending enrollment count when > 0
    - Active nav item has left accent border (3px solid primary-color) and primary-color text
    - "Go to Course" button in sidebar actions area (next to Edit) navigates to /course/:id
    - Sidebar follows Unified Surface — NO background-color difference, NO border-right between sidebar and content
    - Mobile: sidebar becomes drawer overlay with a visible toggle bar (background tint, clear icon) at the top of the layout
    - Content area MUST have padding at all viewport widths — content never touches the viewport edge

    # Course Material View — Module List
    - Module accordion with lessons, first module expanded by default
    - Expanding one module does NOT collapse others
    - Module CRUD: add via inline form, edit via inline input, delete with confirmation dialog
    - Lesson CRUD: add via inline form within module, delete with confirmation dialog
    - Click lesson title enters lesson detail sub-view
    - "+ Add Module" button at bottom of module list (after all module sections)
    - "+ Add Lesson" button at bottom of lesson list within each module (after all lesson rows)
    - Lesson items show numbered prefix (moduleIndex.lessonIndex, e.g., "1.1") instead of tree icon
    - Empty state: "No modules yet. Create your first module to start building your course."

    # Course Material View — Lesson Detail
    - Back button returns to module list sub-view
    - Lesson title displayed (editable inline)
    - Parent module name shown as context badge
    - Summary preview shows first ~200 chars of summary content
    - "Edit Summary" button navigates to summary editor screen (TODO: separate spec)
    - "No summary yet." placeholder with "Add Summary" button when no summary exists
    - Exercises table with columns: Title, Type (badge), Questions, Actions
    - Exercise actions: Edit (-> exercise editor), Delete (confirmation)
    - "+ Add Exercise" button navigates to exercise editor with lesson context

    # Enrollment View
    - Table with search input, status filter dropdown, and "Requests (N)" button
    - Table columns: #, Name, Email, Role, Status (badge), Joined, Actions
    - Pending rows show Approve and Reject action buttons
    - Approve calls EnrollmentService.approve(), Reject calls EnrollmentService.reject()
    - "Requests (N)" button filters to PENDING status
    - Row actions: Change Role, Remove (with confirmation)
    - Pagination: 20 per page with prev/next navigation
    - Empty state: "No enrollments yet. Share your course to get started."

    # Submissions View
    - Aggregated table across all exercises with exercise and status filter dropdowns
    - Table columns: Student, Exercise, Submitted date, Status (badge), View
    - Click row navigates to submission detail/review
    - Exercise and status filters for narrowing submissions
    - Lazy-loaded on first activation
    - Empty state: "No submissions yet."

    # State Management
    - Signal-based: activeView, materialSubView, selectedLessonContext signals
    - pendingEnrollmentCount computed signal filters enrollments by PENDING status
    - Enrollment nav item badge reactively updates when enrollments change
    - Optimistic updates for add/rename/delete operations
    - Toast notifications for successful and failed operations
    - Skeleton loading states per view
    - Error state shows message with retry action

    # Data Integrity
    - Course data, modules, and enrollments fetched on init via forkJoin
    - Lessons lazy-loaded per module on first accordion expand
    - Summary and exercises fetched on lesson detail enter
    - Submissions lazy-loaded on first view activation
    - Data refreshed after mutation operations (create, update, delete)
