openspec: "1.0"
kind: Screen
info:
  title: Course Management (Teacher)
  version: "4.0.0"
  description: >
    Central management hub for course instructors. Two-column layout with a
    persistent left sidebar for course identity and navigation, and a centered
    main content area with view-based layout. Sidebar nav items (Course Material,
    Enrollment, Submissions) switch the main content view. The Enrollment item
    displays a red badge with the count of pending enrollments when > 0.
    Replaces the previous tabbed interface with a sidebar navigation pattern.

screen:
  id: course-management
  name: Course Management
  route: /course/:id/manage
  route_note: >
    Child route of "course/:id" parent. This component renders at the
    "manage" child path. The parent applies authGuard, and this route
    additionally applies roleGuard with data: { roles: ['teacher'] }.
    Route definition: { path: 'manage', loadComponent: () => import(...CourseManagementComponent), canActivate: [roleGuard], data: { roles: ['teacher'] } }
  component:
    selector: app-course-management
    file: src/app/components/course-teacher/course-management/course-management.component.ts
    template: src/app/components/course-teacher/course-management/course-management.component.html
    styles: src/app/components/course-teacher/course-management/course-management.component.scss
    standalone: true
  guard: [authGuard, roleGuard]
  guard_data:
    roles: [teacher]
  target_users: [teacher]
  status: scaffold

  purpose: >
    Central management hub for course instructors. Provides a two-column layout
    where the left sidebar contains course identity (name, description, edit/go-to-course
    actions) and a navigation menu with three views: Course Material, Enrollment,
    and Submissions. Clicking a nav item switches the main content area to the
    corresponding view. Sidebar nav items do not show item counts; instead,
    the Enrollment item shows a red badge with the pending enrollment count
    when there are pending requests (> 0). The Course Material view supports a sub-view pattern for
    lesson detail. Follows the same sidebar + centered content pattern as the
    student course-dashboard for visual consistency.

  # ────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ────────────────────────────────────────────────────────────────────
  layout:
    desktop:
      description: >
        Two-column layout. Left sidebar (280px fixed) holds course identity
        heading, navigation items, and action buttons (Edit, Go to Course).
        Nav items do not display counts. The Enrollment item shows a red
        badge with the pending enrollment count when > 0.
        Right column takes remaining width with content centered
        (max-width: 960px, left-aligned) showing the active view.
        Breakpoint: >768px.
      ascii: |
        +----------------------------------------------------------+
        |  Navbar                                                  |
        +----------------------------------------------------------+
        |              |                                           |
        |  SIDEBAR     |   MAIN CONTENT (max-width 960px)         |
        |  (280px)     |                                           |
        |              |   Changes based on sidebar nav selection:  |
        |  Course Name |                                           |
        |  Description |   1. Course Material (default)            |
        |  [Edit] [Go to Course]|  - Module/Lesson tree            |
        |              |      - Lesson Detail sub-view              |
        |  ──────────  |                                           |
        |              |   2. Enrollment                            |
        |  > Course    |      - Table + search/filter/approve       |
        |    Material  |                                           |
        |  > Enrollment|   3. Submissions                           |
        |    [3]       |      - Aggregated table + filters          |
        |  > Submissions|                                          |
        |              |                                           |
        +----------------------------------------------------------+
    mobile:
      description: "Single column. Sidebar becomes a drawer overlay with white background. <768px."
      ascii: |
        +----------------------+
        | Navbar               |
        +----------------------+
        | [☰]                  |
        |                      |
        |  Content (full width)|
        |  Active view content |
        |                      |
        +----------------------+
      toggle_button: >
        Compact hamburger icon button (not full-width bar). Uses Material
        Icons "menu" glyph. No background/border — icon-only button with
        40×40px tap target, border-radius 8px, hover: --surface-hover.
        Positioned at top-left of content flow.

  # ────────────────────────────────────────────────────────────────────
  # COMPONENTS
  # ────────────────────────────────────────────────────────────────────
  components:
    - id: sidebar
      name: Sidebar — Course Identity & Navigation
      type: inline
      width: 280px
      description: >
        Persistent left column containing two sections:
        (1) Course heading — course name, description, action buttons (Edit, Go to Course).
        (2) Navigation items — Course Material, Enrollment, Submissions.
        Nav items do NOT display item counts. Only the Enrollment item shows
        a red notification badge (red bg, white text, pill shape) with the
        pending enrollment count when pendingEnrollmentCount > 0.
        The sidebar serves as the primary navigation hub. Clicking a nav item
        switches the main content view via the activeView signal.
        IMPORTANT: Follows Unified Surface principle — sidebar MUST NOT have a
        different background color or border-right from the content area.
        Both columns share the same white background (--surface-page).
        Separation is achieved through negative space (padding-right on sidebar).
      layout: |
        +----------------------------+
        |                            |
        |  Course Name               |
        |  Description (2-3 ln)      |
        |  [Edit] [Go to Course]     |
        |                            |
        |  ────────────────────────  |
        |                            |
        |  > Course Material         |
        |  > Enrollment        [3]   |
        |  > Submissions             |
        |                            |
        +----------------------------+
      elements:
        - name: Course Name
          typography: text-title-large
          data_binding: "course().title"
          description: >
            Course title displayed at the top of the sidebar.
            Uses text-title-large (22px/28px, weight-medium).

        - name: Course Description
          typography: text-body-medium
          data_binding: "course().description"
          description: >
            2-3 line excerpt of the course description.
            Truncated with -webkit-line-clamp: 3.
            Color: var(--text-secondary-color).

        - name: Edit Course Button
          component: "lib-button [variant]=\"'secondary'\" [size]=\"'sm'\""
          label: "Edit"
          icon: "edit (Material Icons)"
          description: >
            Opens an inline edit form or modal to edit course title,
            description, and cover image. Placed next to the Go to Course button.
          action: Toggle inline edit mode or open edit dialog

        - name: Go to Course Button
          component: "lib-button [variant]=\"'secondary'\" [size]=\"'sm'\""
          label: "Go to Course"
          icon: none
          action: "Navigate to /course/:id"
          description: >
            Action button in the sidebar actions area, next to the Edit button.
            Navigates to the student course dashboard view. Text-only button, no icon.

        - name: Navigation Items
          description: >
            Vertical list of navigation items. Each item shows an icon and label.
            No item counts are displayed. The Enrollment item additionally shows
            a red notification badge (red bg, white text, pill shape) with the
            pending enrollment count when pendingEnrollmentCount() > 0.
            The active item has a left accent border (3px solid primary-color)
            and primary-color text. Clicking an item sets the activeView signal
            and switches the main content area.
          items:
            - id: course-material
              icon: menu_book
              label: "Course Material"
              default: true
            - id: enrollment
              icon: group
              label: "Enrollment"
              badge:
                binding: "pendingEnrollmentCount()"
                visibility: "pendingEnrollmentCount() > 0"
                style:
                  background: "#e53935 (red)"
                  color: "#ffffff (white)"
                  border_radius: "var(--radius-full) (pill)"
                  font_size: "11px"
                  font_weight: 600
                  min_width: "18px"
                  height: "18px"
                  padding: "0 6px"
                description: >
                  Red notification badge showing the number of PENDING enrollments.
                  Only visible when pendingEnrollmentCount() > 0. Styled as a small
                  pill (red background, white text) positioned at the right end of
                  the nav item row, after the label.
            - id: submissions
              icon: assignment
              label: "Submissions"
          active_styles:
            background: "var(--primary-color-50) -> #f1f8f6"
            text_color: "var(--primary-color-600) -> #00897b"
            left_border: "3px solid var(--primary-color-600) -> #00897b"

    - id: course-material-view
      name: "View: Course Material — Module & Lesson Management"
      type: inline
      description: >
        Default main content view. Displays the hierarchical course structure:
        Modules -> Lessons. Each level supports CRUD operations with inline add
        forms and confirmation dialogs for deletion. Modules are displayed as
        collapsible accordion sections. Clicking a lesson enters the lesson
        detail sub-view.
      sub_views:
        - id: module-list
          name: Module List (default sub-view)
          description: >
            Shows the module accordion tree. Each module expands to show its
            lessons. Supports add/edit/delete for modules and lessons.
          layout: |
            +----------------------------------------------------+
            |  ▾ Module 1: Introduction         [Edit] [Delete]  |
            |    1.1 Welcome                     [Edit] [Delete] |
            |    1.2 Overview                    [Edit] [Delete] |
            |    [+ Add Lesson]                                  |
            +----------------------------------------------------+
            |  ▸ Module 2: Basics               [Edit] [Delete]  |
            +----------------------------------------------------+
            |  ▸ Module 3: Advanced             [Edit] [Delete]  |
            +----------------------------------------------------+
            |  [+ Add Module]                                    |
            +----------------------------------------------------+
          elements:
            - name: Add Module Button
              component: "lib-button [variant]=\"'primary'\" [size]=\"'sm'\""
              label: "+ Add Module"
              position: Bottom of module list (after all module sections)
              action: >
                Show inline form with title input. On submit, call
                ModuleService.create(courseId, { title }). On success,
                append new module to list and clear form.

            - name: Module Accordion Item
              description: >
                Collapsible section for each module. Header shows module title
                with orderIndex prefix (e.g. "Module 1: Introduction") and
                action buttons (edit/delete). Body contains lessons.
              typography:
                title: text-title-medium
              features:
                - Collapsible header with chevron icon
                - Action buttons (Edit, Delete) on header row
                - First module expanded by default
                - Expanding one module does NOT collapse others

            - name: Add Lesson Button (per module)
              component: "lib-button [variant]=\"'secondary'\" [size]=\"'sm'\""
              label: "+ Add Lesson"
              position: Bottom of lesson list within module (after all lesson rows)
              action: >
                Show inline form with title input within the module.
                On submit, call LessonService.create(moduleId, { title }).
                On success, append lesson to module's lesson list.

            - name: Lesson Item
              description: >
                Individual lesson row within a module. Shows a numbered prefix
                in the format "moduleIndex.lessonIndex" (e.g., "1.1", "1.2")
                followed by the lesson title. No tree icon (subdirectory_arrow_right).
                Clicking the lesson title enters the lesson detail sub-view.
                Edit and Delete action buttons on the right.
              typography: text-body-medium
              prefix_format: "{{ moduleIndex + 1 }}.{{ lessonIndex + 1 }}"
              elements:
                - "Numbered prefix (e.g., 1.1) + lesson title (clickable -> lesson detail)"
                - Edit button (enters lesson detail for editing)
                - Delete button (confirmation dialog)

            - name: Inline Edit Form (Module/Lesson)
              description: >
                Simple inline form that replaces the item text with an input field
                and Save/Cancel buttons. Used for renaming modules and lessons.
              elements:
                - lib-input for title
                - Save button (lib-button primary sm)
                - Cancel button (lib-button secondary sm)

            - name: Delete Confirmation Dialog
              component: lib-dialog
              description: >
                Modal dialog confirming deletion with warning about cascading effects.
                Module deletion warns about contained lessons and exercises.
                Lesson deletion warns about summary and exercises.
              elements:
                - Warning icon
                - Confirmation message with entity name
                - Cascade warning text
                - Cancel button (lib-button secondary)
                - Delete button (lib-button destructive)

          states:
            - name: empty
              description: >
                "No modules yet. Create your first module to start building
                your course." Empty state illustration with Add Module CTA.
            - name: adding-module
              description: Inline form visible at top for new module title
            - name: editing-module
              description: Module title replaced with inline edit input
            - name: adding-lesson
              description: Inline form visible within module for new lesson title
            - name: editing-lesson
              description: Lesson title replaced with inline edit input
            - name: deleting
              description: Confirmation dialog visible with backdrop

        - id: lesson-detail
          name: Lesson Detail (sub-view)
          child_component: app-lesson-detail-management
          child_component_spec: "./lesson-detail-management.yaml"
          description: >
            Entered when a lesson is clicked in the module list. Rendered by
            the child component app-lesson-detail-management. Shows lesson
            title (editable), summary preview, and exercises table. Provides
            navigation to the summary editor screen and exercise editor.
            See lesson-detail-management.yaml for full component spec.
          layout: |
            +----------------------------------------------------+
            |  [<-]  Lesson Title [✎]            [Module Name]   |
            +----------------------------------------------------+
            |  Summary                                           |
            |  ┌──────────────────────────────────────────────┐  |
            |  │  Summary preview text (first ~200 chars)...  │  |
            |  │                                              │  |
            |  │  [Edit Summary]                              │  |
            |  └──────────────────────────────────────────────┘  |
            +----------------------------------------------------+
            |  Exercises                          [+ Add Exercise]|
            |  ┌──────────────────────────────────────────────┐  |
            |  │ Title      │ Type    │ Questions │ Actions   │  |
            |  │ Quiz 1     │ MCQ     │ 5         │ [E][D][S] │  |
            |  │ Project 1  │ PROJECT │ 3         │ [E][D][S] │  |
            |  └──────────────────────────────────────────────┘  |
            +----------------------------------------------------+
          elements:
            - name: Back Button
              element: button
              class: icon-btn
              icon: "arrow_back"
              action: "Set materialSubView='module-list'"
              description: >
                Icon-only back button (no label) aligned left in the lesson
                header row. Uses the .icon-btn style for a minimal circular
                icon button. Clicking returns to the module list sub-view.

            - name: Lesson Title
              typography: text-title-large
              data_binding: "selectedLessonContext().lesson.title"
              editable: false
              description: >
                Non-editable display of the lesson title. Title text is static
                (not clickable). An adjacent edit icon button triggers inline
                editing mode.

            - name: Edit Title Button
              element: button
              class: icon-btn
              icon: "edit"
              action: "startEditLesson(ctx.lesson.id, ctx.lesson.title)"
              description: >
                Small edit icon button rendered next to the lesson title.
                Clicking enters inline edit mode for the title. Uses the
                .icon-btn style for visual consistency with other icon actions.

            - name: Module Badge
              typography: text-body-small
              data_binding: "selectedLessonContext().moduleTitle"
              description: >
                Shows the parent module name for context.

            - name: Summary Preview
              description: >
                Shows a preview of the lesson summary content (first ~200 chars).
                If no summary exists, shows "No summary yet" placeholder.
                "Edit Summary" button navigates to the summary editor screen.
              elements:
                - Summary text preview (truncated)
                - "Edit Summary" button -> navigates to summary editor screen (TODO: separate spec)
              states:
                - name: summary-loading
                  description: Skeleton placeholder while summary is being fetched
                - name: summary-loaded
                  description: Summary preview text with Edit Summary button
                - name: no-summary
                  description: "'No summary yet.' placeholder with 'Add Summary' button"

            - name: Exercises Table
              element: table
              description: >
                Table of exercises for this lesson. Each row shows exercise title,
                type badge, question count, and action buttons.
              columns:
                - { header: "Title", field: "title" }
                - { header: "Type", field: "type", component: "lib-badge" }
                - { header: "Questions", field: "questionCount" }
                - { header: "Actions", field: "actions", width: "120px" }
              row_actions:
                - name: Edit
                  description: "Navigate to /course/:id/manage/exercise/:exerciseId/edit"
                - name: Delete
                  description: "Confirmation dialog, then ExerciseService.delete(exerciseId)"
              empty_state: "No exercises yet for this lesson."

            - name: Add Exercise Button
              component: "lib-button [variant]=\"'primary'\" [size]=\"'sm'\""
              label: "+ Add Exercise"
              action: "Navigate to /course/:id/manage/exercise/new (with lessonId context)"
              description: >
                Navigates to the exercise editor screen to create a new exercise
                for this lesson.

          states:
            - name: loading
              description: Skeleton placeholders for summary and exercises table
            - name: loaded
              description: Summary preview and exercises table displayed
            - name: error
              description: Error fetching lesson detail data with retry button

    - id: enrollment-view
      name: "View: Enrollment — Student Management"
      type: inline
      description: >
        Data table of all enrolled students with search, filter, pagination,
        and inline approve/reject actions for pending enrollments.
        This view IS the enrollment management — no separate screen needed.
      layout: |
        +----------------------------------------------------+
        |  [Search by name/email...]     [Status: All ▼]     |
        |                          [Requests (3)]             |
        +----------------------------------------------------+
        |  | # | Name     | Email    | Role    | Status   | ⋮ |
        |  | 1 | John Doe | j@e.com  | Learner | Active   | ⋮ |
        |  | 2 | Jane Doe | ja@e.com | Learner | Pending  |[A][R]|
        |  | 3 | Bob S.   | b@e.com  | Teacher | Active   | ⋮ |
        +----------------------------------------------------+
        |  Showing 1-20 of 45       [< 1 2 3 >]             |
        +----------------------------------------------------+
      elements:
        - name: Search Input
          component: "lib-input [placeholder]=\"'Search by name or email...'\""
          description: >
            Filters enrollment list client-side by matching user.name or
            user.email against the search term. Debounced (300ms).

        - name: Status Filter
          element: select
          options: [All, Active, Pending, Rejected, Inactive]
          description: >
            Filters enrollments by EnrollmentStatus. Default: All.

        - name: Requests Button
          component: "lib-button [variant]=\"'secondary'\" [size]=\"'sm'\""
          label: "Requests"
          badge: "Pending request count (if > 0)"
          description: >
            Filters the enrollment table to show only PENDING status enrollments.
            Badge shows the number of pending requests.
          action: "Set status filter to PENDING"

        - name: Enrollment Table
          element: table
          description: >
            Data table with sortable columns. Each row shows student info
            with action buttons. Pending rows show Approve/Reject buttons.
          columns:
            - { header: "#", field: "index", width: "50px" }
            - { header: "Name", field: "user.name", sortable: true }
            - { header: "Email", field: "user.email", sortable: true }
            - { header: "Role", field: "role", sortable: true }
            - { header: "Status", field: "status", sortable: true, component: "lib-badge" }
            - { header: "Joined", field: "joinedAt", sortable: true, format: "date" }
            - { header: "", field: "actions", width: "100px" }
          row_actions:
            - name: Change Role
              description: "Toggle between LEARNER and TEACHER via EnrollmentService.update()"
            - name: Approve
              description: "Call EnrollmentService.approve(enrollmentId). Visible only for PENDING status."
              visibility: "enrollment.status === 'PENDING'"
            - name: Reject
              description: "Call EnrollmentService.reject(enrollmentId). Visible only for PENDING status."
              visibility: "enrollment.status === 'PENDING'"
            - name: Remove
              description: "Confirm dialog, then EnrollmentService.delete(enrollmentId)"

        - name: Pagination
          description: >
            Client-side pagination. 20 items per page. Shows current range
            and total count. Prev/Next buttons with page number indicators.

      states:
        - name: empty
          description: "No enrollments yet. Share your course to get started."
        - name: loading
          description: Table skeleton with 5 rows
        - name: filtered-empty
          description: "No enrollments match your search/filter criteria."

    - id: submissions-view
      name: "View: Submissions — Exercise Review"
      type: inline
      description: >
        Filterable list of student submissions across all exercises in the
        course. Teachers can filter by exercise and status, then click
        to view/grade individual submissions. Lazy-loaded on first activation.
        Teachers can filter by exercise and status to find specific submissions.
      layout: |
        +----------------------------------------------------+
        |  [Exercise: All ▼]     [Status: All ▼]             |
        +----------------------------------------------------+
        |  | Student   | Exercise | Submitted  | Status    |->|
        |  | John Doe  | Quiz 1   | Mar 5, '26 | Submitted |->|
        |  | Jane Doe  | Quiz 1   | Mar 4, '26 | Approved  |->|
        |  | Bob Smith | Proj 1   | Mar 3, '26 | Needs Rev |->|
        +----------------------------------------------------+
        |  Showing 1-20 of 89       [< 1 2 3 >]             |
        +----------------------------------------------------+
      elements:
        - name: Exercise Filter
          element: select
          options: "Dynamic — populated from all exercises across modules"
          description: >
            Filters submissions by exercise. Options loaded from all
            exercises in the course (flattened from modules -> lessons -> exercises).
            Defaults to "All" showing submissions for every exercise.

        - name: Status Filter
          element: select
          options: [All, Draft, Submitted, Approved, Needs Revision]
          description: >
            Filters submissions by SubmissionStatus.

        - name: Submissions Table
          element: table
          description: >
            Data table of submissions. Each row is clickable to navigate
            to the submission review detail view.
          columns:
            - { header: "Student", field: "user.name", sortable: true }
            - { header: "Exercise", field: "exerciseTitle", sortable: true }
            - { header: "Submitted", field: "submittedAt", sortable: true, format: "date" }
            - { header: "Status", field: "status", sortable: true, component: "lib-badge" }
            - { header: "", field: "view", width: "50px", icon: "chevron_right" }
          row_action:
            description: >
              Click row to view submission detail. Opens inline detail
              panel or navigates to dedicated review view.
          status_badges:
            DRAFT:
              variant: neutral
              label: Draft
            SUBMITTED:
              variant: warning
              label: Submitted
            APPROVED:
              variant: success
              label: Approved
            NEEDS_REVISION:
              variant: error
              label: Needs Revision

        - name: Pagination
          description: >
            Client-side pagination. 20 items per page.

      states:
        - name: empty
          description: "No submissions yet."
        - name: loading
          description: Table skeleton with 5 rows
        - name: filtered-empty
          description: "No submissions match your filter criteria."

    - id: mobile-sidebar-drawer
      name: Mobile Sidebar Drawer
      type: inline
      description: >
        On mobile (<768px), sidebar is hidden and becomes a slide-in drawer
        from the left with an explicit white background (--surface-page / #ffffff).
        Contains the same content as the desktop sidebar (course heading +
        nav items + back link). Overlay backdrop behind.
      behavior:
        - Close on backdrop click or X button
        - Toggle via compact hamburger icon button (not full-width bar)

  # ────────────────────────────────────────────────────────────────────
  # CHILD COMPONENTS
  # ────────────────────────────────────────────────────────────────────
  child_components:
    - id: lesson-detail-management
      selector: app-lesson-detail-management
      spec: "./lesson-detail-management.yaml"
      description: >
        Extracted child component for the lesson detail sub-view.
        Renders lesson title, summary preview, and exercises table
        when a lesson is selected in the course material module list.
      usage: >
        Rendered within the course-material-view when materialSubView
        is set to 'lesson-detail'.

    - id: enrollment-management
      selector: app-enrollment-management
      spec: "./enrollment-management.yaml"
      description: >
        Extracted child component for the enrollment management view.
        Displays enrollment table with search, filter, pagination,
        and actions (approve, reject, toggle role, remove).
      usage: >
        Rendered within the main content area when activeView is
        set to 'enrollment'.

  # ────────────────────────────────────────────────────────────────────
  # STATES
  # ────────────────────────────────────────────────────────────────────
  states:
    - name: loading
      description: >
        Sidebar skeleton (course heading + nav items) and content area skeleton.
        Uses lib-skeleton and lib-spinner components.
    - name: loaded
      description: >
        All data displayed. Sidebar shows course identity and nav items (no counts).
        Enrollment nav item shows red badge with pending count when > 0.
        Course Material view is the default active view showing module list.
        Actions are enabled.
    - name: error
      description: >
        Error message with retry button. Shown when initial data fetch
        (course, modules, enrollments) fails.
    lesson_detail:
      - name: lesson-loading
        description: Skeleton placeholder while summary and exercises are being fetched
      - name: lesson-loaded
        description: Summary preview and exercises table displayed
      - name: no-summary
        description: "'No summary yet.' placeholder with Add Summary button"

  # ────────────────────────────────────────────────────────────────────
  # DATA FLOW
  # ────────────────────────────────────────────────────────────────────
  data_flow:
    route_params:
      - name: id
        type: string
        description: Course UUID from parent route "course/:id"
        extraction: "inject(ActivatedRoute).parent?.paramMap or route.paramMap"
    service_calls:
      - service: CourseService
        method: get
        signature: "get(id: string): Observable<CourseResponse>"
        params: id
        description: Fetch course details including createdBy, moduleCount, enrollmentCount
        api_ref: "courses.get — GET /v1/courses/{id}"
        timing: on-init

      - service: ModuleService
        method: listByCourse
        signature: "listByCourse(courseId: string): Observable<ModuleResponse[]>"
        params: id
        description: Fetch all modules for the course, sorted by orderIndex
        api_ref: "modules.list-by-course — GET /v1/courses/{courseId}/modules"
        timing: on-init

      - service: EnrollmentService
        method: listByCourse
        signature: "listByCourse(courseId: string): Observable<EnrollmentResponse[]>"
        params: id
        description: Fetch all enrollments for the course (students + teachers)
        api_ref: "enrollments.list-by-course — GET /v1/courses/{courseId}/enrollments"
        timing: on-init

      - service: LessonService
        method: listByModule
        signature: "listByModule(moduleId: string): Observable<LessonResponse[]>"
        params: moduleId (per module)
        description: >
          Fetch lessons for each module. Called per module for course material
          view module tree. Sorted by orderIndex.
        api_ref: "lessons.list-by-module — GET /v1/modules/{moduleId}/lessons"
        timing: on-init (parallel per module via forkJoin)

      - service: SummaryService
        method: get
        signature: "get(lessonId: string): Observable<SummaryResponse>"
        params: lessonId (selected lesson)
        description: >
          Fetch summary content for the selected lesson in lesson detail sub-view.
          Called when user clicks a lesson in the module tree.
          Returns 404 if no summary exists — handle as no-summary state.
        api_ref: "summaries.get — GET /v1/lessons/{lessonId}/summary"
        timing: on lesson-detail enter

      - service: ExerciseService
        method: listByLesson
        signature: "listByLesson(lessonId: string): Observable<ExerciseResponse[]>"
        params: lessonId (per lesson)
        description: >
          Fetch exercises for the selected lesson. Used in lesson detail
          sub-view to show exercises table. Sorted by orderIndex.
        api_ref: "exercises.list-by-lesson — GET /v1/lessons/{lessonId}/exercises"
        timing: on lesson-detail enter

      - service: SubmissionService
        method: listByExercise
        signature: "listByExercise(exerciseId: string): Observable<SubmissionResponse[]>"
        params: exerciseId (per exercise)
        description: >
          Fetch submissions per exercise. Used in submissions view.
          Called when submissions view becomes active, aggregated across
          all exercises in the course.
        api_ref: "submissions.list-by-exercise — GET /v1/exercises/{exerciseId}/submissions"
        timing: lazy (on submissions view first activation)

    write_operations:
      - service: CourseService
        method: update
        signature: "update(id: string, request: UpdateCourseRequest): Observable<CourseResponse>"
        description: Update course title, description, visibility, settings
        api_ref: "courses.update — PATCH /v1/courses/{id}"
        trigger: Save in edit course form

      - service: CourseService
        method: delete
        signature: "delete(id: string): Observable<void>"
        description: Soft delete the entire course
        api_ref: "courses.delete — DELETE /v1/courses/{id}"
        trigger: Delete course action (from settings)

      - service: ModuleService
        method: create
        signature: "create(courseId: string, request: CreateModuleRequest): Observable<ModuleResponse>"
        description: Create a new module in the course
        api_ref: "modules.create — POST /v1/courses/{courseId}/modules"
        trigger: Submit add module inline form

      - service: ModuleService
        method: update
        signature: "update(moduleId: string, request: UpdateModuleRequest): Observable<ModuleResponse>"
        description: Rename module or update orderIndex
        api_ref: "modules.update — PATCH /v1/modules/{moduleId}"
        trigger: Save in edit module inline form or drag-drop reorder

      - service: ModuleService
        method: delete
        signature: "delete(moduleId: string): Observable<void>"
        description: Delete a module and its contents
        api_ref: "modules.delete — DELETE /v1/modules/{moduleId}"
        trigger: Confirm in delete module dialog

      - service: LessonService
        method: create
        signature: "create(moduleId: string, request: CreateLessonRequest): Observable<LessonResponse>"
        description: Create a new lesson in a module
        api_ref: "lessons.create — POST /v1/modules/{moduleId}/lessons"
        trigger: Submit add lesson inline form

      - service: LessonService
        method: update
        signature: "update(lessonId: string, request: UpdateLessonRequest): Observable<LessonResponse>"
        description: Rename lesson or update orderIndex
        api_ref: "lessons.update — PATCH /v1/lessons/{lessonId}"
        trigger: Save in edit lesson inline form or lesson detail title edit

      - service: LessonService
        method: delete
        signature: "delete(lessonId: string): Observable<void>"
        description: Delete a lesson
        api_ref: "lessons.delete — DELETE /v1/lessons/{lessonId}"
        trigger: Confirm in delete lesson dialog

      - service: ExerciseService
        method: delete
        signature: "delete(exerciseId: string): Observable<void>"
        description: Delete an exercise
        api_ref: "exercises.delete — DELETE /v1/exercises/{exerciseId}"
        trigger: Confirm in delete exercise dialog (lesson detail sub-view)

      - service: EnrollmentService
        method: update
        signature: "update(enrollmentId: string, request: UpdateEnrollmentRequest): Observable<EnrollmentResponse>"
        description: Change enrollment role or status
        api_ref: "enrollments.update — PUT /v1/enrollments/{enrollmentId}"
        trigger: Role change in enrollment view

      - service: EnrollmentService
        method: approve
        signature: "approve(enrollmentId: string): Observable<EnrollmentResponse>"
        description: Approve a pending enrollment request
        api_ref: "enrollments.approve — POST /v1/enrollments/{enrollmentId}/approve"
        trigger: Click Approve button on pending enrollment row

      - service: EnrollmentService
        method: reject
        signature: "reject(enrollmentId: string): Observable<EnrollmentResponse>"
        description: Reject a pending enrollment request
        api_ref: "enrollments.reject — POST /v1/enrollments/{enrollmentId}/reject"
        trigger: Click Reject button on pending enrollment row

      - service: EnrollmentService
        method: delete
        signature: "delete(enrollmentId: string): Observable<void>"
        description: Remove a student enrollment
        api_ref: "enrollments.delete — DELETE /v1/enrollments/{enrollmentId}"
        trigger: Confirm in remove enrollment dialog

