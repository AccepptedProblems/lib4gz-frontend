openspec: "1.0"
kind: Screen
info:
  title: Not Found (404)
  version: "1.0.0"
  description: User-friendly error page for unmatched routes.

screen:
  id: not-found
  name: Not Found
  route: "**"
  route_type: wildcard
  component:
    selector: app-not-found
    file: src/app/components/not-found/not-found.component.ts
    template: src/app/components/not-found/not-found.component.html
    styles: src/app/components/not-found/not-found.component.scss
    standalone: true
  guard: none
  target_users: [all]
  status: scaffold

  purpose: >
    Display a user-friendly error page when users navigate to a
    non-existent route. Provides helpful navigation options to
    get users back on track.

  layout:
    all_viewports:
      description: Centered content with illustration, responsive sizing.
      ascii: |
        +----------------------------------------------------------+
        |  Navbar                                                  |
        +----------------------------------------------------------+
        |                                                          |
        |                                                          |
        |                    [404 Illustration]                    |
        |                                                          |
        |                    Page Not Found                        |
        |                                                          |
        |          The page you're looking for doesn't             |
        |          exist or has been moved.                        |
        |                                                          |
        |                    [Go to Dashboard]                     |
        |                                                          |
        |                    or                                    |
        |                                                          |
        |              [← Go Back]  [Contact Support]              |
        |                                                          |
        +----------------------------------------------------------+

  components:
    - id: illustration
      name: Illustration
      type: inline
      description: 404 themed illustration or graphic
      constraints:
        width: ~300px
        responsive: true
        alt_text: Page not found
      style: Consistent with brand

    - id: heading
      name: Heading
      type: inline
      text: Page Not Found
      typography: text-headline-large
      color: Primary text color

    - id: message
      name: Message
      type: inline
      text: "The page you're looking for doesn't exist or has been moved."
      typography: text-body-large
      color: Secondary text color
      constraints:
        max_width: 400px
        alignment: centered

    - id: primary-action
      name: Primary Action
      type: inline
      label: Go to Dashboard
      variant: primary
      size: md
      action: Navigate to / (authenticated) or /login (unauthenticated)

    - id: secondary-actions
      name: Secondary Actions
      type: inline
      actions:
        - label: "← Go Back"
          action: Browser history back
        - label: Contact Support
          action: External support link (optional)

  states:
    - name: authenticated
      description: >
        Shows navbar with user info.
        Primary action: "Go to Dashboard".
        Shows "Go Back" option.
    - name: unauthenticated
      description: >
        Shows navbar without user info.
        Primary action: "Go to Home" or "Sign In".
        Shows "Go Back" option.

  data_flow:
    api_calls: none
    description: Static page, no data requirements
    conditional_state:
      isAuthenticated: boolean
      previousUrl: "string | null"

  interactions:
    - action: Go to Dashboard
      trigger: Click primary button
      result: Navigate to / (auth) or /login (unauth)
    - action: Go Back
      trigger: Click "Go Back" link
      result: Browser history.back()
    - action: Contact Support
      trigger: Click support link
      result: Open support page/email

  business_logic:
    navigation: |
      goToDashboard(): void {
        if (this.authService.isAuthenticated()) {
          this.router.navigate(['/']);
        } else {
          this.router.navigate(['/login']);
        }
      }

      goBack(): void {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          this.router.navigate(['/']);
        }
      }
    route_matching:
      - This route must be last in the routes array
      - Uses ** wildcard to catch all unmatched routes

  accessibility:
    - Illustration has meaningful alt text
    - Heading uses proper hierarchy (h1)
    - Links and buttons are keyboard accessible
    - Focus visible on interactive elements
    - Screen reader announces page context

  responsive:
    breakpoints:
      - range: "> 768px"
        illustration: Larger size
        secondary_actions: Horizontal layout
      - range: "<= 768px"
        illustration: Smaller size
        secondary_actions: Stacked layout
      - range: "<= 576px"
        layout: Minimal padding, compact layout

  design_system:
    typography:
      - $ref: "../../design-system/typography.yaml#/scale/headline/levels/0"
        usage: "Page Not Found heading (text-headline-large)"
      - $ref: "../../design-system/typography.yaml#/scale/body/levels/0"
        usage: Error message description (text-body-large)
    colors:
      - $ref: "../../design-system/color.yaml#/theme_colors/primary"
        usage: Go to Dashboard primary button
      - $ref: "../../design-system/color.yaml#/theme_colors/neutral"
        usage: Secondary text, Go Back link
    components:
      - $ref: "../../design-system/components.yaml#/button"
        usage: Go to Dashboard (primary, md), Go Back and Contact Support (secondary)
    shared_components:
      - $ref: "../../design-system/shared-components.yaml#/button"
        usage: Primary CTA and secondary action buttons (lib-button)
    tokens:
      - $ref: "../../design-system/tokens.yaml#/spacing"
        usage: Content centering gaps, button margins
    breakpoints:
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/0"
        usage: "576px: Minimal padding, compact layout"
      - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
        usage: "768px: Illustration size, secondary actions layout"

  current_implementation: |
    import { Component } from '@angular/core';

    @Component({
      selector: 'app-not-found',
      imports: [],
      templateUrl: './not-found.component.html',
      styleUrl: './not-found.component.scss'
    })
    export class NotFoundComponent {

    }

  current_template: |
    <p>not-found works!</p>

  acceptance_criteria:
    - Page displays for any unmatched route
    - 404 illustration displays correctly
    - Heading and message are readable
    - Go to Dashboard navigates correctly
    - Go Back uses browser history
    - Unauthenticated users see "Sign In" option
    - Page is accessible via keyboard
    - Layout works on mobile devices
    - Navbar displays appropriate state
