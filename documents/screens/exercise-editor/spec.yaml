  # ────────────────────────────────────────────────────────────────────
  # RELATED SERVICES
  # ────────────────────────────────────────────────────────────────────
  related_services:
    - $ref: "../../network/api-endpoints.yaml#/resources/exercises"
    - $ref: "../../network/api-endpoints.yaml#/resources/questions"

  # ────────────────────────────────────────────────────────────────────
  # CURRENT IMPLEMENTATION
  # ────────────────────────────────────────────────────────────────────
  current_implementation: |
    import {
      Component, inject, signal, computed, OnInit, DestroyRef, HostListener,
    } from '@angular/core';
    import { Router, ActivatedRoute } from '@angular/router';
    import { FormsModule } from '@angular/forms';
    import { takeUntilDestroyed } from '@angular/core/rxjs-interop';
    import { forkJoin, Subject, debounceTime } from 'rxjs';

    import { ExerciseService, QuestionService } from '../../../services';
    import { ToastService } from '../../../shared/components/toast/toast.component';
    import {
      ExerciseResponse, QuestionResponse,
      ExerciseType, QuestionAction
    } from '../../../shared/models';
    import {
      ButtonComponent, DialogComponent,
      SkeletonComponent, TextareaComponent,
    } from '../../../shared/components';

    // ── Local interfaces ──────────────────────────────────────────────

    export interface AnswerOption {
      text: string;
      isCorrect: boolean;
    }

    export interface EditorQuestion {
      id: string | null;
      content: string;
      orderIndex: number;
      meta: Record<string, any>;
      isNew: boolean;
      isEditing: boolean;
    }

    // ── Constants ────────────────────────────────────────────────────

    /** Default answer options for a new MULTIPLE_CHOICE question. */
    const DEFAULT_MC_OPTIONS: AnswerOption[] = [
      { text: '', isCorrect: true },
      { text: '', isCorrect: false },
    ];

    @Component({
      selector: 'app-exercise-editor',
      standalone: true,
      imports: [
        FormsModule,
        ButtonComponent,
        DialogComponent,
        SkeletonComponent,
        TextareaComponent,
      ],
      templateUrl: './exercise-editor.component.html',
      styleUrl: './exercise-editor.component.scss'
    })
    export class ExerciseEditorComponent implements OnInit {
      private readonly router = inject(Router);
      private readonly route = inject(ActivatedRoute);
      private readonly destroyRef = inject(DestroyRef);
      private readonly exerciseService = inject(ExerciseService);
      private readonly questionService = inject(QuestionService);
      private readonly toast = inject(ToastService);

      // ── Route params ────────────────────────────────────────────────
      courseId = signal<string>('');
      exerciseId = signal<string | null>(null);
      lessonId = signal<string | null>(null);
      isEditMode = computed(() => !!this.exerciseId());

      // ── Screen state ────────────────────────────────────────────────
      screenState = signal<'loading' | 'loaded' | 'error'>('loaded');

      // ── Form state ──────────────────────────────────────────────────
      exerciseTitle = signal<string>('');
      exerciseType = signal<ExerciseType>(ExerciseType.TEXT_ANSWER);
      questions = signal<EditorQuestion[]>([]);
      originalQuestions = signal<EditorQuestion[]>([]);
      editingIndex = signal<number | null>(null);

      // ── Default/placeholder answers (exercise-level) ───────────────
      defaultOptions = signal<AnswerOption[]>(
        DEFAULT_MC_OPTIONS.map(o => ({ ...o }))
      );

      // ── Temp question edit state ────────────────────────────────────
      tempContent = signal<string>('');
      tempOptions = signal<AnswerOption[]>([]);

      // ── Save state ──────────────────────────────────────────────────
      isSaving = signal<boolean>(false);

      // ── Validation errors ───────────────────────────────────────────
      titleError = signal<string | null>(null);
      questionsError = signal<string | null>(null);
      questionErrors = signal<Map<number, string>>(new Map());
      questionOptionErrors = signal<Map<number, string>>(new Map());

      // ── Dialogs ─────────────────────────────────────────────────────
      showFastCreate = signal<boolean>(false);
      showUnsavedDialog = signal<boolean>(false);
      showTypeChangeDialog = signal<boolean>(false);
      pendingTypeChange = signal<ExerciseType | null>(null);

      // ── Fast Create ────────────────────────────────────────────────
      fastCreateText = signal<string>('');
      parsedQuestions = signal<string[]>([]);
      private fastCreateInput$ = new Subject<string>();

      // ── Dirty tracking ──────────────────────────────────────────────
      private savedSnapshot = signal<string>('');
      isDirty = computed(() => {
        return this.currentSnapshot() !== this.savedSnapshot();
      });

      private currentSnapshot = computed(() => {
        return JSON.stringify({
          title: this.exerciseTitle(),
          type: this.exerciseType(),
          questions: this.questions().map(q => ({
            id: q.id,
            content: q.content,
            meta: q.meta,
          })),
        });
      });

      // ── Navigation guard ────────────────────────────────────────────
      private pendingNavigation: (() => void) | null = null;

      questionCount = computed(() => this.questions().length);

      // ── Exercise type options ───────────────────────────────────────
      readonly typeOptions = [
        { value: ExerciseType.TEXT_ANSWER, label: 'Text Answer' },
        { value: ExerciseType.MULTIPLE_CHOICE, label: 'Multiple Choice' },
      ];

      ExerciseType = ExerciseType;

      @HostListener('window:beforeunload', ['$event'])
      onBeforeUnload(event: BeforeUnloadEvent): void {
        if (this.isDirty()) {
          event.preventDefault();
        }
      }

      ngOnInit(): void {
        // Extract route params
        this.route.parent?.params
          .pipe(takeUntilDestroyed(this.destroyRef))
          .subscribe(params => {
            this.courseId.set(params['id'] || '');
          });

        this.route.params
          .pipe(takeUntilDestroyed(this.destroyRef))
          .subscribe(params => {
            if (params['exerciseId']) {
              this.exerciseId.set(params['exerciseId']);
            }
          });

        // Get lessonId from router state (passed from lesson management)
        const nav = this.router.getCurrentNavigation();
        const state = nav?.extras.state ?? history.state;
        if (state?.['lessonId']) {
          this.lessonId.set(state['lessonId']);
        }

        // Smart create debounce
        this.fastCreateInput$
          .pipe(debounceTime(200), takeUntilDestroyed(this.destroyRef))
          .subscribe(text => {
            this.parsedQuestions.set(this.parseQuestions(text));
          });

        // Load data if edit mode
        if (this.exerciseId()) {
          this.loadExercise();
        } else {
          this.takeSnapshot();
        }
      }

      // ── Data loading ────────────────────────────────────────────────

      private loadExercise(): void {
        const id = this.exerciseId()!;
        this.screenState.set('loading');

        forkJoin({
          exercise: this.exerciseService.get(id),
          questions: this.questionService.listByExercise(id),
        })
          .pipe(takeUntilDestroyed(this.destroyRef))
          .subscribe({
            next: ({ exercise, questions }) => {
              this.exerciseTitle.set(exercise.title);
              this.exerciseType.set(exercise.type);
              this.lessonId.set(exercise.lessonId);
              const mapped = questions
                .sort((a, b) => a.orderIndex - b.orderIndex)
                .map((q, i) => this.mapQuestionResponse(q, i));
              this.questions.set(mapped);
              this.originalQuestions.set(mapped.map(q => ({ ...q })));
              this.screenState.set('loaded');
              this.takeSnapshot();
            },
            error: () => {
              this.screenState.set('error');
              this.toast.error('Failed to load exercise');
            },
          });
      }

      private mapQuestionResponse(q: QuestionResponse, index: number): EditorQuestion {
        return {
          id: q.id,
          content: q.content,
          orderIndex: index,
          meta: q.meta ?? {},
          isNew: false,
          isEditing: false,
        };
      }

      private takeSnapshot(): void {
        this.savedSnapshot.set(this.currentSnapshot());
      }

      // ── Helpers ─────────────────────────────────────────────────────

      /** Build initial meta for a question based on the current exercise type. */
      private buildDefaultMeta(): Record<string, any> {
        return this.exerciseType() === ExerciseType.MULTIPLE_CHOICE
          ? { options: this.defaultOptions().map(o => ({ ...o })) }
          : {};
      }

      /** Remove an error entry from a Map<number, string> signal by key. */
      private clearMapEntry(
        mapSignal: typeof this.questionErrors,
        key: number,
      ): void {
        mapSignal.update(m => { const n = new Map(m); n.delete(key); return n; });
      }

      onTitleInput(value: string): void {
        this.exerciseTitle.set(value);
        if (value.trim()) {
          this.titleError.set(null);
        }
      }

      getOptions(q: EditorQuestion): AnswerOption[] {
        return q.meta?.['options'] || [];
      }

      // ── Exercise type change ────────────────────────────────────────

      onTypeChange(newType: ExerciseType): void {
        const currentType = this.exerciseType();
        if (newType === currentType) return;

        // If switching away from MC and there are questions with options, confirm
        const hasOptions = this.questions().some(
          q => q.meta?.['options']?.length > 0
        );

        if (currentType === ExerciseType.MULTIPLE_CHOICE && hasOptions) {
          this.pendingTypeChange.set(newType);
          this.showTypeChangeDialog.set(true);
        } else {
          this.applyTypeChange(newType);
        }
      }

      confirmTypeChange(): void {
        const newType = this.pendingTypeChange();
        if (newType) {
          this.applyTypeChange(newType);
        }
        this.showTypeChangeDialog.set(false);
        this.pendingTypeChange.set(null);
      }

      cancelTypeChange(): void {
        this.showTypeChangeDialog.set(false);
        this.pendingTypeChange.set(null);
      }

      private applyTypeChange(newType: ExerciseType): void {
        this.exerciseType.set(newType);
        // Clear answer options from all questions
        if (newType === ExerciseType.TEXT_ANSWER) {
          this.questions.update(qs =>
            qs.map(q => ({ ...q, meta: {} }))
          );
        } else if (newType === ExerciseType.MULTIPLE_CHOICE) {
          this.questions.update(qs =>
            qs.map(q => ({
              ...q,
              meta: { options: DEFAULT_MC_OPTIONS.map(o => ({ ...o })) },
            }))
          );
        }
        // If currently editing, update temp options
        if (this.editingIndex() !== null) {
          const idx = this.editingIndex()!;
          const q = this.questions()[idx];
          this.tempOptions.set(q.meta?.['options'] ? [...q.meta['options']] : []);
        }
      }

      // ── Question CRUD ───────────────────────────────────────────────

      addQuestion(): void {
        this.saveOrDiscardCurrentEdit();

        const newQ: EditorQuestion = {
          id: null,
          content: '',
          orderIndex: this.questions().length,
          meta: this.buildDefaultMeta(),
          isNew: true,
          isEditing: true,
        };

        this.questions.update(qs => [...qs, newQ]);
        const idx = this.questions().length - 1;
        this.editingIndex.set(idx);
        this.tempContent.set('');
        this.tempOptions.set(
          newQ.meta?.['options'] ? newQ.meta['options'].map((o: AnswerOption) => ({ ...o })) : []
        );
      }

      editQuestion(index: number): void {
        if (this.editingIndex() === index) return;
        this.saveOrDiscardCurrentEdit();

        const q = this.questions()[index];
        this.editingIndex.set(index);
        this.tempContent.set(q.content);
        this.tempOptions.set(
          q.meta?.['options'] ? q.meta['options'].map((o: AnswerOption) => ({ ...o })) : []
        );
        this.questions.update(qs =>
          qs.map((item, i) => ({ ...item, isEditing: i === index }))
        );
      }

      saveQuestion(): void {
        const idx = this.editingIndex();
        if (idx === null) return;

        // Validate
        const content = this.tempContent().trim();
        if (!content) {
          this.questionErrors.update(m => {
            const next = new Map(m);
            next.set(idx, 'Question text is required');
            return next;
          });
          return;
        }

        if (this.exerciseType() === ExerciseType.MULTIPLE_CHOICE) {
          const options = this.tempOptions();
          const filledOptions = options.filter(o => o.text.trim());
          if (filledOptions.length < 2) {
            this.questionOptionErrors.update(m => {
              const next = new Map(m);
              next.set(idx, 'At least 2 answer options are required');
              return next;
            });
            return;
          }
          const emptyOption = options.find(o => !o.text.trim());
          if (emptyOption) {
            this.questionOptionErrors.update(m => {
              const next = new Map(m);
              next.set(idx, 'All answer options must have text');
              return next;
            });
            return;
          }
          const hasCorrect = options.some(o => o.isCorrect);
          if (!hasCorrect) {
            this.questionOptionErrors.update(m => {
              const next = new Map(m);
              next.set(idx, 'Select a correct answer');
              return next;
            });
            return;
          }
        }

        // Clear errors
        this.clearMapEntry(this.questionErrors, idx);
        this.clearMapEntry(this.questionOptionErrors, idx);

        // Apply changes
        this.questions.update(qs =>
          qs.map((q, i) => {
            if (i !== idx) return q;
            return {
              ...q,
              content,
              meta: this.exerciseType() === ExerciseType.MULTIPLE_CHOICE
                ? { options: this.tempOptions().map(o => ({ ...o })) }
                : {},
              isEditing: false,
              isNew: false,
            };
          })
        );
        this.editingIndex.set(null);
      }

      cancelQuestionEdit(): void {
        const idx = this.editingIndex();
        if (idx === null) return;

        const q = this.questions()[idx];

        // If new and no saved content, remove entirely
        if (q.isNew && !q.content) {
          this.questions.update(qs => qs.filter((_, i) => i !== idx));
        } else {
          this.questions.update(qs =>
            qs.map((item, i) => (i === idx ? { ...item, isEditing: false } : item))
          );
        }

        this.editingIndex.set(null);
        this.clearMapEntry(this.questionErrors, idx);
        this.clearMapEntry(this.questionOptionErrors, idx);
      }

      deleteQuestion(index: number): void {
        if (this.editingIndex() === index) {
          this.editingIndex.set(null);
        } else if (this.editingIndex() !== null && this.editingIndex()! > index) {
          this.editingIndex.update(i => i !== null ? i - 1 : null);
        }

        this.questions.update(qs =>
          qs.filter((_, i) => i !== index).map((q, i) => ({ ...q, orderIndex: i }))
        );
      }

      private saveOrDiscardCurrentEdit(): void {
        const idx = this.editingIndex();
        if (idx === null) return;

        const q = this.questions()[idx];
        const content = this.tempContent().trim();

        if (content) {
          // Auto-save if there's content
          this.questions.update(qs =>
            qs.map((item, i) => {
              if (i !== idx) return item;
              return {
                ...item,
                content,
                meta: this.exerciseType() === ExerciseType.MULTIPLE_CHOICE
                  ? { options: this.tempOptions().map(o => ({ ...o })) }
                  : {},
                isEditing: false,
                isNew: false,
              };
            })
          );
        } else if (q.isNew) {
          // Remove empty new question
          this.questions.update(qs => qs.filter((_, i) => i !== idx));
        } else {
          // Revert to previous state
          this.questions.update(qs =>
            qs.map((item, i) => (i === idx ? { ...item, isEditing: false } : item))
          );
        }

        this.editingIndex.set(null);
      }

      // ── Answer option editing ───────────────────────────────────────

      updateOptionText(optionIndex: number, text: string): void {
        this.tempOptions.update(opts =>
          opts.map((o, i) => (i === optionIndex ? { ...o, text } : o))
        );
      }

      setCorrectOption(optionIndex: number): void {
        this.tempOptions.update(opts =>
          opts.map((o, i) => ({ ...o, isCorrect: i === optionIndex }))
        );
      }

      addOption(): void {
        if (this.tempOptions().length >= 6) return;
        this.tempOptions.update(opts => [...opts, { text: '', isCorrect: false }]);
      }

      removeOption(optionIndex: number): void {
        if (this.tempOptions().length <= 2) return;
        const wasCorrect = this.tempOptions()[optionIndex].isCorrect;
        this.tempOptions.update(opts => opts.filter((_, i) => i !== optionIndex));
        // If removed option was correct, mark the first one as correct
        if (wasCorrect) {
          this.tempOptions.update(opts =>
            opts.map((o, i) => ({ ...o, isCorrect: i === 0 }))
          );
        }
      }

      // ── Default answer options (exercise-level placeholders) ────────

      updateDefaultOptionText(optionIndex: number, text: string): void {
        this.defaultOptions.update(opts =>
          opts.map((o, i) => (i === optionIndex ? { ...o, text } : o))
        );
      }

      setDefaultCorrectOption(optionIndex: number): void {
        this.defaultOptions.update(opts =>
          opts.map((o, i) => ({ ...o, isCorrect: i === optionIndex }))
        );
      }

      addDefaultOption(): void {
        if (this.defaultOptions().length >= 6) return;
        this.defaultOptions.update(opts => [...opts, { text: '', isCorrect: false }]);
      }

      removeDefaultOption(optionIndex: number): void {
        if (this.defaultOptions().length <= 2) return;
        const wasCorrect = this.defaultOptions()[optionIndex].isCorrect;
        this.defaultOptions.update(opts => opts.filter((_, i) => i !== optionIndex));
        if (wasCorrect) {
          this.defaultOptions.update(opts =>
            opts.map((o, i) => ({ ...o, isCorrect: i === 0 }))
          );
        }
      }

      // ── Fast Create ────────────────────────────────────────────────

      openFastCreate(): void {
        this.fastCreateText.set('');
        this.parsedQuestions.set([]);
        this.showFastCreate.set(true);
      }

      onFastCreateInput(text: string): void {
        this.fastCreateText.set(text);
        this.fastCreateInput$.next(text);
      }

      confirmFastCreate(): void {
        const parsed = this.parsedQuestions();
        if (parsed.length === 0) return;

        this.saveOrDiscardCurrentEdit();

        const startIndex = this.questions().length;
        const newQuestions: EditorQuestion[] = parsed.map((text, i) => ({
          id: null,
          content: text,
          orderIndex: startIndex + i,
          meta: this.buildDefaultMeta(),
          isNew: true,
          isEditing: false,
        }));

        this.questions.update(qs => [...qs, ...newQuestions]);
        this.showFastCreate.set(false);
      }

      cancelFastCreate(): void {
        this.showFastCreate.set(false);
      }

      private parseQuestions(text: string): string[] {
        if (!text.trim()) return [];

        const lines = text.split('\n');
        const result: string[] = [];
        const numberedRegex = /^\s*(\d+)\s*[.)]\s*/;
        let current: string[] = [];

        for (const line of lines) {
          const match = numberedRegex.exec(line);
          if (match) {
            // Flush previous question
            const prev = current.join('\n').trim();
            if (prev) result.push(prev);
            // Start new question with the remainder after the number prefix
            current = [line.slice(match[0].length)];
          } else {
            // Continuation line — append to current question
            current.push(line);
          }
        }

        // Flush last question
        const last = current.join('\n').trim();
        if (last) result.push(last);

        return result;
      }

      // ── Validation ──────────────────────────────────────────────────

      private validate(): boolean {
        let valid = true;

        // Title
        if (!this.exerciseTitle().trim()) {
          this.titleError.set('Title is required');
          valid = false;
        } else {
          this.titleError.set(null);
        }

        // At least 1 question
        if (this.questions().length === 0) {
          this.questionsError.set('At least one question is required');
          valid = false;
        } else {
          this.questionsError.set(null);
        }

        // Each question
        const qErrors = new Map<number, string>();
        const qOptErrors = new Map<number, string>();

        this.questions().forEach((q, i) => {
          if (!q.content.trim()) {
            qErrors.set(i, `Question ${i + 1}: text is required`);
            valid = false;
          }
          if (this.exerciseType() === ExerciseType.MULTIPLE_CHOICE) {
            const options: AnswerOption[] = q.meta?.['options'] || [];
            if (options.length < 2) {
              qOptErrors.set(i, `Question ${i + 1}: at least 2 answer options required`);
              valid = false;
            } else {
              const emptyOpt = options.find(o => !o.text.trim());
              if (emptyOpt) {
                qOptErrors.set(i, `Question ${i + 1}: all answer options must have text`);
                valid = false;
              }
              if (!options.some(o => o.isCorrect)) {
                qOptErrors.set(i, `Question ${i + 1}: select a correct answer`);
                valid = false;
              }
            }
          }
        });

        this.questionErrors.set(qErrors);
        this.questionOptionErrors.set(qOptErrors);

        return valid;
      }

      // ── Save ────────────────────────────────────────────────────────

      saveExercise(): void {
        // First close any open editing
        this.saveOrDiscardCurrentEdit();

        if (!this.validate()) return;

        this.isSaving.set(true);
        const title = this.exerciseTitle().trim();
        const type = this.exerciseType();

        if (this.isEditMode()) {
          this.saveEdit(title, type);
        } else {
          this.saveCreate(title, type);
        }
      }

      private saveCreate(title: string, type: ExerciseType): void {
        const lid = this.lessonId();
        if (!lid) {
          this.toast.error('Lesson context is missing. Please go back and try again.');
          this.isSaving.set(false);
          return;
        }

        const questions = this.questions().map((q, i) => ({
          content: q.content,
          orderIndex: i,
          meta: q.meta,
        }));

        this.exerciseService.create(lid, { title, type, questions })
          .pipe(takeUntilDestroyed(this.destroyRef))
          .subscribe({
            next: () => this.onSaveSuccess(),
            error: () => this.onSaveError(),
          });
      }

      private saveEdit(title: string, type: ExerciseType): void {
        const eid = this.exerciseId()!;

        this.exerciseService.update(eid, { title, type })
          .pipe(takeUntilDestroyed(this.destroyRef))
          .subscribe({
            next: () => {
              const updateItems = this.buildUpdateItems();
              if (updateItems.length === 0) {
                this.onSaveSuccess();
                return;
              }

              this.questionService.batchUpdate(eid, { questions: updateItems })
                .pipe(takeUntilDestroyed(this.destroyRef))
                .subscribe({
                  next: () => this.onSaveSuccess(),
                  error: () => this.onSaveError(),
                });
            },
            error: () => this.onSaveError(),
          });
      }

      private buildUpdateItems(): any[] {
        const items: any[] = [];
        const current = this.questions();
        const originals = this.originalQuestions();

        // Build lookup of original questions by id
        const originalMap = new Map<string, EditorQuestion>();
        for (const oq of originals) {
          if (oq.id) originalMap.set(oq.id, oq);
        }

        // Collect ids still present in the editor
        const currentIds = new Set<string>();
        for (const q of current) {
          if (q.id) currentIds.add(q.id);
        }

        // Deleted questions: in original but not in current → DELETE
        for (const oq of originals) {
          if (oq.id && !currentIds.has(oq.id)) {
            items.push({
              action: QuestionAction.DELETE,
              questionId: oq.id,
            });
          }
        }

        // New and updated questions
        current.forEach((q, i) => {
          if (!q.id) {
            // New question → CREATE
            items.push({
              action: QuestionAction.CREATE,
              content: q.content,
              orderIndex: i,
              meta: q.meta,
            });
          } else {
            // Existing → UPDATE only if changed
            const orig = originalMap.get(q.id);
            if (orig &&
                orig.content === q.content &&
                orig.orderIndex === i &&
                JSON.stringify(orig.meta) === JSON.stringify(q.meta)) {
              return; // skip unchanged
            }
            items.push({
              action: QuestionAction.UPDATE,
              questionId: q.id,
              content: q.content,
              orderIndex: i,
              meta: q.meta,
            });
          }
        });

        return items;
      }

      private onSaveSuccess(): void {
        this.isSaving.set(false);
        this.takeSnapshot(); // Clear dirty state before navigation
        this.toast.success(this.isEditMode() ? 'Exercise updated successfully' : 'Exercise created successfully');
        this.router.navigate(['/course', this.courseId(), 'manage'], {
          state: { lessonId: this.lessonId() },
        });
      }

      private onSaveError(): void {
        this.isSaving.set(false);
        this.toast.error('Failed to save exercise. Please try again.');
      }

      // ── Navigation ──────────────────────────────────────────────────

      goBack(): void {
        const nav = () => {
          this.router.navigate(['/course', this.courseId(), 'manage'], {
            state: { lessonId: this.lessonId() },
          });
        };
        if (this.isDirty()) {
          this.pendingNavigation = nav;
          this.showUnsavedDialog.set(true);
        } else {
          nav();
        }
      }

      cancelExercise(): void {
        this.goBack();
      }

      confirmLeave(): void {
        this.showUnsavedDialog.set(false);
        this.takeSnapshot(); // Clear dirty before navigation
        if (this.pendingNavigation) {
          this.pendingNavigation();
          this.pendingNavigation = null;
        }
      }

      stayOnPage(): void {
        this.showUnsavedDialog.set(false);
        this.pendingNavigation = null;
      }
    }

  current_template: |
    <!-- Loading state (edit mode) -->
    @if (screenState() === 'loading') {
      <div class="editor-page">
        <div class="editor-container">
          <div class="page-header">
            <lib-skeleton variant="rect" width="32px" height="32px" />
            <lib-skeleton variant="text" width="160px" height="28px" />
          </div>
          <div class="form-section">
            <lib-skeleton variant="rect" width="100%" height="56px" />
            <lib-skeleton variant="rect" width="100%" height="56px" />
          </div>
          <div class="questions-section">
            <lib-skeleton variant="text" width="140px" height="24px" />
            <lib-skeleton variant="rect" width="100%" height="80px" />
            <lib-skeleton variant="rect" width="100%" height="80px" />
            <lib-skeleton variant="rect" width="100%" height="80px" />
          </div>
        </div>
      </div>
    }

    <!-- Error state -->
    @if (screenState() === 'error') {
      <div class="editor-page">
        <div class="editor-container">
          <div class="error-state">
            <span class="material-icons error-state__icon">error_outline</span>
            <p class="text-body-medium">Failed to load exercise. Please try again.</p>
            <lib-button variant="secondary" (buttonClick)="goBack()">
              Go Back
            </lib-button>
          </div>
        </div>
      </div>
    }

    <!-- Loaded state -->
    @if (screenState() === 'loaded') {
      <div class="editor-page">
        <div class="editor-container">

          <!-- Page header with Cancel/Save -->
          <div class="page-header">
            <h1 class="text-title-large editor-title">
              {{ isEditMode() ? 'Edit Exercise' : 'Create Exercise' }}
            </h1>
            <div class="header-actions">
              <lib-button variant="secondary" (buttonClick)="cancelExercise()" [disabled]="isSaving()">
                Cancel
              </lib-button>
              <lib-button
                variant="primary"
                [isLoading]="isSaving()"
                (buttonClick)="saveExercise()"
              >
                Save Exercise
              </lib-button>
            </div>
          </div>

          <!-- Exercise metadata form -->
          <div class="form-section">
            <div class="form-field">
              <lib-textarea
                label="Exercise Title"
                placeholder="Enter the main question or title for this exercise"
                [minRows]="1"
                [value]="exerciseTitle()"
                (valueChange)="onTitleInput($event)"
                [disabled]="isSaving()"
                [required]="true"
                [error]="titleError()"
              />
            </div>

            <div class="form-field">
              <label class="form-field-label text-label-large" for="exercise-type">
                Exercise Type <span class="required">*</span>
              </label>
              <div class="select-box-container select-box-container--compact">
                <select
                  id="exercise-type"
                  class="select-box small-input"
                  [value]="exerciseType()"
                  (change)="onTypeChange($any($event.target).value)"
                  [disabled]="isSaving()"
                >
                  @for (opt of typeOptions; track opt.value) {
                    <option [value]="opt.value">{{ opt.label }}</option>
                  }
                </select>
                <span class="material-symbols-outlined select-box-icon">keyboard_arrow_down</span>
              </div>
            </div>

            <!-- Default answers (placeholder) for MULTIPLE_CHOICE -->
            @if (exerciseType() === ExerciseType.MULTIPLE_CHOICE) {
              <div class="default-answers-section">
                <label class="form-field-label text-label-large">Default Answers <span class="default-answers-hint text-body-small">(new questions will use these)</span></label>
                <div class="answers-list">
                  @for (opt of defaultOptions(); track $index; let oi = $index) {
                    <div class="answer-row">
                      <input
                        type="radio"
                        name="default-correct"
                        [checked]="opt.isCorrect"
                        (change)="setDefaultCorrectOption(oi)"
                        class="answer-radio"
                        [attr.aria-label]="'Mark default answer ' + (oi + 1) + ' as correct'"
                      />
                      <input
                        type="text"
                        class="small-input answer-input"
                        placeholder="Answer option"
                        [value]="opt.text"
                        (input)="updateDefaultOptionText(oi, $any($event.target).value)"
                        [disabled]="isSaving()"
                      />
                      @if (defaultOptions().length > 2) {
                        <button
                          class="icon-btn icon-btn--delete icon-btn--small"
                          (click)="removeDefaultOption(oi)"
                          [attr.aria-label]="'Remove default answer option ' + (oi + 1)"
                        >
                          <span class="material-icons">close</span>
                        </button>
                      }
                    </div>
                  }
                </div>
                @if (defaultOptions().length < 6) {
                  <button class="add-answer-btn text-body-medium" (click)="addDefaultOption()">
                    <span class="material-icons">add</span>
                    Add Answer
                  </button>
                }
              </div>
            }
          </div>

          <!-- Questions section -->
          <div class="questions-section">
            <h2 class="text-title-medium section-title">
              Questions{{ questionCount() > 0 ? ' (' + questionCount() + ')' : '' }}
            </h2>

            @if (questionsError()) {
              <p class="form-field-error" role="alert">{{ questionsError() }}</p>
            }

            <!-- Question list -->
            <div class="question-list">
              @for (q of questions(); track $index; let i = $index) {
                <!-- View mode -->
                @if (!q.isEditing) {
                  <div class="question-card question-card--view" [class.has-error]="questionErrors().has(i) || questionOptionErrors().has(i)">
                    <div class="question-card__header">
                      <div class="question-card__info">
                        <span class="question-number text-label-large">{{ i + 1 }}.</span>
                        <p class="question-text text-body-medium">{{ q.content || '(No content)' }}</p>
                      </div>
                      <div class="question-card__actions">
                        <button
                          class="icon-btn"
                          (click)="editQuestion(i)"
                          [attr.aria-label]="'Edit question ' + (i + 1)"
                          [disabled]="isSaving()"
                        >
                          <span class="material-icons">edit</span>
                        </button>
                        <button
                          class="icon-btn icon-btn--delete"
                          (click)="deleteQuestion(i)"
                          [attr.aria-label]="'Delete question ' + (i + 1)"
                          [disabled]="isSaving()"
                        >
                          <span class="material-icons">close</span>
                        </button>
                      </div>
                    </div>

                    <!-- Answer preview (MC) -->
                    @if (exerciseType() === ExerciseType.MULTIPLE_CHOICE) {
                      <div class="answer-preview">
                        @for (opt of getOptions(q); track $index) {
                          <span class="answer-chip" [class.correct]="opt.isCorrect">
                            {{ opt.isCorrect ? '●' : '○' }} {{ opt.text || '(empty)' }}
                          </span>
                        }
                      </div>
                    }

                    <!-- Text answer label -->
                    @if (exerciseType() === ExerciseType.TEXT_ANSWER) {
                      <p class="text-answer-label text-body-small">(Text answer)</p>
                    }

                    <!-- Validation errors for this question -->
                    @if (questionErrors().has(i)) {
                      <p class="form-field-error" role="alert">{{ questionErrors().get(i) }}</p>
                    }
                    @if (questionOptionErrors().has(i)) {
                      <p class="form-field-error" role="alert">{{ questionOptionErrors().get(i) }}</p>
                    }
                  </div>
                }

                <!-- Edit mode -->
                @if (q.isEditing) {
                  <div class="question-card question-card--edit">
                    <h3 class="text-label-large edit-card-title">Question {{ i + 1 }}</h3>

                    <div class="form-field">
                      <lib-textarea
                        label="Question Text"
                        placeholder="Enter the question"
                        [minRows]="1"
                        [value]="tempContent()"
                        (valueChange)="tempContent.set($event)"
                        [disabled]="isSaving()"
                        [required]="true"
                        [error]="questionErrors().has(i) ? questionErrors().get(i)! : null"
                      />
                    </div>

                    <!-- Answer options (MC only) -->
                    @if (exerciseType() === ExerciseType.MULTIPLE_CHOICE) {
                      <div class="answers-section">
                        <label class="form-field-label">Answers</label>
                        <div class="answers-list">
                          @for (opt of tempOptions(); track $index; let oi = $index) {
                            <div class="answer-row">
                              <input
                                type="radio"
                                [name]="'correct-' + i"
                                [checked]="opt.isCorrect"
                                (change)="setCorrectOption(oi)"
                                class="answer-radio"
                                [attr.aria-label]="'Mark answer ' + (oi + 1) + ' as correct'"
                              />
                              <input
                                type="text"
                                class="small-input answer-input"
                                placeholder="Answer option"
                                [value]="opt.text"
                                (input)="updateOptionText(oi, $any($event.target).value)"
                                [disabled]="isSaving()"
                              />
                              @if (tempOptions().length > 2) {
                                <button
                                  class="icon-btn icon-btn--delete icon-btn--small"
                                  (click)="removeOption(oi)"
                                  [attr.aria-label]="'Remove answer option ' + (oi + 1)"
                                >
                                  <span class="material-icons">close</span>
                                </button>
                              }
                            </div>
                          }
                        </div>

                        @if (tempOptions().length < 6) {
                          <button class="add-answer-btn text-body-medium" (click)="addOption()">
                            <span class="material-icons">add</span>
                            Add Answer
                          </button>
                        }

                        @if (questionOptionErrors().has(i)) {
                          <p class="form-field-error" role="alert">{{ questionOptionErrors().get(i) }}</p>
                        }
                      </div>
                    }

                    <!-- Text answer hint -->
                    @if (exerciseType() === ExerciseType.TEXT_ANSWER) {
                      <p class="text-answer-hint text-body-small">
                        Students will type their answer as free text.
                      </p>
                    }

                    <!-- Card actions -->
                    <div class="question-card__footer">
                      <lib-button variant="secondary" size="sm" (buttonClick)="cancelQuestionEdit()">
                        Cancel
                      </lib-button>
                      <lib-button variant="primary" size="sm" (buttonClick)="saveQuestion()">
                        Save Question
                      </lib-button>
                    </div>
                  </div>
                }
              }
            </div>

            <!-- Question action buttons -->
            <div class="question-actions">
              <lib-button variant="secondary" (buttonClick)="addQuestion()" [disabled]="isSaving()">
                <span class="material-icons btn-icon">add</span>
                Add Question
              </lib-button>
              <lib-button variant="primary" (buttonClick)="openFastCreate()" [disabled]="isSaving()">
                <span class="btn-icon">⚡</span>
                Fast Create
              </lib-button>
            </div>
          </div>

        </div>
      </div>
    }

    <!-- Fast Create Dialog -->
    <lib-dialog
      [open]="showFastCreate()"
      title="⚡ Fast Create"
      [confirmLabel]="'Add ' + parsedQuestions().length + ' Questions'"
      cancelLabel="Cancel"
      width="600px"
      (confirm)="confirmFastCreate()"
      (cancel)="cancelFastCreate()"
    >
      <div class="fast-create-content">
        <lib-textarea
          label="Paste your numbered question list below"
          [placeholder]="'1. First question\n2. Second question\n3. Third question'"
          [minRows]="8"
          [value]="fastCreateText()"
          (valueChange)="onFastCreateInput($event)"
        />
      </div>
    </lib-dialog>

    <!-- Unsaved Changes Dialog -->
    <lib-dialog
      [open]="showUnsavedDialog()"
      title="Unsaved Changes"
      icon="warning"
      iconClass="warning-icon"
      confirmLabel="Leave"
      cancelLabel="Stay"
      confirmVariant="destructive"
      (confirm)="confirmLeave()"
      (cancel)="stayOnPage()"
    >
      You have unsaved changes. Are you sure you want to leave? Your changes will be lost.
    </lib-dialog>

    <!-- Type Change Confirmation Dialog -->
    <lib-dialog
      [open]="showTypeChangeDialog()"
      title="Change Exercise Type"
      icon="warning"
      iconClass="warning-icon"
      confirmLabel="Continue"
      cancelLabel="Cancel"
      confirmVariant="primary"
      (confirm)="confirmTypeChange()"
      (cancel)="cancelTypeChange()"
    >
      Changing the type will reset answer options for all existing questions. Continue?
    </lib-dialog>

  current_styles: |
    // ── Layout ──────────────────────────────────────────────────────
    .editor-page {
      min-height: 100vh;
      padding: var(--spacing-xl) var(--spacing-md);
    }

    .editor-container { max-width: 800px; margin: 0 auto; }

    // ── Page header ─────────────────────────────────────────────────
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
    }

    .editor-title { margin: 0; color: var(--text-primary-color); }

    .header-actions {
      display: flex;
      gap: var(--spacing-sm);
      flex-shrink: 0;
    }

    // ── Form section ────────────────────────────────────────────────
    .form-section {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    // ── Questions section ───────────────────────────────────────────
    .section-title { margin: 0 0 var(--spacing-md); color: var(--text-primary-color); }
    .question-list { margin-bottom: var(--spacing-md); }

    // ── Question card ───────────────────────────────────────────────
    .question-card {
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      transition: border-color 200ms ease;
    }

    .question-card--view {
      background: white;
      border: 1px solid var(--neutral-color-3, #e0e0e0);
      &:hover { border-color: var(--neutral-color-5, #9e9e9e); }
      &.has-error { border-color: var(--error-color); }
    }

    .question-card--edit {
      background: var(--primary-color-50);
      border: 2px solid var(--primary-color-200);
      padding: var(--spacing-lg);
    }

    .question-card__header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--spacing-sm);
    }

    .question-card__info {
      display: flex;
      align-items: baseline;
      gap: var(--spacing-sm);
      flex: 1;
      min-width: 0;
    }

    .question-number { color: var(--text-secondary-color); flex-shrink: 0; min-width: 24px; }

    .question-text {
      margin: 0;
      color: var(--text-primary-color);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .question-card__actions { display: flex; gap: var(--spacing-xs); flex-shrink: 0; }

    // ── Icon buttons ────────────────────────────────────────────────
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm, 4px);
      cursor: pointer;
      color: var(--text-secondary-color);
      transition: all 200ms ease;
      .material-icons { font-size: 18px; }
      &:hover { background: var(--primary-color-50); color: var(--primary-color-600); }
      &:disabled { opacity: 0.4; cursor: not-allowed; &:hover { background: transparent; color: var(--text-secondary-color); } }
    }

    .icon-btn--delete:hover { background: var(--error-color-0, #ffebee); color: var(--error-color); }
    .icon-btn--small { width: 28px; height: 28px; .material-icons { font-size: 16px; } }

    // ── Answer preview (view) ───────────────────────────────────────
    .answer-preview {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-xs);
      margin-top: var(--spacing-sm);
      padding-left: 32px;
    }

    .answer-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-sm, 4px);
      font-size: 13px;
      color: var(--text-secondary-color);
      &.correct { color: var(--primary-color-600); background: var(--primary-color-50); }
    }

    .text-answer-label {
      margin: var(--spacing-xs) 0 0;
      padding-left: 32px;
      color: var(--neutral-color-5);
      font-style: italic;
    }

    // ── Edit card ───────────────────────────────────────────────────
    .edit-card-title { margin: 0 0 var(--spacing-md); color: var(--text-primary-color); }

    // ── Answers (edit) ──────────────────────────────────────────────
    .answers-section { margin-top: var(--spacing-md); }
    .answers-list { display: flex; flex-direction: column; gap: var(--spacing-sm); margin-top: var(--spacing-xs); }
    .answer-row { display: flex; align-items: center; gap: var(--spacing-sm); }

    .answer-radio { flex-shrink: 0; width: 18px; height: 18px; accent-color: var(--primary-color-600); cursor: pointer; }

    // flex override only — .small-input provides border/height/padding
    .answer-input { flex: 1; }

    .add-answer-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: var(--spacing-sm);
      padding: 4px 8px;
      border: none;
      background: transparent;
      color: var(--primary-color-600);
      cursor: pointer;
      border-radius: var(--radius-sm, 4px);
      // font-family: inherit is set globally in _typography.scss
      .material-icons { font-size: 18px; }
      &:hover { background: var(--primary-color-50); }
    }

    .text-answer-hint { margin: var(--spacing-md) 0 0; color: var(--neutral-color-5); font-style: italic; }

    .question-card__footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-lg);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--primary-color-100);
    }

    // ── Compact select ──────────────────────────────────────────────
    .select-box-container--compact { max-width: 280px; }

    // ── Default answers (exercise-level placeholders) ───────────────
    .default-answers-section { margin-top: var(--spacing-xs); }
    .default-answers-hint { color: var(--text-secondary-color); font-weight: normal; }

    // ── Action buttons ──────────────────────────────────────────────
    .question-actions { display: flex; gap: var(--spacing-sm); justify-content: space-between; }
    .btn-icon { margin-right: 4px; font-size: 18px; vertical-align: middle; }

    // ── Error state ─────────────────────────────────────────────────
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-xl) 0;
      text-align: center;
    }

    .error-state__icon { font-size: 48px; color: var(--neutral-color-5); }

    // ── Fast Create ────────────────────────────────────────────────
    .fast-create-content { display: flex; flex-direction: column; gap: var(--spacing-md); }

    :host ::ng-deep .warning-icon { color: var(--warning-color, #f59e0b); }

    // ── Responsive ──────────────────────────────────────────────────
    @media (max-width: 767px) {
      .editor-page { padding: var(--spacing-md); }
      .page-header { flex-direction: column; align-items: flex-start; }
      .header-actions { width: 100%; justify-content: flex-end; }
      .question-card--edit { padding: var(--spacing-md); }
      .answer-preview { flex-direction: column; padding-left: var(--spacing-lg); }
      .question-actions { flex-direction: column; lib-button { width: 100%; } }
      .select-box-container--compact { max-width: 100%; }
    }
  # ────────────────────────────────────────────────────────────────────
  # ACCEPTANCE CRITERIA
  # ────────────────────────────────────────────────────────────────────
  acceptance_criteria:
    # Layout & navigation
    - Navigation bar is hidden while creating or editing exercises
    - No back icon button — Cancel button handles navigation
    - Cancel and Save Exercise buttons are in the page header (not footer)
    - Cancel and Save buttons use md size for prominent visibility

    # Exercise form
    - Create mode shows empty form with TEXT_ANSWER as default type
    - Edit mode loads existing exercise title, type, and questions
    - Exercise Title field appears FIRST (before exercise type)
    - Title field uses lib-textarea with auto-expanding height based on content
    - Title field is required with inline validation error
    - Exercise Type selector appears SECOND with compact/small styling
    - Type selector shows only Multiple Choice and Text Answer options
    - Changing type with existing MC questions shows confirmation dialog

    # Default answers (placeholder)
    - Default answers section visible only when type is MULTIPLE_CHOICE
    - Shows hint text "(new questions will use these answers by default)"
    - Teacher can edit default answer options (radio + text + delete)
    - New questions inherit the current default answers
    - Default answers support 2-6 options with one correct selection

    # Questions — manual
    - Can add a new question via "+ Add Question" button
    - New MC question initializes with current default answer options
    - New TEXT_ANSWER question has no answer options section
    - Can edit a question inline (card expands to edit mode)
    - Only one question can be edited at a time
    - Can delete a question (instant removal, no individual confirm)
    - Questions re-number after deletion (1, 2, 3...)

    # Questions — MULTIPLE_CHOICE answers
    - "MC question edit shows answer options with radio + text + delete"
    - Can add answer options (up to 6)
    - Can remove answer options (minimum 2 remain)
    - Can select exactly one correct answer via radio button
    - Validation requires ≥2 options, all with text, 1 correct

    # Questions — TEXT_ANSWER
    - "TEXT_ANSWER question edit shows only the question text field"
    - "View mode shows '(Text answer)' label in muted style"

    # Fast Create
    - Fast Create button opens a dialog
    - "Textarea accepts numbered list (1. / 2) formats) — splits by numbered index at line start only"
    - Multi-line content between numbered indices is preserved as one question
    - Numbers appearing mid-text do not trigger a new question split
    - Real-time preview shows detected question count (debounced 200ms)
    - "Add N Questions" button appends parsed questions to the list
    - Cancel closes dialog without changes
    - Parsed MC questions inherit current default answer options

    # Save
    - Save validates all fields before API call
    - "Validation errors: title required, ≥1 question, question content required, MC options valid"
    - Save button shows loading spinner during API call
    - Successful save navigates to course management
    - Save error shows toast and stays on page

    # Unsaved changes
    - Navigating away with unsaved changes shows confirmation dialog
    - "Stay" keeps user on editor
    - "Leave" discards changes and navigates away
    - Browser close/refresh triggers native beforeunload prompt
    - Clean state (no changes) navigates without prompt

    # Responsive
    - Works on mobile (<768px) with stacked layout
    - Header wraps: title on top, buttons below on mobile
    - Fast Create dialog becomes full-screen on mobile
