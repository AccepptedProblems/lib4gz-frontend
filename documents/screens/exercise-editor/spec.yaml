openspec: "1.0"
kind: Screen
info:
  title: Exercise Editor (Teacher)
  version: "2.0.0"
  description: >
    Create and edit exercises with questions. Supports two exercise types:
    Multiple Choice (questions with selectable answer options) and
    Text Answer (questions where students type free-form responses).
    Includes a Fast Create feature for bulk-importing questions from
    pasted numbered text. Splits by numbered index at line start;
    multi-line content between indices is preserved per question.

screen:
  id: exercise-editor
  name: Exercise Editor
  routes:
    create: /course/:id/manage/exercise/new
    edit: /course/:id/manage/exercise/:exerciseId/edit
  component:
    selector: app-exercise-editor
    file: src/app/components/course-teacher/exercise-editor/exercise-editor.component.ts
    template: src/app/components/course-teacher/exercise-editor/exercise-editor.component.html
    styles: src/app/components/course-teacher/exercise-editor/exercise-editor.component.scss
    standalone: true
  guard: [authGuard, roleGuard]
  guard_data:
    roles: [teacher]
  target_users: [teacher]
  status: implemented

  purpose: >
    Provide teachers with an intuitive editor for creating and managing
    exercises attached to a lesson. The editor supports two question types
    (Multiple Choice and Text Answer), manual question creation, inline
    question editing, and a Fast Create feature that parses numbered
    text into individual questions (splitting by numbered index at
    line start, supporting multi-line question content). An unsaved-changes confirmation dialog
    prevents accidental data loss.

  # ────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ────────────────────────────────────────────────────────────────────
  navbar_visibility: hidden
  navbar_visibility_description: >
    The navigation bar is hidden while creating or editing exercises to
    provide a distraction-free, full-screen editor experience. This is
    achieved by adding exercise editor route patterns to the hiddenRoutes
    array in AppComponent.

  layout:
    desktop:
      description: >
        Single-column centered layout (max-width 800px). Navbar is hidden.
        Page header contains the title on the left and Cancel/Save buttons
        on the right (same row). No back icon button — Cancel handles
        navigation. Exercise Title field appears first, then a compact
        Exercise Type selector, then an optional placeholder answers section
        (for MULTIPLE_CHOICE with True/False-style defaults), then the
        questions section with inline editing. >=768px.
      ascii: |
        +──────────────────────────────────────────────────────────────+
        │                                                              │
        │  Create Exercise          [Cancel]  [Save Exercise]          │
        │                                                              │
        │  Exercise Title*                                             │
        │  ┌──────────────────────────────────────────────────────┐   │
        │  │ What do you know about Angular?                      │   │
        │  │ ________________________________________________     │   │
        │  └──────────────────────────────────────────────────────┘   │
        │                                                              │
        │  Exercise Type*                                              │
        │  [Text Answer ▼]  (compact/small select)                 │
        │                                                              │
        │  Default Answers  (only for MULTIPLE_CHOICE)                 │
        │  ┌────────────────────────────────────────────────────────┐  │
        │  │  (●) [True______________________]                [✕]  │  │
        │  │  ( ) [False_____________________]                [✕]  │  │
        │  │  [+ Add Answer]                                       │  │
        │  └────────────────────────────────────────────────────────┘  │
        │                                                              │
        │  Questions (3)                                               │
        │                                                              │
        │  ┌──────────────────────────────────────────────────────┐    │
        │  │ 1.  What is Angular?                      [✎]  [✕]  │    │
        │  │     ● A framework    ○ A library    ○ A language     │    │
        │  └──────────────────────────────────────────────────────┘    │
        │  ┌──────────────────────────────────────────────────────┐    │
        │  │ 2.  Select the JS superset                [✎]  [✕]  │    │
        │  │     ● TypeScript    ○ CoffeeScript                  │    │
        │  └──────────────────────────────────────────────────────┘    │
        │  ┌──────────────────────────────────────────────────────┐    │
        │  │ 3.  Explain dependency injection          [✎]  [✕]  │    │
        │  │     (Text answer)                                   │    │
        │  └──────────────────────────────────────────────────────┘    │
        │                                                              │
        │  [+ Add Question]              [⚡ Fast Create]             │
        │                                                              │
        +──────────────────────────────────────────────────────────────+

    mobile:
      description: >
        Stacked full-width layout with collapsible question cards. Navbar
        is hidden. Header shows title and sticky Cancel/Save buttons. <768px.
      ascii: |
        +──────────────────────────+
        │                          │
        │  Create Exercise         │
        │  [Cancel]  [Save]        │
        │                          │
        │  Exercise Title*         │
        │  ┌────────────────────┐  │
        │  │ __________________ │  │
        │  │ __________________ │  │
        │  └────────────────────┘  │
        │                          │
        │  Exercise Type*          │
        │  [Text Answer ▼]     │
        │                          │
        │  Default Answers         │
        │  (●) [True_______]       │
        │  ( ) [False______]       │
        │  [+ Add Answer]          │
        │                          │
        │  Questions (3)           │
        │                          │
        │  ┌────────────────────┐  │
        │  │ 1. What is...  [✎] │  │
        │  │  ● A framework     │  │
        │  │  ○ A library       │  │
        │  └────────────────────┘  │
        │  ┌────────────────────┐  │
        │  │ 2. Select... [✎]  │  │
        │  └────────────────────┘  │
        │  ┌────────────────────┐  │
        │  │ 3. Explain... [✎] │  │
        │  └────────────────────┘  │
        │                          │
        │  [+ Add Question]        │
        │  [⚡ Fast Create]       │
        │                          │
        +──────────────────────────+

  # ────────────────────────────────────────────────────────────────────
  # COMPONENTS
  # ────────────────────────────────────────────────────────────────────
  components:

    # ── PAGE HEADER ──────────────────────────────────────────────────
    - id: page-header
      name: Page Header
      type: inline
      description: >
        Flex row with the page title on the left and Cancel/Save action
        buttons on the right, aligned vertically center. No back icon
        button — the Cancel button handles navigation (triggers unsaved
        changes dialog if dirty, otherwise navigates back).
      elements:
        - id: page-title
          description: >
            "Create Exercise" (create mode) or "Edit Exercise" (edit mode).
            Uses text-title-large (22px). CSS class: editor-title.
        - id: header-actions
          description: >
            Flex row containing Cancel (secondary, md size) and Save Exercise
            (primary, md size, with loading state) buttons. Buttons use md
            size for prominent visibility in the header. On mobile, buttons
            may wrap below the title.

    # ── EXERCISE FORM ────────────────────────────────────────────────
    - id: exercise-form
      name: Exercise Metadata Form
      type: inline
      description: >
        Flat content section with form fields. No card wrapper — follows
        Unified Surface principle. Fields are separated by `--spacing-lg`
        vertical gap. Exercise Type field and Exercise Title field must have
        `--spacing-lg` gap between them.
      fields:
        - name: title
          type: textarea
          label: Exercise Title
          placeholder: "Enter the main question or title for this exercise"
          minRows: 1
          description: >
            The main question or prompt of the exercise. This is what
            students see as the exercise heading. Uses the shared
            lib-textarea component with floating label, auto-expanding
            height, required validation, and error display. Starts at
            minRows=1 and grows as the teacher types. Auto-resize is
            handled internally by the component.
          validation:
            required: true
          component: lib-textarea

        - name: type
          type: select
          label: Exercise Type
          description: >
            Determines how all questions in this exercise behave.
            Only two types are currently supported. Displayed SECOND in the
            form (after exercise title). Uses a compact/small select box
            (small-input class, reduced width via max-width: 280px) to
            avoid the selector dominating the form visually.
          options:
            - value: MULTIPLE_CHOICE
              label: Multiple Choice
              description: >
                Each question has a set of answer options. Students select
                one or more correct answers.
            - value: TEXT_ANSWER
              label: Text Answer
              description: >
                Students type a free-form text response for each question.
                No predefined answer options.
          validation:
            required: true
          default: TEXT_ANSWER
          behavior: >
            Changing the exercise type after questions have been added shows
            a confirmation: "Changing the type will reset answer options for
            all existing questions. Continue?" If confirmed, answer options
            (meta.options) are cleared from all questions.

    # ── DEFAULT ANSWERS (PLACEHOLDER) ─────────────────────────────────
    - id: default-answers
      name: Default Answers (Placeholder)
      type: inline
      description: >
        Only visible when exercise type is MULTIPLE_CHOICE. Allows the
        teacher to define placeholder/default answer options at the exercise
        level (e.g., "True" / "False"). When a new question is added
        (manually or via Fast Create), it inherits these default answers
        instead of blank options. Questions that already exist are NOT
        retroactively updated — only newly created questions use the
        defaults. If the teacher has not edited the defaults, new questions
        get the standard 2 empty options. This is useful for true/false
        exercises where every question shares the same answer choices.
      elements:
        - id: default-answers-label
          description: >
            "Default Answers (new questions will use these)" — label uses
            text-label-large with inline hint in parentheses using
            text-body-small and --text-secondary-color. Concise single-line.
        - id: default-answer-rows
          description: >
            Same UI as the question-level answer rows: radio + text input +
            delete button. Min 2, max 6 options. Radio selects the default
            correct answer.
        - id: add-default-answer-button
          description: >
            "+ Add Answer" button. Hidden when max (6) reached.
      styling:
        container: >
          margin-top: var(--spacing-md). Uses the same .answers-section,
          .answers-list, .answer-row classes as question-level answers.

    # ── QUESTIONS SECTION ────────────────────────────────────────────
    - id: questions-section
      name: Questions Section
      type: inline
      description: >
        Flat content section. No card wrapper. Contains the question count
        header, the list of question cards, and the action buttons (Add
        Question, Fast Create). Individual question cards retain their
        own card styling.
      elements:
        - id: questions-header
          description: >
            "Questions (N)" where N is the current count.
            Uses text-title-medium. If N = 0, shows "Questions" without count.
        - id: question-list
          description: List of question-card components (view or edit mode).
        - id: action-buttons
          description: >
            Row with "Add Question" (secondary button) on the left and
            "Fast Create" (primary button with ⚡ icon) on the right.
            On mobile, buttons stack vertically full-width.

    # ── QUESTION CARD (VIEW MODE) ───────────────────────────────────
    - id: question-card-view
      name: Question Card — View Mode
      type: inline
      description: >
        Compact read-only card for each question. Shows order number,
        question text, and a preview of answer options (if MULTIPLE_CHOICE).
        Has edit (pencil) and delete (×) icon buttons in the top-right.
      layout: |
        ┌──────────────────────────────────────────────────────────┐
        │  1.  What is Angular?                         [✎]  [✕]  │
        │      ● A framework    ○ A library    ○ A language        │
        └──────────────────────────────────────────────────────────┘
      elements:
        - id: order-number
          description: >
            Sequential number (1, 2, 3...). Uses text-label-large,
            --text-secondary color.
        - id: question-text
          description: >
            The question content. Uses text-body-medium. Truncated to
            2 lines with ellipsis in view mode.
        - id: edit-button
          description: >
            Pencil icon button (material icon "edit"). On click, switches
            this card to edit mode.
        - id: delete-button
          description: >
            × icon button (material icon "close"). On click, removes the
            question from the list with a brief fade-out animation.
            No confirmation dialog for individual question delete (instant,
            undoable via Cancel at exercise level).
        - id: answer-preview
          description: >
            Only shown when exercise type is MULTIPLE_CHOICE.
            Displays answer options inline as a wrapped row of chips/labels:
            "● Correct answer" (--primary-color-600 text, --primary-color-50 bg)
            "○ Wrong answer" (--text-secondary, no bg).
            If TEXT_ANSWER type, shows a muted label "(Text answer)" in
            --text-tertiary italic.
      styling:
        card: >
          background: white; border: 1px solid var(--neutral-color-3, #e0e0e0);
          border-radius: var(--radius-md); padding: var(--spacing-md);
          margin-bottom: var(--spacing-sm).
        hover: >
          border-color: var(--neutral-color-5, #9e9e9e); transition: var(--duration-normal).

    # ── QUESTION CARD (EDIT MODE) ───────────────────────────────────
    - id: question-card-edit
      name: Question Card — Edit Mode (Inline)
      type: inline
      description: >
        Expanded inline editor that replaces the view card when editing.
        Contains the question text field and, for MULTIPLE_CHOICE,
        an answer options section. Has Save and Cancel buttons at the
        bottom of the card.
      layout:
        multiple_choice: |
          ┌──────────────────────────────────────────────────────────┐
          │  Question 1                                              │
          │  [What is Angular?________________________________]      │
          │                                                          │
          │  Answers                                                 │
          │  ┌────────────────────────────────────────────────────┐  │
          │  │  (●) [A framework___________________]        [✕]  │  │
          │  │  ( ) [A library_____________________]        [✕]  │  │
          │  │  ( ) [A language____________________]        [✕]  │  │
          │  │                                                   │  │
          │  │  [+ Add Answer]                                   │  │
          │  └────────────────────────────────────────────────────┘  │
          │                                                          │
          │  [Cancel]                             [Save Question]    │
          └──────────────────────────────────────────────────────────┘
        text_answer: |
          ┌──────────────────────────────────────────────────────────┐
          │  Question 3                                              │
          │  [Explain dependency injection_____________________]     │
          │                                                          │
          │  Students will type their answer as free text.           │
          │                                                          │
          │  [Cancel]                             [Save Question]    │
          └──────────────────────────────────────────────────────────┘
      fields:
        - name: content
          type: textarea
          label: Question Text
          placeholder: "Enter the question"
          minRows: 1
          description: >
            The question content shown to students. Uses the shared
            lib-textarea component with floating label and auto-expanding
            height. Starts at minRows=1 and grows as the teacher types.
            Auto-resize is handled internally by the component, including
            on entering edit mode when existing content is loaded.
          validation:
            required: true
          component: lib-textarea

      answer_options_section:
        description: >
          Only visible when exercise type is MULTIPLE_CHOICE. Contains
          a list of answer option rows and an "Add Answer" button.
        label: Answers
        elements:
          - id: answer-row
            description: >
              Each row: radio button (marks correct) + text input + delete (×).
              Radio buttons are mutually exclusive — only one answer can be
              marked correct per question.
            layout: |
              (●) [Answer text input_______________]  [✕]
            fields:
              - name: text
                type: text
                placeholder: "Answer option"
                validation:
                  required: true
              - name: isCorrect
                type: radio
                description: >
                  Selecting a radio marks this answer as the correct one.
                  Uses --primary-color-600 for the selected radio fill.
            min_options: 2
            max_options: 6
            delete_behavior: >
              Cannot delete if only 2 options remain (min 2). Delete button
              is hidden/disabled when at minimum.
          - id: add-answer-button
            description: >
              "+ Add Answer" text button (secondary style). Hidden when
              max options (6) reached.

      card_actions:
        - id: cancel-question
          label: Cancel
          variant: secondary
          description: >
            Discards edits to this question and returns card to view mode.
            If this was a newly added question with no saved content,
            removes the card entirely.
        - id: save-question
          label: Save Question
          variant: primary
          description: >
            Validates the question (content required; if MC, at least 2
            options with text, exactly 1 marked correct). On success,
            collapses to view mode. On validation failure, shows inline
            error messages.

      styling:
        card: >
          background: var(--primary-color-50); border: 2px solid
          var(--primary-color-200); border-radius: var(--radius-md);
          padding: var(--spacing-lg); margin-bottom: var(--spacing-sm).
        description: >
          The edit card uses a tinted background to visually distinguish
          it from view-mode cards, making it clear which question is
          being edited. Follows Subtle Interaction States principle.

    # ── FAST CREATE DIALOG ─────────────────────────────────────────
    - id: fast-create-dialog
      name: Fast Create Dialog
      type: dialog
      description: >
        A modal dialog (max-width 600px) opened by the "Fast Create" button.
        Allows teachers to paste a numbered list of questions in a textarea.
        Questions are split by numbered indices (e.g. "1.", "2)") at the
        start of new lines. Multi-line content between indices is preserved
        as a single question. The confirm button shows the count of detected
        questions. On confirm, all parsed questions are appended to the
        question list. No preview section — only the textarea and action
        buttons.
      layout: |
        ┌──────────────────────────────────────────────────────────────┐
        │  ⚡ Fast Create                                       [✕]   │
        │                                                              │
        │  Paste your numbered question list below:                    │
        │  ┌────────────────────────────────────────────────────────┐  │
        │  │ 1. What is Angular? It is a framework                  │  │
        │  │ that helps build web applications                      │  │
        │  │ 2. What is TypeScript?                                 │  │
        │  │ It extends JavaScript with types                       │  │
        │  │ 3. Explain dependency injection                        │  │
        │  └────────────────────────────────────────────────────────┘  │
        │                                                              │
        │  [Cancel]                             [Add 3 Questions]      │
        └──────────────────────────────────────────────────────────────┘
      fields:
        - name: rawText
          type: textarea
          label: Paste your numbered question list below
          placeholder: |
            1. First question
            2. Second question
            3. Third question
          minRows: 8
          description: >
            Uses lib-textarea with floating label, minRows=8, auto-expanding
            height. Parses on every keystroke (debounced 200ms) to update the
            detected question count in the confirm button.
          component: lib-textarea

      parsing_rules:
        description: >
          Splits text by numbered indices at the start of new lines only.
          A new question begins when a line matches the numbered pattern.
          All lines between one numbered index and the next are joined
          with newlines and treated as that question's content. Numbers
          appearing mid-text are NOT treated as split points.
        patterns:
          - regex: '^\s*(\d+)\s*[.)]\s*'
            description: >
              Matches the start of a line with a number followed by a dot
              or closing parenthesis. Examples: "1. Question", "2) Question".
              The number prefix is stripped; text after it (and all
              subsequent non-numbered lines) becomes the question content.
        behavior:
          - A new question starts only at a numbered index on a new line
          - Lines between indices are continuation lines (joined with newlines)
          - Lines before the first numbered index are ignored
          - Leading/trailing whitespace is trimmed from the final question text
          - Duplicate question texts are preserved (teacher's responsibility)
          - Parsed questions inherit the next available orderIndex

      actions:
        - id: cancel-fast-create
          label: Cancel
          variant: secondary
          description: Closes the dialog without adding questions.
        - id: confirm-fast-create
          label: "Add N Questions"
          variant: primary
          description: >
            Dynamic label shows the count. Disabled when 0 questions
            detected. On click, appends all parsed questions to the
            question list, closes the dialog. For MULTIPLE_CHOICE exercises,
            new questions are added with 2 empty answer options as defaults.

    # ── UNSAVED CHANGES DIALOG ───────────────────────────────────────
    - id: unsaved-changes-dialog
      name: Unsaved Changes Confirmation Dialog
      type: dialog
      description: >
        Shown when the user attempts to navigate away (back icon button, browser
        back, route change) while there are unsaved changes. Uses the
        shared lib-dialog component.
      layout: |
        ┌──────────────────────────────────────────────────────────┐
        │  Unsaved Changes                                         │
        │                                                          │
        │  You have unsaved changes. Are you sure you want to      │
        │  leave? Your changes will be lost.                       │
        │                                                          │
        │  [Stay]                                    [Leave]       │
        └──────────────────────────────────────────────────────────┘
      actions:
        - id: stay
          label: Stay
          variant: primary
          description: Closes dialog, user remains on editor.
        - id: leave
          label: Leave
          variant: destructive
          description: Allows navigation, discards all changes.
      trigger: >
        Activated by the Cancel button, canDeactivate route guard, and the
        browser beforeunload event. The isDirty signal tracks whether any
        form field or question has been modified since the last save
        (or since initial load in create mode).

    # ── HEADER ACTIONS (Cancel / Save) ────────────────────────────────
    # NOTE: Cancel and Save buttons are located in the page-header
    # component (not in a separate footer). See page-header.header-actions.
    # The previous footer-actions component has been removed. Cancel and
    # Save are now prominently placed in the header for immediate access
    # without scrolling.
    - id: header-action-buttons
      name: Header Action Buttons
      type: inline
      description: >
        Cancel and Save Exercise buttons in the page header row. Uses md
        size for both buttons. Cancel triggers unsaved-changes-dialog if
        dirty, otherwise navigates back. Save validates and calls API.
      elements:
        - id: cancel-button
          label: Cancel
          variant: secondary
          size: md
          description: >
            Triggers unsaved-changes-dialog if dirty, otherwise navigates
            back to the lesson detail screen via /course/:id/manage with
            { lessonId } in router state.
        - id: save-button
          label: Save Exercise
          variant: primary
          size: md
          description: >
            Validates exercise form + all questions, then calls API.
            Shows loading spinner (lib-button isLoading) during save.

  # ────────────────────────────────────────────────────────────────────
  # STATES
  # ────────────────────────────────────────────────────────────────────
  states:
    - name: loading
      description: >
        Edit mode only. Skeleton placeholders for the title field,
        type selector, and question list while ExerciseService.get()
        and QuestionService.listByExercise() resolve.

    - name: create-mode
      description: >
        Empty form. Title blank, type defaults to TEXT_ANSWER,
        question list is empty. Page title: "Create Exercise".

    - name: edit-mode
      description: >
        Form populated from ExerciseResponse. Title and type filled.
        Question list populated from QuestionResponse[] with answer
        options reconstructed from each question's meta field.
        Page title: "Edit Exercise".

    - name: question-editing
      description: >
        One question card is in edit mode (expanded inline editor).
        Only one question can be edited at a time. Clicking edit on
        another question first saves/discards the current one.

    - name: fast-create-open
      description: >
        Fast Create dialog is visible. Background is dimmed.
        Dialog traps focus.

    - name: saving
      description: >
        Save button shows spinner (isLoading=true). All form fields
        and question actions are disabled during the API call.

    - name: unsaved-prompt
      description: >
        Unsaved Changes dialog is visible. User must choose Stay or Leave.

    - name: validation-errors
      description: >
        Inline error messages appear below invalid fields. Save button
        remains enabled but re-triggers validation on click. Errors:
        "Title is required", "At least one question is required",
        "Question N: text is required",
        "Question N: at least 2 answer options required",
        "Question N: select a correct answer".

  # ────────────────────────────────────────────────────────────────────
  # DATA FLOW
  # ────────────────────────────────────────────────────────────────────
  data_flow:
    route_params:
      create_mode:
        - name: id
          type: string
          description: Course UUID (used for back-navigation context)
      edit_mode:
        - name: id
          type: string
          description: Course UUID
        - name: exerciseId
          type: string
          description: Exercise UUID to load for editing

    signals:
      - name: isEditMode
        type: "Signal<boolean>"
        description: "computed(() => !!route.params['exerciseId'])"
      - name: exerciseTitle
        type: "WritableSignal<string>"
        description: Bound to the title textarea field (multi-line)
      - name: exerciseType
        type: "WritableSignal<ExerciseType>"
        description: "Bound to the type selector. Default: TEXT_ANSWER"
      - name: questions
        type: "WritableSignal<EditorQuestion[]>"
        description: >
          Array of questions being edited. EditorQuestion is a local
          interface extending the question content with UI state
          (isEditing, tempContent, tempOptions, isNew).
      - name: originalQuestions
        type: "WritableSignal<EditorQuestion[]>"
        description: >
          Snapshot of questions as loaded from the server (edit mode only).
          Set once in loadExercise() after mapping QuestionResponse[] to
          EditorQuestion[]. Used by buildUpdateItems() to compute the diff
          between the original server state and the current editor state:
          questions present in original but missing from current → DELETE,
          questions with no id in current → CREATE, questions whose content,
          meta, or orderIndex changed compared to original → UPDATE,
          unchanged questions → skipped (not sent to API).
      - name: editingIndex
        type: "WritableSignal<number | null>"
        description: >
          Index of the question currently in edit mode. null if none.
      - name: isDirty
        type: "Signal<boolean>"
        description: >
          computed() that compares current form state against the last
          saved snapshot. True if any field or question has changed.
      - name: defaultOptions
        type: "WritableSignal<AnswerOption[]>"
        description: >
          Placeholder/default answer options for MULTIPLE_CHOICE exercises.
          New questions inherit these options when added. Initialized with
          DEFAULT_MC_OPTIONS (2 empty options). Teacher can customize these
          (e.g., True/False) and all subsequently added questions will use
          them. Only visible and editable when exerciseType is MULTIPLE_CHOICE.
      - name: isSaving
        type: "WritableSignal<boolean>"
        description: True while the save API call is in flight.
      - name: showFastCreate
        type: "WritableSignal<boolean>"
        description: Controls Fast Create dialog visibility.
      - name: showUnsavedDialog
        type: "WritableSignal<boolean>"
        description: Controls Unsaved Changes dialog visibility.

    local_interfaces:
      - name: EditorQuestion
        description: >
          Local UI model for questions in the editor. Extends API data
          with editing state.
        fields:
          - name: id
            type: "string | null"
            description: "null for newly created questions, UUID for existing"
          - name: content
            type: string
            description: Question text
          - name: orderIndex
            type: number
          - name: meta
            type: "Record<string, any>"
            description: >
              For MULTIPLE_CHOICE: { options: AnswerOption[] }.
              For TEXT_ANSWER: {} (empty).
          - name: isNew
            type: boolean
            description: True if this question was created in this session
          - name: isEditing
            type: boolean
            description: True if this card is in edit mode

      - name: AnswerOption
        description: Single answer option for a MULTIPLE_CHOICE question
        fields:
          - name: text
            type: string
          - name: isCorrect
            type: boolean

    service_calls:
      - service: ExerciseService
        method: get
        params: exerciseId
        trigger: On init (edit mode only)
        description: Load exercise metadata (title, type, settings)

      - service: QuestionService
        method: listByExercise
        params: exerciseId
        trigger: On init (edit mode only)
        description: >
          Load all questions. Map QuestionResponse[] to EditorQuestion[]
          by extracting meta.options for MULTIPLE_CHOICE type.

      - service: ExerciseService
        method: create
        params: "lessonId, { title, type, settings }"
        trigger: Save (create mode)
        description: >
          Create the exercise first, then batch-create questions.
          The lessonId comes from navigation state or a query parameter
          passed from the lesson management screen.

      - service: ExerciseService
        method: update
        params: "exerciseId, { title, type, settings }"
        trigger: Save (edit mode)
        description: Update exercise metadata

      - service: QuestionService
        method: batchCreate
        params: "exerciseId, { questions: CreateQuestionItem[] }"
        trigger: Save (create mode, after exercise is created)
        description: >
          Create all questions at once. Each question's meta contains
          { options: AnswerOption[] } for MULTIPLE_CHOICE.

      - service: QuestionService
        method: batchUpdate
        params: "exerciseId, { questions: UpdateQuestionItem[] }"
        trigger: Save (edit mode)
        description: >
          Uses QuestionAction enum to CREATE new questions, UPDATE
          modified ones, and DELETE removed ones in a single call.

  # ────────────────────────────────────────────────────────────────────
  # INTERACTIONS
  # ────────────────────────────────────────────────────────────────────
  interactions:
    - action: Edit exercise title
      trigger: Type in title textarea (multi-line)
      result: Updates exerciseTitle signal, sets isDirty

    - action: Change exercise type
      trigger: Select from type dropdown
      result: >
        If questions exist with answer options, show confirmation dialog
        ("Changing type will reset answer options. Continue?"). On confirm,
        update exerciseType signal and clear meta.options from all questions.
        On cancel, revert the selector.

    - action: Add question manually
      trigger: Click "+ Add Question"
      result: >
        Appends a new EditorQuestion to the list with empty content,
        isNew=true, isEditing=true. If type is MULTIPLE_CHOICE, initializes
        with 2 empty answer options. Scrolls to the new question card.
        If another question was being edited, saves/discards it first.

    - action: Edit question
      trigger: Click edit (✎) button on a question card
      result: >
        Sets editingIndex to this question's index. The card expands to
        edit mode. If another question was being edited, saves/discards
        it first.

    - action: Save question (inline)
      trigger: Click "Save Question" in the expanded card
      result: >
        Validates question content (required), and for MULTIPLE_CHOICE:
        at least 2 options with text + exactly 1 correct. On success,
        collapses card to view mode. On failure, shows inline errors.

    - action: Cancel question edit
      trigger: Click "Cancel" in the expanded card
      result: >
        Reverts question to its pre-edit state. If the question was newly
        added (isNew=true) and has no saved content, removes it from the
        list entirely.

    - action: Delete question
      trigger: Click delete (✕) button on a question card
      result: >
        Removes the question from the list immediately. Remaining questions
        re-number automatically (1, 2, 3...). No confirmation dialog
        (exercise-level Cancel reverts all changes).

    - action: Open Fast Create
      trigger: Click "⚡ Fast Create" button
      result: Opens the Fast Create dialog

    - action: Paste text in Fast Create
      trigger: Type or paste in the textarea
      result: >
        Parses input after 200ms debounce. Splits by numbered index
        (e.g. "1.", "2)") at start of new lines. Multi-line content
        between indices is kept as one question. Updates the detected
        question count shown in the confirm button label ("Add N Questions").

    - action: Confirm Fast Create
      trigger: Click "Add N Questions" in dialog
      result: >
        Appends all parsed questions to the question list. For
        MULTIPLE_CHOICE, each new question gets 2 empty answer options.
        Closes dialog. New questions appear in view mode (not editing).

    - action: Cancel Fast Create
      trigger: Click "Cancel" or close (✕) in dialog
      result: Closes dialog without changes

    - action: Save exercise
      trigger: Click "Save Exercise"
      result: >
        1. Validate: title required, at least 1 question, all questions
           have content, MC questions have ≥2 options + 1 correct.
        2. If validation fails: scroll to first error, show inline messages.
        3. If valid: set isSaving=true. Create mode: single call to exercise
           create API with inline questions. Edit mode: call exercise update API,
           then question batchUpdate API.
        4. On success: navigate to /course/:id/manage with { lessonId } in
           router state (lesson detail screen).
        5. On error: show toast error, remain on page, set isSaving=false.

    - action: Cancel / navigate away
      trigger: Click "Cancel" or browser back or route change
      result: >
        If isDirty: show Unsaved Changes dialog. If "Stay": close dialog.
        If "Leave": navigate away. If NOT dirty: navigate immediately.

  # ────────────────────────────────────────────────────────────────────
  # BUSINESS LOGIC
  # ────────────────────────────────────────────────────────────────────
  business_logic:

    supported_exercise_types:
      description: >
        The application currently supports only two exercise types.
        The UI restricts the type selector to these values.
      types:
        - MULTIPLE_CHOICE
        - TEXT_ANSWER

    exercise_validation:
      - field: title
        rules: Required, no character limit
      - field: type
        rules: Required, must be MULTIPLE_CHOICE or TEXT_ANSWER
      - field: questions
        rules: At least 1 question required

    question_validation:
      - field: content
        rules: Required, non-empty after trim
      - field: meta.options (MULTIPLE_CHOICE only)
        rules:
          - At least 2 answer options
          - Each option text is required (non-empty after trim)
          - Exactly 1 option must be marked isCorrect=true
          - Maximum 6 options

    question_meta_structure:
      multiple_choice:
        description: "meta field stores answer options for MULTIPLE_CHOICE questions"
        schema: |
          {
            options: [
              { text: "Answer text", isCorrect: true },
              { text: "Answer text", isCorrect: false },
              ...
            ]
          }
      text_answer:
        description: "meta field is empty for TEXT_ANSWER questions"
        schema: |
          {}

    fast_create_parsing:
      algorithm: >
        Split by numbered index at start of new lines only. A new question
        starts when a line matches /^\s*(\d+)\s*[.)]\s*/. All subsequent
        lines (until the next numbered index or end of input) are joined
        with newline and treated as the question content. Numbers appearing
        mid-text do NOT trigger a split — only numbers at line start do.
      input_example: |
        1. What is Angular? It is a framework
        that helps build web applications
        2. What is TypeScript?
        It extends JavaScript with types
        3) Explain dependency injection
      output: >
        3 questions extracted:
        ["What is Angular? It is a framework\nthat helps build web applications",
         "What is TypeScript?\nIt extends JavaScript with types",
         "Explain dependency injection"]
      edge_cases:
        - "Empty input: 0 questions, preview shows hint text"
        - "Only blank lines: 0 questions"
        - "Lines before the first numbered index: ignored"
        - "Multi-line question content: preserved with newlines"
        - "Numbers inside question text (e.g. 'Angular 17'): not treated as split points"
        - "Mixed formats (1. and 2) ): all accepted"
        - "Very long question text: preserved as-is, no truncation"

    order_management:
      - Questions maintain sequential order (1, 2, 3...)
      - New questions (manual or fast-create) append at the end
      - Deleting a question re-numbers all remaining questions
      - orderIndex values are assigned on save (0-based for API)

    save_flow:
      create_mode:
        steps:
          - Validate exercise form and all questions
          - "Call ExerciseService.create(lessonId, { title, type, questions }) — single API call with inline questions"
          - Navigate to lesson detail screen on success (with lessonId in router state)
      edit_mode:
        steps:
          - Validate exercise form and all questions
          - "Call ExerciseService.update(exerciseId, { title, type })"
          - "Build UpdateQuestionItem[] via buildUpdateItems() diff algorithm"
          - "Call QuestionService.batchUpdate(exerciseId, { questions }) — only if items.length > 0"
          - Navigate to lesson detail screen on success (with lessonId in router state)
        build_update_items_algorithm:
          description: >
            Computes a minimal diff between originalQuestions (server state
            at load time) and the current questions array. Only changed items
            are sent to the API — unchanged questions are skipped entirely.
          steps:
            - "Build a Map<string, EditorQuestion> from originalQuestions keyed by id"
            - "Collect IDs still present in the current questions into a Set"
            - >
              For each original question whose id is NOT in the current Set,
              emit { action: DELETE, questionId: id }
            - >
              For each current question without an id (id === null),
              emit { action: CREATE, content, orderIndex, meta }
            - >
              For each current question with an id, look up the original
              by id. If content, orderIndex, or meta (JSON-compared) differ,
              emit { action: UPDATE, questionId, content, orderIndex, meta }.
              If nothing changed, skip it (do not send to API).

    unsaved_changes_detection:
      description: >
        The isDirty signal is computed by comparing the current editor
        state against a snapshot taken at load time (edit mode) or
        the initial empty state (create mode). Tracked fields:
        exerciseTitle, exerciseType, questions array (deep comparison
        of content + meta for each question).
      guard: |
        canDeactivate(): boolean | Observable<boolean> {
          if (!this.isDirty()) return true;
          this.showUnsavedDialog.set(true);
          return this.unsavedDialogResult$;
        }
      browser_event: |
        @HostListener('window:beforeunload', ['$event'])
        onBeforeUnload(event: BeforeUnloadEvent) {
          if (this.isDirty()) {
            event.preventDefault();
          }
        }

  # ────────────────────────────────────────────────────────────────────
  # ACCESSIBILITY
  # ────────────────────────────────────────────────────────────────────
  accessibility:
    - Form fields have associated labels via lib-input component
    - Error messages use aria-describedby linked to their field
    - Fast Create dialog traps focus (lib-dialog)
    - Unsaved Changes dialog traps focus (lib-dialog)
    - Question edit/delete buttons have aria-label ("Edit question 1", "Delete question 1")
    - Radio buttons in answer options are grouped with role="radiogroup" and aria-label
    - Save/Cancel buttons are keyboard accessible (tab order, Enter/Space activation)
    - Fast Create dialog textarea has appropriate aria-label for screen readers

  # ────────────────────────────────────────────────────────────────────
  # RESPONSIVE
  # ────────────────────────────────────────────────────────────────────
  responsive:
    breakpoints:
      - range: ">= 768px"
        layout: >
          Centered single-column (max-width: 800px, margin: 0 auto).
          Navbar hidden. Header shows title left, Cancel/Save right.
          Question cards show answer options in a wrapped inline row.
          Action buttons (Add Question, Fast Create) on one row.
      - range: "< 768px"
        layout: >
          Full-width with --spacing-md (16px) horizontal padding.
          Navbar hidden. Header stacks: title on top, buttons below
          (flex-wrap). Question cards stack answer options vertically.
          Action buttons stack vertically, full-width.
          Fast Create dialog becomes full-screen panel.

