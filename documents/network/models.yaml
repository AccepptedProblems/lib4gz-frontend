openspec: "1.0"
kind: DataModels
info:
  title: LMS Platform - Data Models
  version: "1.0.0"
  description: >
    TypeScript interfaces and enumerations used across the frontend application.
    All models are located under src/app/shared/models/.

barrel_export:
  file: src/app/shared/models/index.ts
  exports:
    - ./enums
    - ./common.model
    - ./auth.model
    - ./course.model
    - ./enrollment.model
    - ./module.model
    - ./lesson.model
    - ./summary.model
    - ./exercise.model
    - ./question.model
    - ./submission.model

enums:
  file: src/app/shared/models/enums.ts
  definitions:
    - name: UserRole
      values:
        - ADMIN
        - USER
        - TEACHER
      description: >
        Global user roles. TEACHER role is required to create courses.
        Distinct from EnrollmentRole which governs per-course permissions.

    - name: Visibility
      values:
        - PUBLIC
        - PRIVATE
        - UNLISTED
      description: Course visibility setting

    - name: EnrollmentRole
      values:
        - LEARNER
        - TEACHER
      description: Role of user in a course enrollment

    - name: EnrollmentStatus
      values:
        - PENDING
        - ACTIVE
        - REJECTED
        - INACTIVE
      description: Status of an enrollment request/record

    - name: ExerciseType
      values:
        - TEXT_ANSWER
        - CODE
        - FILE_UPLOAD
        - MULTIPLE_CHOICE
        - PROJECT_LINK
      description: Type of exercise question
      currently_supported:
        - TEXT_ANSWER
        - MULTIPLE_CHOICE
      note: >
        Only TEXT_ANSWER and MULTIPLE_CHOICE are supported in the current
        UI. Other values exist for future expansion.

    - name: SubmissionStatus
      values:
        - DRAFT
        - SUBMITTED
        - APPROVED
        - NEEDS_REVISION
      description: Lifecycle status of a student submission

    - name: QuestionVisibility
      values:
        - VISIBLE
        - HIDDEN
      description: Whether a question is visible to students

    - name: QuestionAction
      values:
        - CREATE
        - UPDATE
        - DELETE
      description: Action type for batch question operations

models:
  # ──────────────────────────────────────────────────────────────
  # COMMON
  # ──────────────────────────────────────────────────────────────
  common:
    file: src/app/shared/models/common.model.ts
    interfaces:
      - name: UserSummary
        description: Lightweight user representation embedded in other responses
        fields:
          - name: id
            type: string
          - name: name
            type: string
          - name: email
            type: string
          - name: avatarUrl
            type: "string | null"

  # ──────────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────────
  auth:
    file: src/app/shared/models/auth.model.ts
    interfaces:
      - name: UserCreationRequest
        category: request
        fields:
          - name: username
            type: string
          - name: email
            type: string
          - name: password
            type: string

      - name: LoginRequest
        category: request
        fields:
          - name: username
            type: string
          - name: password
            type: string

      - name: Token
        category: response
        fields:
          - name: token
            type: string
          - name: expiredAt
            type: number
            description: Milliseconds since epoch

      - name: UserResponse
        category: response
        fields:
          - name: id
            type: string
          - name: username
            type: string
          - name: email
            type: string

      - name: LoginResponse
        category: response
        fields:
          - name: user
            type: UserResponse
          - name: accessToken
            type: Token

  # ──────────────────────────────────────────────────────────────
  # USER
  # ──────────────────────────────────────────────────────────────
  user:
    file: src/app/shared/models/user.model.ts
    interfaces:
      - name: User
        description: Placeholder user interface
        fields: []

  # ──────────────────────────────────────────────────────────────
  # COURSE
  # ──────────────────────────────────────────────────────────────
  course:
    file: src/app/shared/models/course.model.ts
    imports:
      - Visibility from ./enums
      - UserSummary from ./common.model
    interfaces:
      - name: CreateCourseRequest
        category: request
        fields:
          - name: title
            type: string
          - name: description
            type: "string | null"
            optional: true
          - name: visibility
            type: Visibility
            optional: true
            default: PRIVATE
          - name: settings
            type: "Record<string, any>"
            optional: true
            default: "{}"

      - name: UpdateCourseRequest
        category: request
        fields:
          - name: title
            type: "string | null"
            optional: true
          - name: description
            type: "string | null"
            optional: true
          - name: visibility
            type: "Visibility | null"
            optional: true
          - name: settings
            type: "Record<string, any> | null"
            optional: true

      - name: CourseResponse
        category: response
        fields:
          - name: id
            type: string
          - name: code
            type: string
            description: Unique 10-digit numeric course code (auto-generated by backend)
          - name: title
            type: string
          - name: description
            type: "string | null"
          - name: visibility
            type: Visibility
          - name: createdBy
            type: UserSummary
          - name: settings
            type: "Record<string, any>"
          - name: createdAt
            type: number
          - name: updatedAt
            type: number
          - name: moduleCount
            type: "number | null"
            optional: true
          - name: enrollmentCount
            type: "number | null"
            optional: true

    types:
      - name: CourseListType
        definition: "'created' | 'enrolled' | 'public'"

  # ──────────────────────────────────────────────────────────────
  # ENROLLMENT
  # ──────────────────────────────────────────────────────────────
  enrollment:
    file: src/app/shared/models/enrollment.model.ts
    imports:
      - EnrollmentRole, EnrollmentStatus from ./enums
      - UserSummary from ./common.model
    interfaces:
      - name: EnrollmentRequest
        category: request
        fields:
          - name: role
            type: EnrollmentRole
            optional: true
            default: LEARNER

      - name: UpdateEnrollmentRequest
        category: request
        fields:
          - name: role
            type: "EnrollmentRole | null"
            optional: true
          - name: status
            type: "EnrollmentStatus | null"
            optional: true

      - name: EnrollmentResponse
        category: response
        fields:
          - name: id
            type: string
          - name: courseId
            type: string
          - name: courseName
            type: string
          - name: user
            type: UserSummary
          - name: role
            type: EnrollmentRole
          - name: status
            type: EnrollmentStatus
          - name: joinedAt
            type: "number | null"
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

  # ──────────────────────────────────────────────────────────────
  # MODULE
  # ──────────────────────────────────────────────────────────────
  module:
    file: src/app/shared/models/module.model.ts
    interfaces:
      - name: CreateModuleRequest
        category: request
        fields:
          - name: title
            type: string
          - name: orderIndex
            type: "number | null"
            optional: true

      - name: UpdateModuleRequest
        category: request
        fields:
          - name: title
            type: "string | null"
            optional: true
          - name: orderIndex
            type: "number | null"
            optional: true

      - name: ModuleResponse
        category: response
        fields:
          - name: id
            type: string
          - name: courseId
            type: string
          - name: title
            type: string
          - name: orderIndex
            type: number
          - name: lessonCount
            type: "number | null"
            optional: true
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

  # ──────────────────────────────────────────────────────────────
  # LESSON
  # ──────────────────────────────────────────────────────────────
  lesson:
    file: src/app/shared/models/lesson.model.ts
    interfaces:
      - name: CreateLessonRequest
        category: request
        fields:
          - name: title
            type: string
          - name: orderIndex
            type: "number | null"
            optional: true

      - name: UpdateLessonRequest
        category: request
        fields:
          - name: title
            type: "string | null"
            optional: true
          - name: orderIndex
            type: "number | null"
            optional: true

      - name: LessonResponse
        category: response
        fields:
          - name: id
            type: string
          - name: moduleId
            type: string
          - name: title
            type: string
          - name: orderIndex
            type: number
          - name: hasSummary
            type: boolean
          - name: exerciseCount
            type: "number | null"
            optional: true
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

  # ──────────────────────────────────────────────────────────────
  # SUMMARY
  # ──────────────────────────────────────────────────────────────
  summary:
    file: src/app/shared/models/summary.model.ts
    imports:
      - UserSummary from ./common.model
    interfaces:
      - name: CreateSummaryRequest
        category: request
        fields:
          - name: content
            type: string

      - name: UpdateSummaryRequest
        category: request
        fields:
          - name: content
            type: string

      - name: SummaryResponse
        category: response
        fields:
          - name: id
            type: string
          - name: lessonId
            type: string
          - name: content
            type: string
          - name: editedBy
            type: UserSummary
          - name: version
            type: number
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

  # ──────────────────────────────────────────────────────────────
  # EXERCISE
  # ──────────────────────────────────────────────────────────────
  exercise:
    file: src/app/shared/models/exercise.model.ts
    imports:
      - ExerciseType from ./enums
      - CreateQuestionItem from ./question.model
    interfaces:
      - name: CreateExerciseRequest
        category: request
        fields:
          - name: title
            type: string
          - name: type
            type: ExerciseType
          - name: settings
            type: "Record<string, any>"
            optional: true
            default: "{}"
          - name: orderIndex
            type: "number | null"
            optional: true
          - name: questions
            type: "CreateQuestionItem[]"
            optional: true
            default: "[]"
            description: >
              Optional inline questions to create with the exercise.
              Avoids a separate API call to POST /exercises/{id}/questions.

      - name: UpdateExerciseRequest
        category: request
        fields:
          - name: title
            type: "string | null"
            optional: true
          - name: type
            type: "ExerciseType | null"
            optional: true
          - name: settings
            type: "Record<string, any> | null"
            optional: true
          - name: orderIndex
            type: "number | null"
            optional: true

      - name: ExerciseResponse
        category: response
        fields:
          - name: id
            type: string
          - name: lessonId
            type: string
          - name: title
            type: string
          - name: type
            type: ExerciseType
          - name: settings
            type: "Record<string, any>"
          - name: orderIndex
            type: number
          - name: questionCount
            type: "number | null"
            optional: true
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

  # ──────────────────────────────────────────────────────────────
  # QUESTION
  # ──────────────────────────────────────────────────────────────
  question:
    file: src/app/shared/models/question.model.ts
    imports:
      - QuestionVisibility, QuestionAction from ./enums
    interfaces:
      - name: CreateQuestionItem
        category: request
        description: Single question item for batch creation
        fields:
          - name: content
            type: string
          - name: orderIndex
            type: "number | null"
            optional: true
          - name: meta
            type: "Record<string, any>"
            optional: true
            default: "{}"
            meta_structure:
              MULTIPLE_CHOICE: >
                { options: [{ text: string, isCorrect: boolean }, ...] }
                — Array of answer options. Exactly one must have isCorrect=true.
                Min 2 options, max 6.
              TEXT_ANSWER: >
                {} — Empty object. No answer configuration needed.
          - name: visibility
            type: QuestionVisibility
            optional: true
            default: VISIBLE

      - name: CreateQuestionsRequest
        category: request
        fields:
          - name: questions
            type: CreateQuestionItem[]

      - name: UpdateQuestionItem
        category: request
        description: >
          Single question operation item. Action determines behavior:
          CREATE requires content, UPDATE requires questionId + fields,
          DELETE requires questionId.
        fields:
          - name: action
            type: QuestionAction
          - name: questionId
            type: "string | null"
            optional: true
            description: Required for UPDATE and DELETE
          - name: content
            type: "string | null"
            optional: true
            description: Required for CREATE and UPDATE
          - name: orderIndex
            type: "number | null"
            optional: true
          - name: meta
            type: "Record<string, any> | null"
            optional: true
          - name: visibility
            type: "QuestionVisibility | null"
            optional: true

      - name: UpdateQuestionsRequest
        category: request
        fields:
          - name: questions
            type: UpdateQuestionItem[]

      - name: QuestionResponse
        category: response
        fields:
          - name: id
            type: string
          - name: exerciseId
            type: string
          - name: content
            type: string
          - name: orderIndex
            type: number
          - name: meta
            type: "Record<string, any>"
            meta_structure:
              MULTIPLE_CHOICE: >
                { options: [{ text: string, isCorrect: boolean }, ...] }
              TEXT_ANSWER: "{}"
          - name: visibility
            type: QuestionVisibility
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

      - name: QuestionsResponse
        category: response
        description: Response from batch update operation
        fields:
          - name: created
            type: QuestionResponse[]
          - name: updated
            type: QuestionResponse[]
          - name: deleted
            type: string[]
            description: Array of deleted question IDs

  # ──────────────────────────────────────────────────────────────
  # SUBMISSION
  # ──────────────────────────────────────────────────────────────
  submission:
    file: src/app/shared/models/submission.model.ts
    imports:
      - SubmissionStatus from ./enums
      - UserSummary from ./common.model
    interfaces:
      - name: AnswerRequest
        category: request
        fields:
          - name: questionId
            type: string
          - name: answer
            type: "string | null"

      - name: CreateSubmissionRequest
        category: request
        fields:
          - name: answers
            type: AnswerRequest[]
            optional: true
            default: "[]"

      - name: UpdateSubmissionRequest
        category: request
        fields:
          - name: answers
            type: AnswerRequest[]

      - name: CommentRequest
        category: request
        fields:
          - name: comment
            type: string

      - name: RevisionRequest
        category: request
        fields:
          - name: feedback
            type: "string | null"
            optional: true

      - name: StudentAnswerResponse
        category: response
        fields:
          - name: id
            type: string
          - name: questionId
            type: string
          - name: questionContent
            type: string
          - name: answer
            type: "string | null"
          - name: teacherComment
            type: "string | null"
          - name: createdAt
            type: number
          - name: updatedAt
            type: number

      - name: SubmissionResponse
        category: response
        fields:
          - name: id
            type: string
          - name: exerciseId
            type: string
          - name: user
            type: UserSummary
          - name: status
            type: SubmissionStatus
          - name: answers
            type: "StudentAnswerResponse[] | null"
            optional: true
          - name: createdAt
            type: number
          - name: updatedAt
            type: number
          - name: submittedAt
            type: "number | null"
          - name: approvedAt
            type: "number | null"
