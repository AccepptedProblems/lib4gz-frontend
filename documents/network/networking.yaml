openspec: "1.0"
kind: NetworkConfig
info:
  title: LMS Platform - Networking Configuration
  version: "1.0.0"
  description: >
    HTTP client configuration, interceptors, and environment setup
    for the Angular frontend application.

environment:
  file: src/environments/environment.ts
  development:
    file: src/environments/environment.development.ts
    config:
      apiUrl: "http://localhost:8080/api"
      production: false
  production:
    file: src/environments/environment.ts
    config:
      apiUrl: "http://localhost:8080/api"
      production: true
  notes: >
    The apiUrl contains the static '/api' prefix only.
    API version prefixes (e.g. /v1, /v2) are specified per-endpoint
    in each service, allowing mixed versioning across resources.

authentication:
  strategy: jwt
  storage: localStorage
  keys:
    token: access_token
    expiry: token_expiry
  header:
    name: access_token
    format: "{token}"
  public_endpoints:
    - POST /auth/login
    - POST /auth/register

app_config:
  file: src/app/app.config.ts
  providers:
    - provideZoneChangeDetection:
        eventCoalescing: true
    - provideRouter:
        source: routes
    - provideAnimationsAsync
    - provideHttpClient:
        interceptors:
          - jwtInterceptor
          - errorInterceptor

interceptors:
  - id: jwt-interceptor
    name: jwtInterceptor
    file: src/app/interceptors/jwt.interceptor.ts
    type: HttpInterceptorFn
    description: >
      Attaches JWT token from localStorage to all outgoing HTTP requests
      except public endpoints.
    behavior:
      - step: Read token from localStorage key 'access_token'
      - step: Check if request URL matches a public endpoint
      - step: If token exists and endpoint is not public, clone request with 'access_token' header
      - step: Forward request to next handler
    skip_endpoints:
      - /auth/login
      - /auth/register
    implementation: |
      import { HttpInterceptorFn } from '@angular/common/http';

      export const jwtInterceptor: HttpInterceptorFn = (req, next) => {
        const token = localStorage.getItem('access_token');

        const publicEndpoints = ['/auth/login', '/auth/register'];
        const isPublic = publicEndpoints.some(endpoint => req.url.includes(endpoint));

        if (token && !isPublic) {
          const clonedReq = req.clone({
            setHeaders: {
              'access_token': token
            }
          });
          return next(clonedReq);
        }

        return next(req);
      };

  - id: error-interceptor
    name: errorInterceptor
    file: src/app/interceptors/error.interceptor.ts
    type: HttpInterceptorFn
    status_note: >
      The refresh-token backend endpoint is currently a stub (not implemented).
      Token refresh logic in this interceptor will not function until the
      backend implements POST /v1/auth/refresh-token.
    description: >
      Handles global HTTP error responses. On 401 Unauthorized,
      attempts a silent token refresh via AuthService.refreshToken().
      If refresh succeeds, retries the original request with the new token.
      If refresh itself returns 401, clears stored tokens and redirects to login.
      Concurrent 401s are queued and resolved after a single refresh call.
    behavior:
      - step: Intercept all HTTP responses via catchError
      - step: On non-401 errors, re-throw immediately
      - step: "On 401 from /auth/refresh-token: call AuthService.logout(), navigate to /login"
      - step: "On 401 from other endpoints and no refresh in progress: initiate AuthService.refreshToken()"
      - step: On refresh success, store new token, retry original request with new access_token header
      - step: "On refresh failure: call AuthService.logout(), navigate to /login"
      - step: "On 401 while refresh already in progress: queue request, retry after refresh completes"
    concurrent_refresh:
      strategy: BehaviorSubject-based queue
      description: >
        A module-level isRefreshing flag and BehaviorSubject<string | null>
        ensure only one refresh call runs at a time. Subsequent 401 requests
        wait for the BehaviorSubject to emit the new token, then retry.
    implementation: |
      import { HttpErrorResponse, HttpInterceptorFn } from '@angular/common/http';
      import { inject } from '@angular/core';
      import { Router } from '@angular/router';
      import { BehaviorSubject, catchError, filter, switchMap, take, throwError } from 'rxjs';
      import { AuthService } from '../services/auth.service';

      let isRefreshing = false;
      const refreshToken$ = new BehaviorSubject<string | null>(null);

      export const errorInterceptor: HttpInterceptorFn = (req, next) => {
        const router = inject(Router);
        const authService = inject(AuthService);

        return next(req).pipe(
          catchError((error: HttpErrorResponse) => {
            if (error.status !== 401) {
              return throwError(() => error);
            }

            if (req.url.includes('/auth/refresh-token')) {
              authService.logout();
              router.navigate(['/login']);
              return throwError(() => error);
            }

            if (!isRefreshing) {
              isRefreshing = true;
              refreshToken$.next(null);

              return authService.refreshToken().pipe(
                switchMap((token) => {
                  isRefreshing = false;
                  refreshToken$.next(token.token);
                  return next(req.clone({ setHeaders: { access_token: token.token } }));
                }),
                catchError((refreshError) => {
                  isRefreshing = false;
                  authService.logout();
                  router.navigate(['/login']);
                  return throwError(() => refreshError);
                })
              );
            }

            return refreshToken$.pipe(
              filter((token) => token !== null),
              take(1),
              switchMap((token) => next(req.clone({ setHeaders: { access_token: token! } })))
            );
          })
        );
      };

guards:
  - id: auth-guard
    name: authGuard
    file: src/app/guards/auth.guard.ts
    type: CanActivateFn
    description: >
      Protects routes that require authentication.
      Checks AuthService.isAuthenticated() for a valid, non-expired token.
      Redirects to /login via UrlTree if not authenticated.
    status: implemented
    implementation: |
      import { inject } from '@angular/core';
      import { CanActivateFn, Router } from '@angular/router';
      import { AuthService } from '../services/auth.service';

      export const authGuard: CanActivateFn = () => {
        const authService = inject(AuthService);
        const router = inject(Router);

        if (authService.isAuthenticated()) {
          return true;
        }

        return router.createUrlTree(['/login']);
      };

  - id: role-guard
    name: roleGuard
    file: src/app/guards/role.guard.ts
    type: CanActivateFn
    description: >
      Protects routes that require a specific role.
      Reads required roles from route data.roles array.
    status: placeholder
    data_contract:
      roles: string[]
    implementation: |
      import { CanActivateFn } from '@angular/router';

      export const roleGuard: CanActivateFn = (route, state) => {
        return true;
      };

services:
  barrel_export:
    file: src/app/services/index.ts
    exports:
      - ./auth.service
      - ./course.service
      - ./enrollment.service
      - ./module.service
      - ./lesson.service
      - ./summary.service
      - ./exercise.service
      - ./question.service
      - ./submission.service
