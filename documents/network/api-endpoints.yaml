openspec: "1.0"
kind: APIEndpoints
info:
  title: LMS Platform - API Endpoints
  version: "1.0.0"
  description: >
    Complete API endpoint specification for the LMS frontend.
    All endpoints are prefixed with the environment apiUrl base.
  base_url: "{environment.apiUrl}"
  content_type: application/json
  versioning:
    strategy: per-endpoint
    default: v1
    description: >
      The base apiUrl contains only the static '/api' prefix.
      Each endpoint path includes its own version prefix (e.g. /v1/).
      This allows individual endpoints to migrate to /v2 independently.

resources:
  # ──────────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────────
  auth:
    service:
      name: AuthService
      file: src/app/services/auth.service.ts
      injectable: root
      base_url: "{apiUrl}/v1/auth"
    endpoints:
      - id: auth.register
        method: POST
        path: /v1/auth/register
        auth: false
        description: Register a new user account (does NOT return a token; client must call login separately)
        request: UserCreationRequest
        response: UserResponse
        service_method: register(request)

      - id: auth.login
        method: POST
        path: /v1/auth/login
        auth: false
        description: Authenticate user and receive JWT token
        request: LoginRequest
        response: LoginResponse
        service_method: login(request)

      - id: auth.refresh-token
        method: POST
        path: /v1/auth/refresh-token
        auth: true
        description: Refresh the access token
        status: not_implemented
        note: >
          Backend endpoint exists but is a stub (empty method body).
          Token refresh is not functional yet.
        request: "{}"
        response: Token
        service_method: refreshToken()

    client_methods:
      - name: logout
        type: void
        description: Clear localStorage tokens and log out user
        implementation: |
          logout(): void {
            localStorage.removeItem('access_token');
            localStorage.removeItem('token_expiry');
          }

      - name: isAuthenticated
        type: boolean
        description: Check if a valid token exists in localStorage
        implementation: |
          isAuthenticated(): boolean {
            const token = localStorage.getItem('access_token');
            const expiry = localStorage.getItem('token_expiry');
            if (!token || !expiry) return false;
            return Date.now() < Number(expiry);
          }

      - name: getToken
        type: "string | null"
        description: Retrieve the current access token
        implementation: |
          getToken(): string | null {
            return localStorage.getItem('access_token');
          }

      - name: storeToken
        type: void
        visibility: private
        description: Store token and expiry in localStorage
        implementation: |
          private storeToken(token: Token): void {
            localStorage.setItem('access_token', token.token);
            localStorage.setItem('token_expiry', token.expiredAt.toString());
          }

  # ──────────────────────────────────────────────────────────────
  # COURSES
  # ──────────────────────────────────────────────────────────────
  courses:
    service:
      name: CourseService
      file: src/app/services/course.service.ts
      injectable: root
      base_url: "{apiUrl}/v1/courses"
    endpoints:
      - id: courses.list
        method: GET
        path: /v1/courses
        auth: true
        description: List courses filtered by type
        query_params:
          - name: type
            type: CourseListType
            required: false
            values: [created, enrolled, public]
        response: CourseResponse[]
        service_method: "list(type?)"

      - id: courses.create
        method: POST
        path: /v1/courses
        auth: true
        description: >
          Create a new course. Requires the authenticated user to have the
          global UserRole.TEACHER role. Returns 403 if the user lacks this role.
        authorization: Only users with global UserRole.TEACHER may call this endpoint.
        request: CreateCourseRequest
        response: CourseResponse
        error_responses:
          403: User does not have the TEACHER global role
        service_method: create(request)

      - id: courses.get
        method: GET
        path: /v1/courses/{id}
        auth: true
        description: Get course details by ID
        path_params:
          - name: id
            type: string
            description: Course UUID
        response: CourseResponse
        service_method: get(id)

      - id: courses.get-by-code
        method: GET
        path: /v1/courses/code/{code}
        auth: true
        description: Get course details by its unique numeric code
        path_params:
          - name: code
            type: string
            description: Unique 10-digit numeric course code
        response: CourseResponse
        service_method: getByCode(code)

      - id: courses.update
        method: PATCH
        path: /v1/courses/{id}
        auth: true
        description: Partial update of course fields
        path_params:
          - name: id
            type: string
        request: UpdateCourseRequest
        response: CourseResponse
        service_method: update(id, request)

      - id: courses.delete
        method: DELETE
        path: /v1/courses/{id}
        auth: true
        description: Soft delete a course
        path_params:
          - name: id
            type: string
        response: void
        service_method: delete(id)

  # ──────────────────────────────────────────────────────────────
  # ENROLLMENTS
  # ──────────────────────────────────────────────────────────────
  enrollments:
    service:
      name: EnrollmentService
      file: src/app/services/enrollment.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: enrollments.enroll
        method: POST
        path: /v1/courses/{courseId}/enroll
        auth: true
        description: Request enrollment in a course
        path_params:
          - name: courseId
            type: string
        request: EnrollmentRequest
        request_optional: true
        response: EnrollmentResponse
        service_method: "enroll(courseId, request?)"

      - id: enrollments.list-by-course
        method: GET
        path: /v1/courses/{courseId}/enrollments
        auth: true
        description: List all enrollments for a course
        path_params:
          - name: courseId
            type: string
        response: EnrollmentResponse[]
        service_method: listByCourse(courseId)

      - id: enrollments.my-enrollment
        method: GET
        path: /v1/courses/{courseId}/my-enrollment
        auth: true
        description: Get current user's enrollment for a course
        path_params:
          - name: courseId
            type: string
        response: EnrollmentResponse
        service_method: getMyEnrollment(courseId)

      - id: enrollments.update
        method: PUT
        path: /v1/enrollments/{enrollmentId}
        auth: true
        description: Update enrollment role or status
        path_params:
          - name: enrollmentId
            type: string
        request: UpdateEnrollmentRequest
        response: EnrollmentResponse
        service_method: update(enrollmentId, request)

      - id: enrollments.approve
        method: POST
        path: /v1/enrollments/{enrollmentId}/approve
        auth: true
        description: Approve a pending enrollment request
        path_params:
          - name: enrollmentId
            type: string
        request: "{}"
        response: EnrollmentResponse
        service_method: approve(enrollmentId)

      - id: enrollments.reject
        method: POST
        path: /v1/enrollments/{enrollmentId}/reject
        auth: true
        description: Reject a pending enrollment request
        path_params:
          - name: enrollmentId
            type: string
        request: "{}"
        response: EnrollmentResponse
        service_method: reject(enrollmentId)

      - id: enrollments.delete
        method: DELETE
        path: /v1/enrollments/{enrollmentId}
        auth: true
        description: Remove an enrollment
        path_params:
          - name: enrollmentId
            type: string
        response: void
        service_method: delete(enrollmentId)

  # ──────────────────────────────────────────────────────────────
  # MODULES
  # ──────────────────────────────────────────────────────────────
  modules:
    service:
      name: ModuleService
      file: src/app/services/module.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: modules.create
        method: POST
        path: /v1/courses/{courseId}/modules
        auth: true
        description: Create a new module in a course
        path_params:
          - name: courseId
            type: string
        request: CreateModuleRequest
        response: ModuleResponse
        service_method: create(courseId, request)

      - id: modules.list-by-course
        method: GET
        path: /v1/courses/{courseId}/modules
        auth: true
        description: List all modules in a course
        path_params:
          - name: courseId
            type: string
        response: ModuleResponse[]
        service_method: listByCourse(courseId)

      - id: modules.get
        method: GET
        path: /v1/modules/{moduleId}
        auth: true
        description: Get module details by ID
        path_params:
          - name: moduleId
            type: string
        response: ModuleResponse
        service_method: get(moduleId)

      - id: modules.update
        method: PATCH
        path: /v1/modules/{moduleId}
        auth: true
        description: Partial update of module fields
        path_params:
          - name: moduleId
            type: string
        request: UpdateModuleRequest
        response: ModuleResponse
        service_method: update(moduleId, request)

      - id: modules.delete
        method: DELETE
        path: /v1/modules/{moduleId}
        auth: true
        description: Delete a module
        path_params:
          - name: moduleId
            type: string
        response: void
        service_method: delete(moduleId)

  # ──────────────────────────────────────────────────────────────
  # LESSONS
  # ──────────────────────────────────────────────────────────────
  lessons:
    service:
      name: LessonService
      file: src/app/services/lesson.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: lessons.create
        method: POST
        path: /v1/modules/{moduleId}/lessons
        auth: true
        description: Create a new lesson in a module
        path_params:
          - name: moduleId
            type: string
        request: CreateLessonRequest
        response: LessonResponse
        service_method: create(moduleId, request)

      - id: lessons.list-by-module
        method: GET
        path: /v1/modules/{moduleId}/lessons
        auth: true
        description: List all lessons in a module
        path_params:
          - name: moduleId
            type: string
        response: LessonResponse[]
        service_method: listByModule(moduleId)

      - id: lessons.get
        method: GET
        path: /v1/lessons/{lessonId}
        auth: true
        description: Get lesson details by ID
        path_params:
          - name: lessonId
            type: string
        response: LessonResponse
        service_method: get(lessonId)

      - id: lessons.update
        method: PATCH
        path: /v1/lessons/{lessonId}
        auth: true
        description: Partial update of lesson fields
        path_params:
          - name: lessonId
            type: string
        request: UpdateLessonRequest
        response: LessonResponse
        service_method: update(lessonId, request)

      - id: lessons.delete
        method: DELETE
        path: /v1/lessons/{lessonId}
        auth: true
        description: Delete a lesson
        path_params:
          - name: lessonId
            type: string
        response: void
        service_method: delete(lessonId)

  # ──────────────────────────────────────────────────────────────
  # SUMMARIES
  # ──────────────────────────────────────────────────────────────
  summaries:
    service:
      name: SummaryService
      file: src/app/services/summary.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: summaries.get
        method: GET
        path: /v1/lessons/{lessonId}/summary
        auth: true
        description: Get summary content for a lesson
        path_params:
          - name: lessonId
            type: string
        response: SummaryResponse
        service_method: get(lessonId)

      - id: summaries.create-or-update
        method: POST
        path: /v1/lessons/{lessonId}/summary
        auth: true
        description: Create or update summary for a lesson (upsert)
        path_params:
          - name: lessonId
            type: string
        request: CreateSummaryRequest | UpdateSummaryRequest
        response: SummaryResponse
        service_method: createOrUpdate(lessonId, request)

  # ──────────────────────────────────────────────────────────────
  # EXERCISES
  # ──────────────────────────────────────────────────────────────
  exercises:
    service:
      name: ExerciseService
      file: src/app/services/exercise.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: exercises.create
        method: POST
        path: /v1/lessons/{lessonId}/exercises
        auth: true
        description: >
          Create a new exercise in a lesson. Optionally accepts inline
          questions[] to create exercise and questions in a single call.
          Response questionCount reflects any inline-created questions.
        path_params:
          - name: lessonId
            type: string
        request: CreateExerciseRequest
        response: ExerciseResponse
        service_method: create(lessonId, request)

      - id: exercises.list-by-lesson
        method: GET
        path: /v1/lessons/{lessonId}/exercises
        auth: true
        description: List all exercises in a lesson
        path_params:
          - name: lessonId
            type: string
        response: ExerciseResponse[]
        service_method: listByLesson(lessonId)

      - id: exercises.get
        method: GET
        path: /v1/exercises/{exerciseId}
        auth: true
        description: Get exercise details by ID
        path_params:
          - name: exerciseId
            type: string
        response: ExerciseResponse
        service_method: get(exerciseId)

      - id: exercises.update
        method: PATCH
        path: /v1/exercises/{exerciseId}
        auth: true
        description: Partial update of exercise fields
        path_params:
          - name: exerciseId
            type: string
        request: UpdateExerciseRequest
        response: ExerciseResponse
        service_method: update(exerciseId, request)

      - id: exercises.delete
        method: DELETE
        path: /v1/exercises/{exerciseId}
        auth: true
        description: >
          Soft delete an exercise. Sets deleted_at timestamp; record
          remains in the database but is excluded from all queries.
        path_params:
          - name: exerciseId
            type: string
        response: void
        service_method: delete(exerciseId)
        soft_delete_note: >
          Backend uses @SQLDelete with an inline SQL timestamp function
          (not a bind parameter) so Hibernate 6.x only needs to bind
          the entity ID. Example SQL:
          UPDATE exercises SET deleted_at = (EXTRACT(EPOCH FROM NOW()) * 1000)::bigint WHERE id = ?

  # ──────────────────────────────────────────────────────────────
  # QUESTIONS
  # ──────────────────────────────────────────────────────────────
  questions:
    service:
      name: QuestionService
      file: src/app/services/question.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: questions.list-by-exercise
        method: GET
        path: /v1/exercises/{exerciseId}/questions
        auth: true
        description: List all questions for an exercise
        path_params:
          - name: exerciseId
            type: string
        response: QuestionResponse[]
        service_method: listByExercise(exerciseId)

      - id: questions.batch-create
        method: POST
        path: /v1/exercises/{exerciseId}/questions
        auth: true
        description: Batch create questions for an exercise
        path_params:
          - name: exerciseId
            type: string
        request: CreateQuestionsRequest
        response: QuestionResponse[]
        service_method: batchCreate(exerciseId, request)

      - id: questions.batch-update
        method: PATCH
        path: /v1/exercises/{exerciseId}/questions
        auth: true
        description: >
          Batch operation on questions: create new, update existing,
          or delete by ID. Uses QuestionAction enum per item.
        path_params:
          - name: exerciseId
            type: string
        request: UpdateQuestionsRequest
        response: QuestionsResponse
        service_method: batchUpdate(exerciseId, request)
        behavior:
          authorization: Only TEACHER role in the course may call this endpoint.
          actions:
            CREATE: >
              Requires content field. orderIndex auto-increments from the
              current max if omitted. meta defaults to {}, visibility to VISIBLE.
            UPDATE: >
              Requires questionId. Applies only the non-null fields supplied
              (content, orderIndex, meta, visibility). Question must belong
              to the target exercise.
            DELETE: >
              Requires questionId. Performs a soft delete — sets deleted_at
              timestamp via SQL; the record remains in the database but is
              excluded from all future queries. Question must belong to the
              target exercise.
          soft_delete_note: >
            Backend uses @SQLDelete with an inline SQL timestamp function
            (not a bind parameter) so Hibernate 6.x only needs to bind
            the entity ID. Example SQL:
            UPDATE questions SET deleted_at = (EXTRACT(EPOCH FROM NOW()) * 1000)::bigint WHERE id = ?

  # ──────────────────────────────────────────────────────────────
  # SUBMISSIONS
  # ──────────────────────────────────────────────────────────────
  submissions:
    service:
      name: SubmissionService
      file: src/app/services/submission.service.ts
      injectable: root
      base_url: "{apiUrl}"
    endpoints:
      - id: submissions.list-by-exercise
        method: GET
        path: /v1/exercises/{exerciseId}/submissions
        auth: true
        description: List all submissions for an exercise
        path_params:
          - name: exerciseId
            type: string
        response: SubmissionResponse[]
        service_method: listByExercise(exerciseId)

      - id: submissions.my-submission
        method: GET
        path: /v1/exercises/{exerciseId}/my-submission
        auth: true
        description: Get current user's submission for an exercise
        path_params:
          - name: exerciseId
            type: string
        response: SubmissionResponse
        service_method: getMySubmission(exerciseId)

      - id: submissions.create-or-update
        method: POST
        path: /v1/exercises/{exerciseId}/submissions
        auth: true
        description: Create or update a submission with answers (upsert)
        path_params:
          - name: exerciseId
            type: string
        request: CreateSubmissionRequest | UpdateSubmissionRequest
        response: SubmissionResponse
        service_method: createOrUpdate(exerciseId, request)

      - id: submissions.get
        method: GET
        path: /v1/submissions/{submissionId}
        auth: true
        description: Get submission details by ID
        path_params:
          - name: submissionId
            type: string
        response: SubmissionResponse
        service_method: get(submissionId)

      - id: submissions.submit
        method: POST
        path: /v1/submissions/{submissionId}/submit
        auth: true
        description: Submit for review (DRAFT -> SUBMITTED)
        path_params:
          - name: submissionId
            type: string
        request: "{}"
        response: SubmissionResponse
        service_method: submit(submissionId)

      - id: submissions.approve
        method: POST
        path: /v1/submissions/{submissionId}/approve
        auth: true
        description: Approve a submission (SUBMITTED -> APPROVED)
        path_params:
          - name: submissionId
            type: string
        request: "{}"
        response: SubmissionResponse
        service_method: approve(submissionId)

      - id: submissions.request-revision
        method: POST
        path: /v1/submissions/{submissionId}/revision
        auth: true
        description: Request revision with optional feedback (SUBMITTED -> NEEDS_REVISION)
        path_params:
          - name: submissionId
            type: string
        request: RevisionRequest
        request_optional: true
        response: SubmissionResponse
        service_method: "requestRevision(submissionId, request?)"

      - id: submissions.add-comment
        method: POST
        path: /v1/answers/{answerId}/comment
        auth: true
        description: Add a teacher comment to a specific student answer
        path_params:
          - name: answerId
            type: string
            description: StudentAnswer UUID
        request: CommentRequest
        response: SubmissionResponse
        service_method: addComment(answerId, request)
