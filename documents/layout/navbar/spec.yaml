openspec: "1.0"
kind: LayoutComponent
info:
  title: Navigation Bar
  version: "1.0.0"
  description: >
    Main navigation bar displayed on all authenticated screens.
    Provides brand identity, notification access, and user avatar.

component:
  id: navbar
  name: Navigation Bar
  selector: app-navbar
  file: src/app/components/layout/navbar/navbar.component.ts
  template: src/app/components/layout/navbar/navbar.component.html
  styles: src/app/components/layout/navbar/navbar.component.scss
  standalone: true
  status: implemented

  purpose: >
    Persistent top navigation bar shown on every authenticated screen.
    Left side displays the Lib4GZ brand link, right side shows
    notification icon and user avatar.

  visibility:
    shown_on:
      - /
      - /course/**
    hidden_on:
      - /login
      - /register
    note: >
      Navbar is conditionally rendered in app.component based on
      authentication state. Hidden on public auth screens.

  height: 70px

  layout:
    description: >
      Fixed-height horizontal bar. Brand on the left, actions on the right.
      Uses flexbox with space-between alignment.
    desktop:
      ascii: |
        +----------------------------------------------------------+
        |  Lib4GZ                         [bell-icon] [avatar]     |
        +----------------------------------------------------------+
    mobile:
      ascii: |
        +------------------------------+
        |  Lib4GZ     [bell] [avatar]  |
        +------------------------------+

  sections:
    # ── Left Section ──
    - id: brand
      name: Brand
      position: left
      elements:
        - id: brand-link
          name: Brand Link
          type: anchor
          text: Lib4GZ
          navigate_to: /
          description: >
            App brand displayed as styled text. Clicking navigates
            to the user dashboard (homepage for authenticated users).
          typography: text-title-medium
          style:
            color: "var(--nav-bar-text-color)"
            text_decoration: none
            font_weight: "700"
            cursor: pointer

    # ── Right Section ──
    - id: actions
      name: Actions
      position: right
      description: >
        Right-aligned action items. Order from right to left:
        user avatar (rightmost), then notifications icon.
      layout:
        display: flex
        align_items: center
        gap: "var(--spacing-md)"
      elements:
        - id: notifications
          name: Notifications Icon
          type: icon-button
          icon: notifications
          icon_set: Material Symbols
          description: >
            Bell icon button for notifications. Displays unread
            badge count when there are unread notifications.
            Functionality will be implemented in a future phase.
          style:
            color: "var(--nav-bar-text-color)"
            size: 24px
            cursor: pointer
          badge:
            status: planned
            description: >
              Small circular badge on top-right of icon showing
              unread notification count. Hidden when count is 0.
          status: ui-only

        - id: user-avatar
          name: User Avatar
          type: avatar
          description: >
            Circular avatar showing the current user's profile image.
            Falls back to user initials on a colored background
            when no image is available.
          style:
            size: 36px
            border_radius: "var(--radius-full)"
            cursor: pointer
          data_source: "AuthService or UserService (current user)"
          status: ui-only

  theming:
    active_mixin: navigation-bar-theme-by-primary-color-reverse
    description: >
      Navbar uses the primary-color-reverse theme: teal background
      with white text. Theme tokens are defined in theme.yaml and
      applied via the active theme (Mint).
    tokens_used:
      - { name: --nav-bar-bg-color, resolved: "var(--primary-color)", description: Navbar background }
      - { name: --nav-bar-text-color, resolved: "var(--text-color-on-primary-bg)", description: Text and icon color }
      - { name: --nav-bar-text-color-active, resolved: "var(--neutral-color-0)", description: Active item highlight }
      - { name: --nav-bar-button-bg-color, resolved: "var(--neutral-color-0)", description: Button background }
      - { name: --nav-bar-button-text-color, resolved: "var(--primary-color)", description: Button text color }

  states:
    - name: default
      description: Brand text on left, notification icon and avatar on right
    - name: notifications-unread
      description: Badge appears on notification icon with unread count
      status: planned

  accessibility:
    - Navbar uses <nav> semantic element with aria-label="Main navigation"
    - Brand link is a standard <a> with meaningful text
    - Notification button has aria-label="Notifications"
    - Avatar button has aria-label with user name
    - All interactive elements are keyboard focusable

  responsive:
    breakpoints:
      - below: 768px
        changes:
          - Reduce horizontal padding
          - Brand text remains but may use smaller font
          - Action icons remain at same size

  current_implementation: |
    import { Component } from '@angular/core';
    import { RouterLink } from '@angular/router';

    @Component({
      selector: 'app-navbar',
      imports: [RouterLink],
      templateUrl: './navbar.component.html',
      styleUrl: './navbar.component.scss'
    })
    export class NavbarComponent {

    }

  current_template: |
    <nav class="navbar" aria-label="Main navigation">
      <a class="navbar-brand text-title-medium" routerLink="/">Lib4GZ</a>

      <div class="navbar-actions">
        <button
          class="navbar-icon-btn"
          type="button"
          aria-label="Notifications"
        >
          <span class="material-symbols-outlined">notifications</span>
        </button>

        <button
          class="navbar-avatar"
          type="button"
          aria-label="User menu"
        >
          <span class="avatar-initials">U</span>
        </button>
      </div>
    </nav>

  current_styles: |
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      padding: 0 var(--spacing-xl);
      background-color: var(--nav-bar-bg-color);
      color: var(--nav-bar-text-color);
      z-index: var(--z-index-sticky);

      @media (max-width: 768px) {
        padding: 0 var(--spacing-md);
      }
    }

    .navbar-brand {
      color: var(--nav-bar-text-color);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
    }

    .navbar-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--nav-bar-text-color);
      cursor: pointer;
      padding: 0;

      .material-symbols-outlined {
        font-size: 24px;
      }
    }

    .navbar-avatar {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background-color: var(--nav-bar-button-bg-color);
      color: var(--nav-bar-button-text-color);
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .avatar-initials {
      line-height: 1;
    }

  app_component_integration:
    description: >
      Navbar visibility is controlled by AppComponent. It listens to
      Router.events for NavigationEnd and hides the navbar on /login
      and /register routes.
    app_component_implementation: |
      import { Component, computed, inject } from '@angular/core';
      import { Router, NavigationEnd, RouterOutlet } from '@angular/router';
      import { toSignal } from '@angular/core/rxjs-interop';
      import { filter, map } from 'rxjs';
      import { NavbarComponent } from './components/layout/navbar/navbar.component';

      @Component({
          selector: 'app-root',
          imports: [RouterOutlet, NavbarComponent],
          templateUrl: './app.component.html',
          styleUrl: './app.component.scss'
      })
      export class AppComponent {
        title = 'lib4gz-fe';

        private readonly router = inject(Router);
        private readonly hiddenRoutes = ['/login', '/register'];

        private readonly currentUrl = toSignal(
          this.router.events.pipe(
            filter((e): e is NavigationEnd => e instanceof NavigationEnd),
            map(e => e.urlAfterRedirects)
          ),
          { initialValue: this.router.url }
        );

        showNavbar = computed(() => {
          const url = this.currentUrl();
          return !this.hiddenRoutes.some(route => url === route || url.startsWith(route + '?'));
        });
      }
    app_component_template: |
      @if (showNavbar()) {
        <app-navbar />
      }
      <router-outlet />

design_system:
  typography:
    - $ref: "../../design-system/typography.yaml#/scale/title/levels/1"
      usage: Brand text (text-title-medium)
  colors:
    - $ref: "../../design-system/color.yaml#/theme_colors/primary"
      usage: Navbar background via theme token
    - $ref: "../../design-system/color.yaml#/theme_colors/neutral"
      usage: Text on primary background, avatar fallback
  tokens:
    - $ref: "../../design-system/tokens.yaml#/spacing"
      usage: Horizontal padding, gap between action items
    - $ref: "../../design-system/tokens.yaml#/border_radius"
      usage: Avatar circle (--radius-full)
    - $ref: "../../design-system/tokens.yaml#/z_index"
      usage: Navbar z-index (above page content)
  theme:
    - $ref: "../../design-system/theme.yaml#/token_mixins/navigation_bar_mixins/2"
      usage: "Active: navigation-bar-theme-by-primary-color-reverse"
  breakpoints:
    - $ref: "../../design-system/breakpoints.yaml#/breakpoints/1"
      usage: "768px: Reduce padding on mobile"

acceptance_criteria:
  - Navbar is visible on all authenticated screens
  - Navbar is hidden on login and register screens
  - "Lib4GZ" brand text is displayed on the left
  - Clicking brand navigates to /
  - Notification bell icon is displayed to the left of avatar
  - User avatar is displayed on the far right
  - Navbar uses teal background with white text (primary-reverse theme)
  - Navbar height is 70px
  - All interactive elements are keyboard accessible
