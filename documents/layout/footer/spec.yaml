openspec: "1.0"
kind: LayoutComponent
info:
  title: Footer
  version: "1.0.0"
  description: >
    Site footer displayed on all authenticated screens below the main content.
    Uses footer theme tokens defined in theme.yaml.

component:
  id: footer
  name: Footer
  selector: app-footer
  file: src/app/components/layout/footer/footer.component.ts
  template: src/app/components/layout/footer/footer.component.html
  styles: src/app/components/layout/footer/footer.component.scss
  standalone: true
  status: planned

  purpose: >
    Persistent bottom footer shown on authenticated screens.
    Displays copyright, brand info, and optional footer links.

  visibility:
    shown_on:
      - /
      - /course/**
    hidden_on:
      - /login
      - /register
    note: >
      Footer visibility mirrors navbar — hidden on public auth screens,
      shown on all authenticated screens.

  layout:
    description: >
      Full-width footer with centered content. Uses flexbox with
      space-between for multi-column layouts or centered for simple copyright.
    desktop:
      ascii: |
        +----------------------------------------------------------+
        |                                                          |
        |              (c) 2026 Lib4GZ. All rights reserved.       |
        |                                                          |
        +----------------------------------------------------------+

  sections:
    - id: copyright
      name: Copyright
      position: center
      elements:
        - id: copyright-text
          name: Copyright Text
          type: text
          text: "(c) 2026 Lib4GZ. All rights reserved."
          typography: text-body-small
          style:
            color: "var(--footer-text-color)"

  theming:
    active_mixin: footer-theme-by-primary-color
    description: >
      Footer uses the primary-color theme: teal background with white text.
      Theme tokens are defined in theme.yaml and applied via the active
      theme (Mint).
    tokens_used:
      - { name: --footer-bg-color, resolved: "var(--primary-color)", description: Footer background }
      - { name: --footer-text-color, resolved: "var(--text-color-on-primary-bg)", description: Text color }
      - { name: --footer-border-color, resolved: "var(--neutral-color-0)", description: Top border }
      - { name: --footer-button-bg-color, resolved: "var(--neutral-color-0)", description: Button background }
      - { name: --footer-button-text-color, resolved: "var(--primary-color)", description: Button text }

  styles: |
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg) var(--spacing-xl);
      background-color: var(--footer-bg-color);
      color: var(--footer-text-color);

      @media (max-width: 768px) {
        padding: var(--spacing-md) var(--spacing-md);
      }
    }

    .footer-text {
      text-align: center;
    }

  template: |
    <footer class="footer">
      <span class="footer-text text-body-small">
        &copy; 2026 Lib4GZ. All rights reserved.
      </span>
    </footer>

  accessibility:
    - Footer uses <footer> semantic element
    - Contains meaningful text content
    - Links (if added) are keyboard focusable

  responsive:
    breakpoints:
      - below: 768px
        changes:
          - Reduce horizontal padding

design_system:
  colors:
    - $ref: "../../design-system/color.yaml#/theme_colors/primary"
      usage: Footer background via theme token
  tokens:
    - $ref: "../../design-system/tokens.yaml#/spacing"
      usage: Padding
  theme:
    - $ref: "../../design-system/theme.yaml#/token_mixins/footer_mixins/0"
      usage: "Active: footer-theme-by-primary-color"
  typography:
    - $ref: "../../design-system/typography.yaml#/scale/body/levels/2"
      usage: Copyright text (text-body-small)

acceptance_criteria:
  - Footer is visible on all authenticated screens
  - Footer is hidden on login and register screens
  - Copyright text is displayed and centered
  - Footer uses teal background with white text (matching active theme)
  - Footer is responsive with reduced padding on mobile
